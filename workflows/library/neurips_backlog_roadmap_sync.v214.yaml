version: "2.14"
name: "neurips-backlog-roadmap-sync-v214"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  state_root:
    type: relpath
    under: state
  steering_path:
    type: relpath
    under: docs
    must_exist_target: true
  design_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  roadmap_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  selected_item_context_path:
    type: relpath
    under: state
    must_exist_target: true
  progress_ledger_path:
    type: relpath
    under: state
    must_exist_target: true
  roadmap_sync_report_target_path:
    type: relpath
    under: artifacts/review

outputs:
  roadmap_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRoadmapSyncOutputs.artifacts.roadmap_path
  roadmap_sync_report_path:
    type: relpath
    under: artifacts/review
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRoadmapSyncOutputs.artifacts.roadmap_sync_report_path
  roadmap_sync_status:
    kind: scalar
    type: enum
    allowed: ["NO_CHANGE", "UPDATED", "BLOCKED"]
    from:
      ref: root.steps.FinalizeRoadmapSyncOutputs.artifacts.roadmap_sync_status

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"

artifacts:
  steering:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/steering_path.txt
    under: docs
    must_exist_target: true
  design:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/design_path.txt
    under: docs/plans
    must_exist_target: true
  roadmap:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/roadmap_path.txt
    under: docs/plans
    must_exist_target: true
  selected_item_context:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/selected_item_context_path.txt
    under: state
    must_exist_target: true
  progress_ledger:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/progress_ledger_path.txt
    under: state
    must_exist_target: true
  roadmap_sync_report:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/roadmap_sync_report_path.txt
    under: artifacts/review
    must_exist_target: true
  roadmap_sync_status:
    kind: scalar
    type: enum
    allowed: ["NO_CHANGE", "UPDATED", "BLOCKED"]

steps:
  - name: MaterializeRoadmapSyncInputs
    id: materialize_roadmap_sync_inputs
    materialize_artifacts:
      input_values:
        - names:
            - steering_path
            - design_path
            - roadmap_path
            - selected_item_context_path
            - progress_ledger_path
          contract: inherit
          pointer_template: ${inputs.state_root}/{name}.txt
      values:
        - name: roadmap_sync_report_path
          source: { input: roadmap_sync_report_target_path }
          contract:
            type: relpath
            under: artifacts/review
            must_exist_target: false
          pointer:
            path: ${inputs.state_root}/roadmap_sync_report_path.txt
          ensure_parent: true
    publishes:
      - artifact: steering
        from: steering_path
      - artifact: design
        from: design_path
      - artifact: roadmap
        from: roadmap_path
      - artifact: selected_item_context
        from: selected_item_context_path
      - artifact: progress_ledger
        from: progress_ledger_path

  - name: ReviewOrUpdateRoadmap
    id: review_or_update_roadmap
    provider: codex
    asset_file: prompts/neurips_backlog_roadmap_sync/review_or_update.md
    timeout_sec: 1800
    consumes:
      - artifact: steering
        policy: latest_successful
        freshness: any
      - artifact: design
        policy: latest_successful
        freshness: any
      - artifact: roadmap
        policy: latest_successful
        freshness: any
      - artifact: selected_item_context
        policy: latest_successful
        freshness: any
      - artifact: progress_ledger
        policy: latest_successful
        freshness: any
    prompt_consumes: ["steering", "design", "roadmap", "selected_item_context", "progress_ledger"]
    expected_outputs:
      - name: roadmap_sync_report_path
        path: ${inputs.state_root}/roadmap_sync_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: roadmap_sync_status
        path: ${inputs.state_root}/roadmap_sync_status.txt
        type: enum
        allowed: ["NO_CHANGE", "UPDATED", "BLOCKED"]
    publishes:
      - artifact: roadmap_sync_report
        from: roadmap_sync_report_path
      - artifact: roadmap_sync_status
        from: roadmap_sync_status

  - name: FinalizeRoadmapSyncOutputs
    id: finalize_roadmap_sync_outputs
    command:
      - python
      - -c
      - |
        import pathlib
        import sys

        state_root = pathlib.Path(sys.argv[1])
        roadmap_path = sys.argv[2]

        status = (state_root / "roadmap_sync_status.txt").read_text(encoding="utf-8").strip()
        if status not in {"NO_CHANGE", "UPDATED", "BLOCKED"}:
            raise SystemExit(f"Unexpected roadmap sync status: {status}")
        if not pathlib.Path(roadmap_path).is_file():
            raise SystemExit(f"Authoritative roadmap path does not exist: {roadmap_path}")
        report_path = (state_root / "roadmap_sync_report_path.txt").read_text(encoding="utf-8").strip()
        if not report_path or not pathlib.Path(report_path).is_file():
            raise SystemExit(f"Roadmap sync report does not exist: {report_path}")

        (state_root / "final_roadmap_path.txt").write_text(roadmap_path + "\n", encoding="utf-8")
        (state_root / "final_roadmap_sync_report_path.txt").write_text(report_path + "\n", encoding="utf-8")
        (state_root / "final_roadmap_sync_status.txt").write_text(status + "\n", encoding="utf-8")
      - ${inputs.state_root}
      - ${inputs.roadmap_path}
    expected_outputs:
      - name: roadmap_path
        path: ${inputs.state_root}/final_roadmap_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: roadmap_sync_report_path
        path: ${inputs.state_root}/final_roadmap_sync_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: roadmap_sync_status
        path: ${inputs.state_root}/final_roadmap_sync_status.txt
        type: enum
        allowed: ["NO_CHANGE", "UPDATED", "BLOCKED"]
