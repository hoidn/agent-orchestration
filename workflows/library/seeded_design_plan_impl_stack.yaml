version: "2.7"
name: "seeded-design-plan-impl-stack"

imports:
  implementation_phase: design_plan_impl_implementation_phase.yaml

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  state_root:
    type: relpath
    under: state
  implementation_phase_state_root:
    type: relpath
    under: state
  brief_path:
    type: relpath
    must_exist_target: true
  design_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  plan_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  design_review_report_target_path:
    type: relpath
    under: artifacts/review
  plan_review_report_target_path:
    type: relpath
    under: artifacts/review
  execution_report_target_path:
    type: relpath
    under: artifacts/work
  implementation_review_report_target_path:
    type: relpath
    under: artifacts/review

outputs:
  design_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
    from:
      ref: root.steps.FinalizeSeededDesignOutputs.artifacts.design_path
  design_review_report_path:
    type: relpath
    under: artifacts/review
    must_exist_target: true
    from:
      ref: root.steps.FinalizeSeededDesignOutputs.artifacts.design_review_report_path
  design_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]
    from:
      ref: root.steps.FinalizeSeededDesignOutputs.artifacts.design_review_decision
  plan_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
    from:
      ref: root.steps.FinalizeSeededPlanOutputs.artifacts.plan_path
  plan_review_report_path:
    type: relpath
    under: artifacts/review
    must_exist_target: true
    from:
      ref: root.steps.FinalizeSeededPlanOutputs.artifacts.plan_review_report_path
  plan_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
    from:
      ref: root.steps.FinalizeSeededPlanOutputs.artifacts.plan_review_decision
  execution_report_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.RunImplementationPhase.artifacts.execution_report_path
  implementation_review_report_path:
    type: relpath
    under: artifacts/review
    must_exist_target: true
    from:
      ref: root.steps.RunImplementationPhase.artifacts.implementation_review_report_path
  implementation_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
    from:
      ref: root.steps.RunImplementationPhase.artifacts.implementation_review_decision

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"

artifacts:
  brief:
    pointer: ${inputs.state_root}/brief_path.txt
    type: relpath
    must_exist_target: true
  design:
    pointer: ${inputs.state_root}/design_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  design_review_report:
    pointer: ${inputs.state_root}/design_review_report_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
  design_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]
  plan:
    pointer: ${inputs.state_root}/plan_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  plan_review_report:
    pointer: ${inputs.state_root}/plan_review_report_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
  plan_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
  open_findings:
    pointer: ${inputs.state_root}/open_findings_path.txt
    type: relpath
    under: state
    must_exist_target: true
  review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]

steps:
  - name: InitializeSeededDesignInputs
    id: initialize_seeded_design_inputs
    command:
      - bash
      - -lc
      - |
        mkdir -p "${inputs.state_root}" artifacts/review
        printf '%s\n' "${inputs.brief_path}" > "${inputs.state_root}/brief_path.txt"
        printf '%s\n' "${inputs.design_path}" > "${inputs.state_root}/design_path.txt"
        printf '%s\n' "${inputs.design_review_report_target_path}" > "${inputs.state_root}/design_review_report_path.txt"
        printf '%s\n' "${inputs.state_root}/design_open_findings.json" > "${inputs.state_root}/open_findings_path.txt"
        cat > "${inputs.state_root}/design_open_findings.json" <<'JSON'
        {
          "findings": []
        }
        JSON
    expected_outputs:
      - name: brief_path
        path: ${inputs.state_root}/brief_path.txt
        type: relpath
        must_exist_target: true
      - name: design_path
        path: ${inputs.state_root}/design_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: design_review_report_path
        path: ${inputs.state_root}/design_review_report_path.txt
        type: relpath
        under: artifacts/review
      - name: open_findings_path
        path: ${inputs.state_root}/open_findings_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: brief
        from: brief_path
      - artifact: design
        from: design_path
      - artifact: open_findings
        from: open_findings_path

  - name: DesignReviewLoop
    id: design_review_loop
    repeat_until:
      id: design_review_iteration
      max_iterations: 20
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE", "BLOCK"]
          from:
            ref: self.steps.RouteDesignDecision.artifacts.review_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      steps:
        - name: ReviewDesignTracked
          id: review_design_tracked
          provider: codex
          asset_file: prompts/design_plan_impl_stack_v2_call/review_design.md
          timeout_sec: 1800
          consumes:
            - artifact: brief
              policy: latest_successful
              freshness: any
            - artifact: design
              policy: latest_successful
              freshness: any
            - artifact: open_findings
              policy: latest_successful
              freshness: any
          prompt_consumes: ["brief", "design", "open_findings"]
          expected_outputs:
            - name: design_review_report_path
              path: ${inputs.state_root}/design_review_report_path.txt
              type: relpath
              under: artifacts/review
              must_exist_target: true
            - name: design_review_decision
              path: ${inputs.state_root}/design_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE", "BLOCK"]
            - name: unresolved_high_count
              path: ${inputs.state_root}/design_unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/design_unresolved_medium_count.txt
              type: integer
          publishes:
            - artifact: design_review_report
              from: design_review_report_path
            - artifact: design_review_decision
              from: design_review_decision

        - name: RouteDesignDecision
          id: route_design_decision
          match:
            ref: self.steps.ReviewDesignTracked.artifacts.design_review_decision
            cases:
              APPROVE:
                id: approve_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteApprovedDesignDecision.artifacts.review_decision
                steps:
                  - name: WriteApprovedDesignDecision
                    id: write_approved_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteRevisedDesignDecision.artifacts.review_decision
                steps:
                  - name: ReviseDesignTracked
                    id: revise_design_tracked
                    provider: codex
                    asset_file: prompts/design_plan_impl_stack_v2_call/revise_design.md
                    timeout_sec: 3600
                    consumes:
                      - artifact: brief
                        policy: latest_successful
                        freshness: any
                      - artifact: design
                        policy: latest_successful
                        freshness: any
                      - artifact: design_review_report
                        policy: latest_successful
                        freshness: any
                    prompt_consumes: ["brief", "design", "design_review_report"]
                    expected_outputs:
                      - name: design_path
                        path: ${inputs.state_root}/design_path.txt
                        type: relpath
                        under: docs/plans
                        must_exist_target: true
                    publishes:
                      - artifact: design
                        from: design_path
                  - name: ExtractOpenDesignFindings
                    id: extract_open_design_findings
                    command:
                      - bash
                      - -lc
                      - |
                        python - <<'PY'
                        import json
                        from pathlib import Path

                        review_pointer = Path("${inputs.state_root}/design_review_report_path.txt")
                        review_path = Path(review_pointer.read_text(encoding="utf-8").strip())
                        report = json.loads(review_path.read_text(encoding="utf-8"))

                        carried = []
                        for finding in report.get("findings", []):
                            if finding.get("status") in {"STILL_OPEN", "NEW", "SPLIT"}:
                                carried.append(finding)

                        open_findings_pointer = Path("${inputs.state_root}/open_findings_path.txt")
                        open_findings_path = Path(open_findings_pointer.read_text(encoding="utf-8").strip())
                        open_findings_path.parent.mkdir(parents=True, exist_ok=True)
                        open_findings_path.write_text(
                            json.dumps({"findings": carried}, indent=2) + "\n",
                            encoding="utf-8",
                        )
                        PY
                    expected_outputs:
                      - name: open_findings_path
                        path: ${inputs.state_root}/open_findings_path.txt
                        type: relpath
                        under: state
                        must_exist_target: true
                    publishes:
                      - artifact: open_findings
                        from: open_findings_path
                  - name: WriteRevisedDesignDecision
                    id: write_revised_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: REVISE
              BLOCK:
                id: block_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteBlockedDesignDecision.artifacts.review_decision
                steps:
                  - name: WriteBlockedDesignDecision
                    id: write_blocked_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: BLOCK
                  - name: FailBlockedDesign
                    id: fail_blocked_design
                    command:
                      - bash
                      - -lc
                      - |
                        echo "Design review blocked further work." >&2
                        exit 1

  - name: FinalizeSeededDesignOutputs
    id: finalize_seeded_design_outputs
    command:
      - bash
      - -lc
      - |
        cat "${inputs.state_root}/design_path.txt" > "${inputs.state_root}/final_design_path.txt"
        cat "${inputs.state_root}/design_review_report_path.txt" > "${inputs.state_root}/final_design_review_report_path.txt"
        cat "${inputs.state_root}/design_review_decision.txt" > "${inputs.state_root}/final_design_review_decision.txt"
    expected_outputs:
      - name: design_path
        path: ${inputs.state_root}/final_design_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: design_review_report_path
        path: ${inputs.state_root}/final_design_review_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: design_review_decision
        path: ${inputs.state_root}/final_design_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE", "BLOCK"]

  - name: InitializeSeededPlanInputs
    id: initialize_seeded_plan_inputs
    command:
      - bash
      - -lc
      - |
        mkdir -p "${inputs.state_root}" artifacts/review
        cat "${inputs.state_root}/final_design_path.txt" > "${inputs.state_root}/design_path.txt"
        printf '%s\n' "${inputs.plan_path}" > "${inputs.state_root}/plan_path.txt"
        printf '%s\n' "${inputs.plan_review_report_target_path}" > "${inputs.state_root}/plan_review_report_path.txt"
        printf '%s\n' "${inputs.state_root}/plan_open_findings.json" > "${inputs.state_root}/open_findings_path.txt"
        cat > "${inputs.state_root}/plan_open_findings.json" <<'JSON'
        {
          "findings": []
        }
        JSON
    expected_outputs:
      - name: design_path
        path: ${inputs.state_root}/design_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: plan_path
        path: ${inputs.state_root}/plan_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: plan_review_report_path
        path: ${inputs.state_root}/plan_review_report_path.txt
        type: relpath
        under: artifacts/review
      - name: open_findings_path
        path: ${inputs.state_root}/open_findings_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: design
        from: design_path
      - artifact: plan
        from: plan_path
      - artifact: open_findings
        from: open_findings_path

  - name: PlanReviewLoop
    id: plan_review_loop
    repeat_until:
      id: plan_review_iteration
      max_iterations: 12
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE"]
          from:
            ref: self.steps.RoutePlanDecision.artifacts.review_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      steps:
        - name: ReviewPlanTracked
          id: review_plan_tracked
          provider: codex
          asset_file: prompts/design_plan_impl_stack_v2_call/review_plan.md
          timeout_sec: 1800
          consumes:
            - artifact: design
              policy: latest_successful
              freshness: any
            - artifact: plan
              policy: latest_successful
              freshness: any
            - artifact: open_findings
              policy: latest_successful
              freshness: any
          prompt_consumes: ["design", "plan", "open_findings"]
          expected_outputs:
            - name: plan_review_report_path
              path: ${inputs.state_root}/plan_review_report_path.txt
              type: relpath
              under: artifacts/review
              must_exist_target: true
            - name: plan_review_decision
              path: ${inputs.state_root}/plan_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE"]
            - name: unresolved_high_count
              path: ${inputs.state_root}/plan_unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/plan_unresolved_medium_count.txt
              type: integer
          publishes:
            - artifact: plan_review_report
              from: plan_review_report_path
            - artifact: plan_review_decision
              from: plan_review_decision

        - name: RoutePlanDecision
          id: route_plan_decision
          match:
            ref: self.steps.ReviewPlanTracked.artifacts.plan_review_decision
            cases:
              APPROVE:
                id: approve_plan_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteApprovedPlanDecision.artifacts.review_decision
                steps:
                  - name: WriteApprovedPlanDecision
                    id: write_approved_plan_decision
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_plan_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteRevisedPlanDecision.artifacts.review_decision
                steps:
                  - name: RevisePlanTracked
                    id: revise_plan_tracked
                    provider: codex
                    asset_file: prompts/design_plan_impl_stack_v2_call/revise_plan.md
                    timeout_sec: 3600
                    consumes:
                      - artifact: design
                        policy: latest_successful
                        freshness: any
                      - artifact: plan
                        policy: latest_successful
                        freshness: any
                      - artifact: plan_review_report
                        policy: latest_successful
                        freshness: any
                    prompt_consumes: ["design", "plan", "plan_review_report"]
                    expected_outputs:
                      - name: plan_path
                        path: ${inputs.state_root}/plan_path.txt
                        type: relpath
                        under: docs/plans
                        must_exist_target: true
                    publishes:
                      - artifact: plan
                        from: plan_path
                  - name: ExtractOpenPlanFindings
                    id: extract_open_plan_findings
                    command:
                      - bash
                      - -lc
                      - |
                        python - <<'PY'
                        import json
                        from pathlib import Path

                        review_pointer = Path("${inputs.state_root}/plan_review_report_path.txt")
                        review_path = Path(review_pointer.read_text(encoding="utf-8").strip())
                        report = json.loads(review_path.read_text(encoding="utf-8"))

                        carried = []
                        for finding in report.get("findings", []):
                            if finding.get("status") in {"STILL_OPEN", "NEW", "SPLIT"}:
                                carried.append(finding)

                        open_findings_pointer = Path("${inputs.state_root}/open_findings_path.txt")
                        open_findings_path = Path(open_findings_pointer.read_text(encoding="utf-8").strip())
                        open_findings_path.parent.mkdir(parents=True, exist_ok=True)
                        open_findings_path.write_text(
                            json.dumps({"findings": carried}, indent=2) + "\n",
                            encoding="utf-8",
                        )
                        PY
                    expected_outputs:
                      - name: open_findings_path
                        path: ${inputs.state_root}/open_findings_path.txt
                        type: relpath
                        under: state
                        must_exist_target: true
                    publishes:
                      - artifact: open_findings
                        from: open_findings_path
                  - name: WriteRevisedPlanDecision
                    id: write_revised_plan_decision
                    set_scalar:
                      artifact: review_decision
                      value: REVISE

  - name: FinalizeSeededPlanOutputs
    id: finalize_seeded_plan_outputs
    command:
      - bash
      - -lc
      - |
        cat "${inputs.state_root}/plan_path.txt" > "${inputs.state_root}/final_plan_path.txt"
        cat "${inputs.state_root}/plan_review_report_path.txt" > "${inputs.state_root}/final_plan_review_report_path.txt"
        cat "${inputs.state_root}/plan_review_decision.txt" > "${inputs.state_root}/final_plan_review_decision.txt"
    expected_outputs:
      - name: plan_path
        path: ${inputs.state_root}/final_plan_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: plan_review_report_path
        path: ${inputs.state_root}/final_plan_review_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: plan_review_decision
        path: ${inputs.state_root}/final_plan_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE"]

  - name: RunImplementationPhase
    id: run_implementation_phase
    call: implementation_phase
    with:
      state_root:
        ref: inputs.implementation_phase_state_root
      design_path:
        ref: root.steps.FinalizeSeededDesignOutputs.artifacts.design_path
      plan_path:
        ref: root.steps.FinalizeSeededPlanOutputs.artifacts.plan_path
      execution_report_target_path:
        ref: inputs.execution_report_target_path
      implementation_review_report_target_path:
        ref: inputs.implementation_review_report_target_path
