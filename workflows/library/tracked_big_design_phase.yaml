version: "2.7"
name: "tracked-big-design-phase"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  state_root:
    type: relpath
    under: state
  brief_path:
    type: relpath
    must_exist_target: true
  project_brief_path:
    type: relpath
    must_exist_target: true
  project_roadmap_path:
    type: relpath
    must_exist_target: true
  tranche_manifest_path:
    type: relpath
    must_exist_target: true
  design_target_path:
    type: relpath
    under: docs/plans
  design_review_report_target_path:
    type: relpath
    under: artifacts/review
  upstream_escalation_context_path:
    type: relpath
    default: state/major-project-default/upstream_escalation_context.json

outputs:
  design_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
    from:
      ref: root.steps.FinalizeBigDesignPhaseOutputs.artifacts.design_path
  design_review_report_path:
    type: relpath
    under: artifacts/review
    must_exist_target: true
    from:
      ref: root.steps.FinalizeBigDesignPhaseOutputs.artifacts.design_review_report_path
  design_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
    from:
      ref: root.steps.FinalizeBigDesignPhaseOutputs.artifacts.design_review_decision
  design_escalation_context_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.FinalizeBigDesignPhaseOutputs.artifacts.design_escalation_context_path
  roadmap_change_request_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.FinalizeBigDesignPhaseOutputs.artifacts.roadmap_change_request_path

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"

artifacts:
  tranche_brief:
    pointer: ${inputs.state_root}/tranche_brief_path.txt
    type: relpath
    must_exist_target: true
  project_brief:
    pointer: ${inputs.state_root}/project_brief_path.txt
    type: relpath
    must_exist_target: true
  project_roadmap:
    pointer: ${inputs.state_root}/project_roadmap_path.txt
    type: relpath
    must_exist_target: true
  tranche_manifest:
    pointer: ${inputs.state_root}/tranche_manifest_path.txt
    type: relpath
    must_exist_target: true
  design:
    pointer: ${inputs.state_root}/design_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  design_review_report:
    pointer: ${inputs.state_root}/design_review_report_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
  design_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
  upstream_escalation_context:
    pointer: ${inputs.state_root}/upstream_escalation_context_path.txt
    type: relpath
    under: state
    must_exist_target: true
  design_escalation_context:
    pointer: ${inputs.state_root}/design_escalation_context_path.txt
    type: relpath
    under: state
    must_exist_target: true
  roadmap_change_request:
    pointer: ${inputs.state_root}/roadmap_change_request_path.txt
    type: relpath
    under: state
    must_exist_target: true
  open_findings:
    pointer: ${inputs.state_root}/open_findings_path.txt
    type: relpath
    under: state
    must_exist_target: true
  review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]

steps:
  - name: InitializeBigDesignPhasePaths
    id: initialize_big_design_phase_paths
    command:
      - bash
      - -lc
      - |
        mkdir -p \
          "${inputs.state_root}" \
          "$(dirname "${inputs.design_target_path}")" \
          "$(dirname "${inputs.design_review_report_target_path}")" \
          "$(dirname "${inputs.upstream_escalation_context_path}")"
        printf '%s\n' "${inputs.design_target_path}" > "${inputs.state_root}/design_path.txt"
        printf '%s\n' "${inputs.design_review_report_target_path}" > "${inputs.state_root}/design_review_report_path.txt"
        printf '%s\n' "${inputs.state_root}/design_escalation_context.json" > "${inputs.state_root}/design_escalation_context_path.txt"
        printf '%s\n' "${inputs.state_root}/roadmap_change_request.json" > "${inputs.state_root}/roadmap_change_request_path.txt"
        printf '%s\n' "${inputs.state_root}/open_findings.json" > "${inputs.state_root}/open_findings_path.txt"
        cat > "${inputs.state_root}/design_review_output_paths.md" <<EOF
        Review report target path: ${inputs.design_review_report_target_path}
        Review decision path: ${inputs.state_root}/design_review_decision.txt
        Unresolved high count path: ${inputs.state_root}/unresolved_high_count.txt
        Unresolved medium count path: ${inputs.state_root}/unresolved_medium_count.txt
        EOF
        cat > "${inputs.state_root}/open_findings.json" <<'JSON'
        {
          "findings": []
        }
        JSON
        cat > "${inputs.state_root}/design_escalation_context.json" <<'JSON'
        {
          "active": false,
          "source_phase": "design",
          "decision": null,
          "recommended_next_phase": null,
          "reason_summary": "",
          "must_change": [],
          "evidence_paths": {}
        }
        JSON
        cat > "${inputs.state_root}/roadmap_change_request.json" <<'JSON'
        {
          "active": false,
          "source_phase": "design",
          "decision": null,
          "reason_summary": "",
          "requested_program_change": null,
          "requested_changes": [],
          "superseded_tranche_ids": [],
          "proposed_new_tranche_ids": []
        }
        JSON
        if [ ! -f "${inputs.upstream_escalation_context_path}" ]; then
          cat > "${inputs.upstream_escalation_context_path}" <<'JSON'
        {
          "active": false,
          "source_phase": null,
          "decision": null,
          "recommended_next_phase": null,
          "reason_summary": "",
          "must_change": [],
          "evidence_paths": {}
        }
        JSON
        fi
    expected_outputs:
      - name: design_path
        path: ${inputs.state_root}/design_path.txt
        type: relpath
        under: docs/plans
      - name: design_review_report_path
        path: ${inputs.state_root}/design_review_report_path.txt
        type: relpath
        under: artifacts/review
      - name: open_findings_path
        path: ${inputs.state_root}/open_findings_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: design_escalation_context_path
        path: ${inputs.state_root}/design_escalation_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: roadmap_change_request_path
        path: ${inputs.state_root}/roadmap_change_request_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: open_findings
        from: open_findings_path
      - artifact: design_escalation_context
        from: design_escalation_context_path
      - artifact: roadmap_change_request
        from: roadmap_change_request_path

  - name: PublishBigDesignInputs
    id: publish_big_design_inputs
    command:
      - bash
      - -lc
      - |
        for path in \
          "${inputs.brief_path}" \
          "${inputs.project_brief_path}" \
          "${inputs.project_roadmap_path}" \
          "${inputs.tranche_manifest_path}"
        do
          if [ ! -f "$path" ]; then
            echo "Missing big-design input file: $path" >&2
            exit 1
          fi
        done
        printf '%s\n' "${inputs.brief_path}" > "${inputs.state_root}/tranche_brief_path.txt"
        printf '%s\n' "${inputs.project_brief_path}" > "${inputs.state_root}/project_brief_path.txt"
        printf '%s\n' "${inputs.project_roadmap_path}" > "${inputs.state_root}/project_roadmap_path.txt"
        printf '%s\n' "${inputs.tranche_manifest_path}" > "${inputs.state_root}/tranche_manifest_path.txt"
        printf '%s\n' "${inputs.upstream_escalation_context_path}" > "${inputs.state_root}/upstream_escalation_context_path.txt"
    expected_outputs:
      - name: tranche_brief_path
        path: ${inputs.state_root}/tranche_brief_path.txt
        type: relpath
        must_exist_target: true
      - name: project_brief_path
        path: ${inputs.state_root}/project_brief_path.txt
        type: relpath
        must_exist_target: true
      - name: project_roadmap_path
        path: ${inputs.state_root}/project_roadmap_path.txt
        type: relpath
        must_exist_target: true
      - name: tranche_manifest_path
        path: ${inputs.state_root}/tranche_manifest_path.txt
        type: relpath
        must_exist_target: true
      - name: upstream_escalation_context_path
        path: ${inputs.state_root}/upstream_escalation_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: tranche_brief
        from: tranche_brief_path
      - artifact: project_brief
        from: project_brief_path
      - artifact: project_roadmap
        from: project_roadmap_path
      - artifact: tranche_manifest
        from: tranche_manifest_path
      - artifact: upstream_escalation_context
        from: upstream_escalation_context_path

  - name: DraftBigDesign
    id: draft_big_design
    provider: codex
    asset_file: prompts/major_project_stack/draft_big_design.md
    timeout_sec: 3600
    consumes:
      - artifact: tranche_brief
        policy: latest_successful
        freshness: any
      - artifact: project_brief
        policy: latest_successful
        freshness: any
      - artifact: project_roadmap
        policy: latest_successful
        freshness: any
      - artifact: tranche_manifest
        policy: latest_successful
        freshness: any
      - artifact: upstream_escalation_context
        policy: latest_successful
        freshness: any
    prompt_consumes: ["tranche_brief", "project_brief", "project_roadmap", "tranche_manifest", "upstream_escalation_context"]
    expected_outputs:
      - name: design_path
        path: ${inputs.state_root}/design_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
    publishes:
      - artifact: design
        from: design_path

  - name: BigDesignReviewLoop
    id: big_design_review_loop
    repeat_until:
      id: big_design_review_iteration
      max_iterations: 20
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
          from:
            ref: self.steps.RouteBigDesignDecision.artifacts.review_decision
      condition:
        any_of:
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: APPROVE
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: ESCALATE_ROADMAP_REVISION
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: BLOCK
      steps:
        - name: ReviewBigDesign
          id: review_big_design
          provider: codex
          asset_file: prompts/major_project_stack/review_big_design.md
          timeout_sec: 1800
          depends_on:
            required:
              - ${inputs.state_root}/design_review_output_paths.md
            inject:
              mode: content
              instruction: "Concrete output paths for this big-design review step:"
              position: append
          consumes:
            - artifact: tranche_brief
              policy: latest_successful
              freshness: any
            - artifact: project_brief
              policy: latest_successful
              freshness: any
            - artifact: project_roadmap
              policy: latest_successful
              freshness: any
            - artifact: tranche_manifest
              policy: latest_successful
              freshness: any
            - artifact: design
              policy: latest_successful
              freshness: any
            - artifact: open_findings
              policy: latest_successful
              freshness: any
            - artifact: upstream_escalation_context
              policy: latest_successful
              freshness: any
          prompt_consumes: ["tranche_brief", "project_brief", "project_roadmap", "tranche_manifest", "design", "open_findings", "upstream_escalation_context"]
          expected_outputs:
            - name: design_review_decision
              path: ${inputs.state_root}/design_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
            - name: design_escalation_context_path
              path: ${inputs.state_root}/design_escalation_context_path.txt
              type: relpath
              under: state
              must_exist_target: true
            - name: roadmap_change_request_path
              path: ${inputs.state_root}/roadmap_change_request_path.txt
              type: relpath
              under: state
              must_exist_target: true
            - name: unresolved_high_count
              path: ${inputs.state_root}/unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/unresolved_medium_count.txt
              type: integer

        - name: PublishBigDesignReviewArtifacts
          id: publish_big_design_review_artifacts
          command:
            - bash
            - -lc
            - |
              python - <<'PY'
              import json
              from pathlib import Path

              review_target = Path("${inputs.design_review_report_target_path}")
              if not review_target.is_file():
                  raise SystemExit(f"Missing big-design review artifact: {review_target}")

              json.loads(review_target.read_text(encoding="utf-8"))

              pointer = Path("${inputs.state_root}/design_review_report_path.txt")
              pointer.write_text("${inputs.design_review_report_target_path}\n", encoding="utf-8")
              PY
          expected_outputs:
            - name: design_review_report_path
              path: ${inputs.state_root}/design_review_report_path.txt
              type: relpath
              under: artifacts/review
              must_exist_target: true
            - name: design_review_decision
              path: ${inputs.state_root}/design_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
            - name: design_escalation_context_path
              path: ${inputs.state_root}/design_escalation_context_path.txt
              type: relpath
              under: state
              must_exist_target: true
            - name: roadmap_change_request_path
              path: ${inputs.state_root}/roadmap_change_request_path.txt
              type: relpath
              under: state
              must_exist_target: true
            - name: unresolved_high_count
              path: ${inputs.state_root}/unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/unresolved_medium_count.txt
              type: integer
          publishes:
            - artifact: design_review_report
              from: design_review_report_path
            - artifact: design_review_decision
              from: design_review_decision
            - artifact: design_escalation_context
              from: design_escalation_context_path
            - artifact: roadmap_change_request
              from: roadmap_change_request_path

        - name: RouteBigDesignDecision
          id: route_big_design_decision
          match:
            ref: self.steps.PublishBigDesignReviewArtifacts.artifacts.design_review_decision
            cases:
              APPROVE:
                id: approve_big_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
                    from:
                      ref: self.steps.WriteApprovedBigDesignDecision.artifacts.review_decision
                steps:
                  - name: WriteApprovedBigDesignDecision
                    id: write_approved_big_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_big_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
                    from:
                      ref: self.steps.WriteRevisedBigDesignDecision.artifacts.review_decision
                steps:
                  - name: ReviseBigDesign
                    id: revise_big_design
                    provider: codex
                    asset_file: prompts/major_project_stack/revise_big_design.md
                    timeout_sec: 3600
                    consumes:
                      - artifact: tranche_brief
                        policy: latest_successful
                        freshness: any
                      - artifact: project_brief
                        policy: latest_successful
                        freshness: any
                      - artifact: project_roadmap
                        policy: latest_successful
                        freshness: any
                      - artifact: tranche_manifest
                        policy: latest_successful
                        freshness: any
                      - artifact: design
                        policy: latest_successful
                        freshness: any
                      - artifact: design_review_report
                        policy: latest_successful
                        freshness: any
                      - artifact: open_findings
                        policy: latest_successful
                        freshness: any
                      - artifact: upstream_escalation_context
                        policy: latest_successful
                        freshness: any
                    prompt_consumes: ["tranche_brief", "project_brief", "project_roadmap", "tranche_manifest", "design", "design_review_report", "open_findings", "upstream_escalation_context"]
                    expected_outputs:
                      - name: design_path
                        path: ${inputs.state_root}/design_path.txt
                        type: relpath
                        under: docs/plans
                        must_exist_target: true
                    publishes:
                      - artifact: design
                        from: design_path
                  - name: ExtractOpenBigDesignFindings
                    id: extract_open_big_design_findings
                    command:
                      - bash
                      - -lc
                      - |
                        python - <<'PY'
                        import json
                        from pathlib import Path

                        review_pointer = Path("${inputs.state_root}/design_review_report_path.txt")
                        review_path = Path(review_pointer.read_text(encoding="utf-8").strip())
                        report = json.loads(review_path.read_text(encoding="utf-8"))

                        carried = []
                        for finding in report.get("findings", []):
                            status = str(finding.get("status", "")).upper()
                            if status in {"STILL_OPEN", "NEW", "SPLIT", "OPEN"}:
                                carried.append(finding)

                        open_findings_pointer = Path("${inputs.state_root}/open_findings_path.txt")
                        open_findings_path = Path(open_findings_pointer.read_text(encoding="utf-8").strip())
                        open_findings_path.parent.mkdir(parents=True, exist_ok=True)
                        open_findings_path.write_text(
                            json.dumps({"findings": carried}, indent=2) + "\n",
                            encoding="utf-8",
                        )
                        PY
                    expected_outputs:
                      - name: open_findings_path
                        path: ${inputs.state_root}/open_findings_path.txt
                        type: relpath
                        under: state
                        must_exist_target: true
                    publishes:
                      - artifact: open_findings
                        from: open_findings_path
                  - name: WriteRevisedBigDesignDecision
                    id: write_revised_big_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: REVISE
              ESCALATE_ROADMAP_REVISION:
                id: escalate_roadmap_revision_big_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
                    from:
                      ref: self.steps.WriteEscalateRoadmapRevisionBigDesignDecision.artifacts.review_decision
                steps:
                  - name: WriteEscalateRoadmapRevisionBigDesignDecision
                    id: write_escalate_roadmap_revision_big_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: ESCALATE_ROADMAP_REVISION
              BLOCK:
                id: block_big_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
                    from:
                      ref: self.steps.WriteBlockedBigDesignDecision.artifacts.review_decision
                steps:
                  - name: WriteBlockedBigDesignDecision
                    id: write_blocked_big_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: BLOCK

  - name: FinalizeBigDesignPhaseOutputs
    id: finalize_big_design_phase_outputs
    command:
      - bash
      - -lc
      - |
        cat "${inputs.state_root}/design_path.txt" > "${inputs.state_root}/final_design_path.txt"
        cat "${inputs.state_root}/design_review_report_path.txt" > "${inputs.state_root}/final_design_review_report_path.txt"
        cat "${inputs.state_root}/design_review_decision.txt" > "${inputs.state_root}/final_design_review_decision.txt"
        cat "${inputs.state_root}/design_escalation_context_path.txt" > "${inputs.state_root}/final_design_escalation_context_path.txt"
        cat "${inputs.state_root}/roadmap_change_request_path.txt" > "${inputs.state_root}/final_roadmap_change_request_path.txt"
    expected_outputs:
      - name: design_path
        path: ${inputs.state_root}/final_design_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: design_review_report_path
        path: ${inputs.state_root}/final_design_review_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: design_review_decision
        path: ${inputs.state_root}/final_design_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE", "ESCALATE_ROADMAP_REVISION", "BLOCK"]
      - name: design_escalation_context_path
        path: ${inputs.state_root}/final_design_escalation_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: roadmap_change_request_path
        path: ${inputs.state_root}/final_roadmap_change_request_path.txt
        type: relpath
        under: state
        must_exist_target: true
