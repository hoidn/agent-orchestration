version: "2.14"
name: "lisp-frontend-design-delta-work-item-v214"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

imports:
  plan_phase: ./lisp_frontend_design_delta_plan_phase.v214.yaml
  implementation_phase: ./lisp_frontend_design_delta_implementation_phase.v214.yaml

inputs:
  state_root:
    type: relpath
    under: state
  selection_bundle_path:
    type: relpath
    under: state
    must_exist_target: true
  manifest_path:
    type: relpath
    under: state
    must_exist_target: true
  architecture_bundle_path:
    type: relpath
    under: state
    required: false
  steering_path:
    type: relpath
    under: docs
    must_exist_target: true
  target_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  baseline_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  progress_ledger_path:
    type: relpath
    under: state
    must_exist_target: true
  run_state_path:
    type: relpath
    under: state
    must_exist_target: true
  artifact_work_root:
    type: relpath
    under: artifacts/work
    default: artifacts/work/LISP-FRONTEND-AUTONOMOUS-DRAIN
  artifact_checks_root:
    type: relpath
    under: artifacts/checks
    default: artifacts/checks/LISP-FRONTEND-AUTONOMOUS-DRAIN
  artifact_review_root:
    type: relpath
    under: artifacts/review
    default: artifacts/review/LISP-FRONTEND-AUTONOMOUS-DRAIN
  implementation_execute_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"
  implementation_review_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"
  claude_opus:
    command: ["claude", "-p", "${PROMPT}", "--model", "${model}", "--effort", "${effort}", "--permission-mode", "bypassPermissions"]
    input_mode: "argv"
    defaults:
      model: "opus"
      effort: "high"

outputs:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "BLOCKED"]
    from:
      ref: root.steps.RouteWorkItemTerminal.artifacts.drain_status
  item_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.RouteWorkItemTerminal.artifacts.item_summary_path

artifacts:
  design_revision_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCKED"]

steps:
  - name: ResolveWorkItemInputs
    id: resolve_work_item_inputs
    command:
      - python
      - workflows/library/scripts/materialize_lisp_frontend_work_item_inputs.py
      - --selection-path
      - ${inputs.selection_bundle_path}
      - --manifest-path
      - ${inputs.manifest_path}
      - --state-root
      - ${inputs.state_root}
      - --architecture-bundle-path
      - ${inputs.architecture_bundle_path}
      - --artifact-work-root
      - ${inputs.artifact_work_root}
      - --artifact-checks-root
      - ${inputs.artifact_checks_root}
      - --artifact-review-root
      - ${inputs.artifact_review_root}
      - --output
      - ${inputs.state_root}/work-item-inputs.json
    output_bundle:
      path: ${inputs.state_root}/work-item-inputs.json
      fields:
        - name: work_item_source
          json_pointer: /work_item_source
          type: enum
          allowed: ["BACKLOG_ITEM", "DESIGN_GAP"]
        - name: work_item_id
          json_pointer: /work_item_id
          type: string
        - name: work_item_context_path
          json_pointer: /work_item_context_path
          type: relpath
          under: state
          must_exist_target: true
        - name: check_commands_path
          json_pointer: /check_commands_path
          type: relpath
          under: state
          must_exist_target: true
        - name: plan_target_path
          json_pointer: /plan_target_path
          type: relpath
          under: docs/plans
        - name: execution_report_target_path
          json_pointer: /execution_report_target_path
          type: relpath
          under: artifacts/work
        - name: checks_report_target_path
          json_pointer: /checks_report_target_path
          type: relpath
          under: artifacts/checks
        - name: implementation_review_report_target_path
          json_pointer: /implementation_review_report_target_path
          type: relpath
          under: artifacts/review
        - name: item_summary_target_path
          json_pointer: /item_summary_target_path
          type: relpath
          under: artifacts/work
        - name: plan_phase_state_root
          json_pointer: /plan_phase_state_root
          type: relpath
          under: state
        - name: implementation_phase_state_root
          json_pointer: /implementation_phase_state_root
          type: relpath
          under: state
        - name: plan_review_report_target_path
          json_pointer: /plan_review_report_target_path
          type: relpath
          under: artifacts/review
        - name: progress_report_target_path
          json_pointer: /progress_report_target_path
          type: relpath
          under: artifacts/work

  - name: RunPlanPhase
    id: run_plan_phase
    call: plan_phase
    with:
      state_root:
        ref: root.steps.ResolveWorkItemInputs.artifacts.plan_phase_state_root
      steering_path:
        ref: inputs.steering_path
      target_design_path:
        ref: inputs.target_design_path
      baseline_design_path:
        ref: inputs.baseline_design_path
      work_item_context_path:
        ref: root.steps.ResolveWorkItemInputs.artifacts.work_item_context_path
      progress_ledger_path:
        ref: inputs.progress_ledger_path
      plan_target_path:
        ref: root.steps.ResolveWorkItemInputs.artifacts.plan_target_path
      plan_review_report_target_path:
        ref: root.steps.ResolveWorkItemInputs.artifacts.plan_review_report_target_path

  - name: RunImplementationPhase
    id: run_implementation_phase
    when:
      compare:
        left:
          ref: root.steps.RunPlanPhase.artifacts.plan_review_decision
        op: eq
        right: APPROVE
    call: implementation_phase
    with:
      state_root:
        ref: root.steps.ResolveWorkItemInputs.artifacts.implementation_phase_state_root
      target_design_path:
        ref: inputs.target_design_path
      baseline_design_path:
        ref: inputs.baseline_design_path
      plan_path:
        ref: root.steps.RunPlanPhase.artifacts.plan_path
      check_commands_path:
        ref: root.steps.ResolveWorkItemInputs.artifacts.check_commands_path
      execution_report_target_path:
        ref: root.steps.ResolveWorkItemInputs.artifacts.execution_report_target_path
      progress_report_target_path:
        ref: root.steps.ResolveWorkItemInputs.artifacts.progress_report_target_path
      checks_report_target_path:
        ref: root.steps.ResolveWorkItemInputs.artifacts.checks_report_target_path
      implementation_review_report_target_path:
        ref: root.steps.ResolveWorkItemInputs.artifacts.implementation_review_report_target_path
      implementation_execute_provider:
        ref: inputs.implementation_execute_provider
      implementation_review_provider:
        ref: inputs.implementation_review_provider

  - name: ClassifyWorkItemTerminal
    id: classify_work_item_terminal
    command:
      - python
      - workflows/library/scripts/classify_lisp_frontend_work_item_terminal.py
      - --plan-review-decision
      - ${steps.RunPlanPhase.artifacts.plan_review_decision}
      - --implementation-state-path
      - ${steps.ResolveWorkItemInputs.artifacts.implementation_phase_state_root}/final_implementation_state.txt
      - --implementation-review-decision-path
      - ${steps.ResolveWorkItemInputs.artifacts.implementation_phase_state_root}/final_implementation_review_decision.txt
      - --implementation-bundle-path
      - ${steps.ResolveWorkItemInputs.artifacts.implementation_phase_state_root}/implementation_state.json
      - --work-item-source
      - ${steps.ResolveWorkItemInputs.artifacts.work_item_source}
      - --output
      - ${inputs.state_root}/terminal-route.json
    output_bundle:
      path: ${inputs.state_root}/terminal-route.json
      fields:
        - name: terminal_route
          json_pointer: /terminal_route
          type: enum
          allowed: ["COMPLETE", "PLAN_REVIEW_EXHAUSTED", "IMPLEMENTATION_BLOCKED", "IMPLEMENTATION_REVIEW_EXHAUSTED"]
        - name: block_reason
          json_pointer: /block_reason
          type: enum
          allowed: ["none", "plan_review_exhausted", "implementation_blocked", "implementation_review_exhausted"]

  - name: ClassifyBlockedImplementationRecovery
    id: classify_blocked_implementation_recovery
    when:
      all_of:
        - compare:
            left:
              ref: root.steps.ClassifyWorkItemTerminal.artifacts.terminal_route
            op: eq
            right: IMPLEMENTATION_BLOCKED
        - compare:
            left:
              ref: root.steps.ResolveWorkItemInputs.artifacts.work_item_source
            op: eq
            right: DESIGN_GAP
    provider: ${inputs.implementation_review_provider}
    asset_file: prompts/lisp_frontend_design_delta_work_item/classify_blocked_implementation_recovery.md
    timeout_sec: 1800
    depends_on:
      required:
        - ${inputs.target_design_path}
        - ${inputs.baseline_design_path}
        - ${inputs.state_root}/work-item-inputs.json
        - ${inputs.state_root}/implementation-phase/plan_path.txt
        - ${inputs.state_root}/implementation-phase/implementation_state.json
        - ${inputs.state_root}/implementation-phase/progress_report_path.txt
      inject:
        mode: content
    output_bundle:
      path: ${inputs.state_root}/blocked-implementation-recovery.json
      fields:
        - name: blocked_recovery_route
          json_pointer: /blocked_recovery_route
          type: enum
          allowed: ["GAP_DESIGN_REVISION_REQUIRED", "TARGET_DESIGN_REVISION_REQUIRED", "PREREQUISITE_GAP_REQUIRED", "TERMINAL_BLOCKED"]
        - name: reason
          json_pointer: /reason
          type: enum
          allowed:
            - implementation_architecture_under_scoped
            - target_design_contract_gap
            - prerequisite_gap_required
            - true_external_dependency
            - user_decision_required
            - unsupported_blocker
        - name: summary
          json_pointer: /summary
          type: string

  - name: SelectBlockedRecoveryRoute
    id: select_blocked_recovery_route
    command:
      - python
      - workflows/library/scripts/select_lisp_frontend_blocked_recovery_route.py
      - --terminal-route
      - ${steps.ClassifyWorkItemTerminal.artifacts.terminal_route}
      - --work-item-source
      - ${steps.ResolveWorkItemInputs.artifacts.work_item_source}
      - --classifier-bundle-path
      - ${inputs.state_root}/blocked-implementation-recovery.json
      - --output
      - ${inputs.state_root}/blocked-recovery-route.json
    output_bundle:
      path: ${inputs.state_root}/blocked-recovery-route.json
      fields:
        - name: blocked_recovery_route
          json_pointer: /blocked_recovery_route
          type: enum
          allowed: ["NOT_APPLICABLE", "GAP_DESIGN_REVISION_REQUIRED", "TARGET_DESIGN_REVISION_REQUIRED", "PREREQUISITE_GAP_REQUIRED", "TERMINAL_BLOCKED"]
        - name: reason
          json_pointer: /reason
          type: enum
          allowed:
            - not_blocked
            - implementation_blocked
            - implementation_architecture_under_scoped
            - target_design_contract_gap
            - prerequisite_gap_required
            - true_external_dependency
            - user_decision_required
            - unsupported_blocker

  - name: RouteWorkItemTerminal
    id: route_work_item_terminal
    match:
      ref: root.steps.ClassifyWorkItemTerminal.artifacts.terminal_route
      cases:
        COMPLETE:
          id: complete_path
          outputs:
            drain_status:
              kind: scalar
              type: enum
              allowed: ["CONTINUE", "BLOCKED"]
              from:
                ref: self.steps.RecordCompletedWorkItem.artifacts.drain_status
            item_summary_path:
              type: relpath
              under: artifacts/work
              must_exist_target: true
              from:
                ref: self.steps.RecordCompletedWorkItem.artifacts.item_summary_path
          steps:
            - name: RecordCompletedWorkItem
              id: record_completed_work_item
              command: &record_completed_command
                - python
                - workflows/library/scripts/update_lisp_frontend_run_state.py
                - --state-path
                - ${inputs.run_state_path}
                - complete
                - --item-id
                - ${steps.ResolveWorkItemInputs.artifacts.work_item_id}
                - --source
                - ${steps.ResolveWorkItemInputs.artifacts.work_item_source}
                - --summary-path
                - ${steps.ResolveWorkItemInputs.artifacts.item_summary_target_path}
                - --summary-pointer-path
                - ${inputs.state_root}/item_summary_path.txt
                - --drain-status-path
                - ${inputs.state_root}/drain_status.txt
              expected_outputs: &terminal_outputs
                - name: drain_status
                  path: ${inputs.state_root}/drain_status.txt
                  type: enum
                  allowed: ["CONTINUE", "BLOCKED"]
                - name: item_summary_path
                  path: ${inputs.state_root}/item_summary_path.txt
                  type: relpath
                  under: artifacts/work
                  must_exist_target: true
        PLAN_REVIEW_EXHAUSTED:
          id: plan_review_exhausted_path
          outputs:
            drain_status:
              kind: scalar
              type: enum
              allowed: ["CONTINUE", "BLOCKED"]
              from:
                ref: self.steps.RecordPlanReviewExhausted.artifacts.drain_status
            item_summary_path:
              type: relpath
              under: artifacts/work
              must_exist_target: true
              from:
                ref: self.steps.RecordPlanReviewExhausted.artifacts.item_summary_path
          steps:
            - name: RecordPlanReviewExhausted
              id: record_plan_review_exhausted
              command:
                - python
                - workflows/library/scripts/update_lisp_frontend_run_state.py
                - --state-path
                - ${inputs.run_state_path}
                - blocked
                - --item-id
                - ${steps.ResolveWorkItemInputs.artifacts.work_item_id}
                - --source
                - ${steps.ResolveWorkItemInputs.artifacts.work_item_source}
                - --reason
                - plan_review_exhausted
                - --summary-path
                - ${steps.ResolveWorkItemInputs.artifacts.item_summary_target_path}
                - --summary-pointer-path
                - ${inputs.state_root}/item_summary_path.txt
                - --drain-status-path
                - ${inputs.state_root}/drain_status.txt
              expected_outputs: *terminal_outputs
        IMPLEMENTATION_BLOCKED:
          id: implementation_blocked_path
          outputs:
            drain_status:
              kind: scalar
              type: enum
              allowed: ["CONTINUE", "BLOCKED"]
              from:
                ref: self.steps.RecordBlockedRecoveryOutcome.artifacts.drain_status
            item_summary_path:
              type: relpath
              under: artifacts/work
              must_exist_target: true
              from:
                ref: self.steps.RecordBlockedRecoveryOutcome.artifacts.item_summary_path
          steps:
            - name: RecordBlockedRecoveryOutcome
              id: record_blocked_recovery_outcome
              command:
                - python
                - workflows/library/scripts/record_lisp_frontend_blocked_recovery_outcome.py
                - --recovery-route
                - ${steps.SelectBlockedRecoveryRoute.artifacts.blocked_recovery_route}
                - --reason
                - ${steps.SelectBlockedRecoveryRoute.artifacts.reason}
                - --target-design-review-decision
                - NOT_APPLICABLE
                - --terminal-action
                - continue
                - --state-path
                - ${inputs.run_state_path}
                - --item-id
                - ${steps.ResolveWorkItemInputs.artifacts.work_item_id}
                - --source
                - ${steps.ResolveWorkItemInputs.artifacts.work_item_source}
                - --progress-report-path
                - ${steps.ResolveWorkItemInputs.artifacts.progress_report_target_path}
                - --implementation-state-path
                - ${steps.ResolveWorkItemInputs.artifacts.implementation_phase_state_root}/implementation_state.json
                - --architecture-bundle-path
                - ${inputs.architecture_bundle_path}
                - --plan-path
                - ${steps.RunPlanPhase.artifacts.plan_path}
                - --recovery-event-id
                - ${run.id}:${steps.ResolveWorkItemInputs.artifacts.work_item_id}:implementation-blocked
                - --summary-path
                - ${steps.ResolveWorkItemInputs.artifacts.item_summary_target_path}
                - --summary-pointer-path
                - ${inputs.state_root}/item_summary_path.txt
                - --drain-status-path
                - ${inputs.state_root}/drain_status.txt
              expected_outputs: *terminal_outputs
        IMPLEMENTATION_REVIEW_EXHAUSTED:
          id: implementation_review_exhausted_path
          outputs:
            drain_status:
              kind: scalar
              type: enum
              allowed: ["CONTINUE", "BLOCKED"]
              from:
                ref: self.steps.RecordImplementationReviewExhausted.artifacts.drain_status
            item_summary_path:
              type: relpath
              under: artifacts/work
              must_exist_target: true
              from:
                ref: self.steps.RecordImplementationReviewExhausted.artifacts.item_summary_path
          steps:
            - name: RecordImplementationReviewExhausted
              id: record_implementation_review_exhausted
              command:
                - python
                - workflows/library/scripts/update_lisp_frontend_run_state.py
                - --state-path
                - ${inputs.run_state_path}
                - blocked
                - --item-id
                - ${steps.ResolveWorkItemInputs.artifacts.work_item_id}
                - --source
                - ${steps.ResolveWorkItemInputs.artifacts.work_item_source}
                - --reason
                - implementation_review_exhausted
                - --summary-path
                - ${steps.ResolveWorkItemInputs.artifacts.item_summary_target_path}
                - --summary-pointer-path
                - ${inputs.state_root}/item_summary_path.txt
                - --drain-status-path
                - ${inputs.state_root}/drain_status.txt
              expected_outputs: *terminal_outputs
