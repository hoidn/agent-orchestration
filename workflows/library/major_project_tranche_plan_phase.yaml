version: "2.12"
name: "major-project-tranche-plan-phase"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  state_root:
    type: relpath
    under: state
  design_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  scope_boundary_path:
    type: relpath
    under: state
    must_exist_target: true
  project_roadmap_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  tranche_manifest_path:
    type: relpath
    under: state
    must_exist_target: true
  plan_target_path:
    type: relpath
    under: docs/plans
  plan_review_report_target_path:
    type: relpath
    under: artifacts/review
  upstream_escalation_context_path:
    type: relpath

outputs:
  plan_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
    from:
      ref: root.steps.FinalizePlanPhaseOutputs.artifacts.plan_path
  plan_review_report_path:
    type: relpath
    under: artifacts/review
    must_exist_target: true
    from:
      ref: root.steps.FinalizePlanPhaseOutputs.artifacts.plan_review_report_path
  plan_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
    from:
      ref: root.steps.FinalizePlanPhaseOutputs.artifacts.plan_review_decision
  plan_escalation_context_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.FinalizePlanPhaseOutputs.artifacts.plan_escalation_context_path

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"

artifacts:
  design:
    pointer: ${inputs.state_root}/design_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  scope_boundary:
    pointer: ${inputs.state_root}/scope_boundary_path.txt
    type: relpath
    under: state
    must_exist_target: true
  project_roadmap:
    pointer: ${inputs.state_root}/project_roadmap_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  tranche_manifest:
    pointer: ${inputs.state_root}/tranche_manifest_path.txt
    type: relpath
    under: state
    must_exist_target: true
  plan:
    pointer: ${inputs.state_root}/plan_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  plan_review_report:
    pointer: ${inputs.state_root}/plan_review_report_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
  plan_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
  upstream_escalation_context:
    pointer: ${inputs.state_root}/upstream_escalation_context_path.txt
    type: relpath
    under: state
    must_exist_target: true
  plan_escalation_context:
    pointer: ${inputs.state_root}/plan_escalation_context_path.txt
    type: relpath
    under: state
    must_exist_target: true
  open_findings:
    pointer: ${inputs.state_root}/open_findings_path.txt
    type: relpath
    under: state
    must_exist_target: true
  review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
  loop_exhausted:
    kind: scalar
    type: bool

steps:
  - name: InitializePlanPhasePaths
    id: initialize_plan_phase_paths
    command:
      - bash
      - -lc
      - |
        mkdir -p "${inputs.state_root}" docs/plans artifacts/review
        printf '%s\n' "${inputs.plan_target_path}" > "${inputs.state_root}/plan_path.txt"
        printf '%s\n' "${inputs.plan_review_report_target_path}" > "${inputs.state_root}/plan_review_report_path.txt"
        printf '%s\n' "${inputs.state_root}/plan_escalation_context.json" > "${inputs.state_root}/plan_escalation_context_path.txt"
        printf '%s\n' "${inputs.state_root}/open_findings.json" > "${inputs.state_root}/open_findings_path.txt"
        cat > "${inputs.state_root}/plan_escalation_context.json" <<'JSON'
        {
          "active": false,
          "source_phase": "plan",
          "decision": null,
          "recommended_next_phase": null,
          "reason_summary": "",
          "must_change": [],
          "evidence_paths": {}
        }
        JSON
        cat > "${inputs.state_root}/open_findings.json" <<'JSON'
        {
          "findings": []
        }
        JSON
    expected_outputs:
      - name: plan_path
        path: ${inputs.state_root}/plan_path.txt
        type: relpath
        under: docs/plans
      - name: plan_review_report_path
        path: ${inputs.state_root}/plan_review_report_path.txt
        type: relpath
        under: artifacts/review
      - name: open_findings_path
        path: ${inputs.state_root}/open_findings_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: plan_escalation_context_path
        path: ${inputs.state_root}/plan_escalation_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: open_findings
        from: open_findings_path
      - artifact: plan_escalation_context
        from: plan_escalation_context_path

  - name: PublishDesignInput
    id: publish_design_input
    command:
      - bash
      - -lc
      - |
        if [ ! -f "${inputs.design_path}" ]; then
          echo "Missing design file: ${inputs.design_path}" >&2
          exit 1
        fi
        printf '%s\n' "${inputs.design_path}" > "${inputs.state_root}/design_path.txt"
        printf '%s\n' "${inputs.scope_boundary_path}" > "${inputs.state_root}/scope_boundary_path.txt"
        printf '%s\n' "${inputs.project_roadmap_path}" > "${inputs.state_root}/project_roadmap_path.txt"
        printf '%s\n' "${inputs.tranche_manifest_path}" > "${inputs.state_root}/tranche_manifest_path.txt"
        printf '%s\n' "${inputs.upstream_escalation_context_path}" > "${inputs.state_root}/upstream_escalation_context_path.txt"
    expected_outputs:
      - name: design_path
        path: ${inputs.state_root}/design_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: upstream_escalation_context_path
        path: ${inputs.state_root}/upstream_escalation_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: scope_boundary_path
        path: ${inputs.state_root}/scope_boundary_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: project_roadmap_path
        path: ${inputs.state_root}/project_roadmap_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: tranche_manifest_path
        path: ${inputs.state_root}/tranche_manifest_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: design
        from: design_path
      - artifact: scope_boundary
        from: scope_boundary_path
      - artifact: project_roadmap
        from: project_roadmap_path
      - artifact: tranche_manifest
        from: tranche_manifest_path
      - artifact: upstream_escalation_context
        from: upstream_escalation_context_path

  - name: DraftPlan
    id: draft_plan
    provider: codex
    asset_file: prompts/major_project_stack/draft_plan.md
    timeout_sec: 3600
    consumes:
      - artifact: design
        policy: latest_successful
        freshness: any
      - artifact: scope_boundary
        policy: latest_successful
        freshness: any
      - artifact: project_roadmap
        policy: latest_successful
        freshness: any
      - artifact: tranche_manifest
        policy: latest_successful
        freshness: any
      - artifact: upstream_escalation_context
        policy: latest_successful
        freshness: any
    prompt_consumes: ["design", "scope_boundary", "project_roadmap", "tranche_manifest", "upstream_escalation_context"]
    expected_outputs:
      - name: plan_path
        path: ${inputs.state_root}/plan_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
    publishes:
      - artifact: plan
        from: plan_path

  - name: PlanReviewLoop
    id: plan_review_loop
    repeat_until:
      id: plan_review_iteration
      max_iterations: 12
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
          from:
            ref: self.steps.RoutePlanDecision.artifacts.review_decision
        loop_exhausted:
          kind: scalar
          type: bool
          from:
            ref: self.steps.MarkPlanLoopNotExhausted.artifacts.loop_exhausted
      on_exhausted:
        outputs:
          review_decision: ESCALATE_REDESIGN
          loop_exhausted: true
      condition:
        any_of:
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: APPROVE
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: ESCALATE_REDESIGN
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: BLOCK
      steps:
        - name: ReviewPlanTracked
          id: review_plan_tracked
          provider: codex
          asset_file: prompts/major_project_stack/review_plan.md
          timeout_sec: 1800
          consumes:
            - artifact: design
              policy: latest_successful
              freshness: any
            - artifact: scope_boundary
              policy: latest_successful
              freshness: any
            - artifact: project_roadmap
              policy: latest_successful
              freshness: any
            - artifact: tranche_manifest
              policy: latest_successful
              freshness: any
            - artifact: plan
              policy: latest_successful
              freshness: any
            - artifact: open_findings
              policy: latest_successful
              freshness: any
            - artifact: upstream_escalation_context
              policy: latest_successful
              freshness: any
          prompt_consumes: ["design", "scope_boundary", "project_roadmap", "tranche_manifest", "plan", "open_findings", "upstream_escalation_context"]
          expected_outputs:
            - name: plan_review_report_path
              path: ${inputs.state_root}/plan_review_report_path.txt
              type: relpath
              under: artifacts/review
              must_exist_target: true
            - name: plan_review_decision
              path: ${inputs.state_root}/plan_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
            - name: plan_escalation_context_path
              path: ${inputs.state_root}/plan_escalation_context_path.txt
              type: relpath
              under: state
              must_exist_target: true
            - name: unresolved_high_count
              path: ${inputs.state_root}/unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/unresolved_medium_count.txt
              type: integer
          publishes:
            - artifact: plan_review_report
              from: plan_review_report_path
            - artifact: plan_review_decision
              from: plan_review_decision
            - artifact: plan_escalation_context
              from: plan_escalation_context_path

        - name: RoutePlanDecision
          id: route_plan_decision
          match:
            ref: self.steps.ReviewPlanTracked.artifacts.plan_review_decision
            cases:
              APPROVE:
                id: approve_plan_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
                    from:
                      ref: self.steps.WriteApprovedPlanDecision.artifacts.review_decision
                steps:
                  - name: WriteApprovedPlanDecision
                    id: write_approved_plan_decision
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_plan_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
                    from:
                      ref: self.steps.WriteRevisedPlanDecision.artifacts.review_decision
                steps:
                  - name: RevisePlanTracked
                    id: revise_plan_tracked
                    provider: codex
                    asset_file: prompts/major_project_stack/revise_plan.md
                    timeout_sec: 3600
                    consumes:
                      - artifact: design
                        policy: latest_successful
                        freshness: any
                      - artifact: scope_boundary
                        policy: latest_successful
                        freshness: any
                      - artifact: project_roadmap
                        policy: latest_successful
                        freshness: any
                      - artifact: tranche_manifest
                        policy: latest_successful
                        freshness: any
                      - artifact: plan
                        policy: latest_successful
                        freshness: any
                      - artifact: plan_review_report
                        policy: latest_successful
                        freshness: any
                      - artifact: upstream_escalation_context
                        policy: latest_successful
                        freshness: any
                    prompt_consumes: ["design", "scope_boundary", "project_roadmap", "tranche_manifest", "plan", "plan_review_report", "upstream_escalation_context"]
                    expected_outputs:
                      - name: plan_path
                        path: ${inputs.state_root}/plan_path.txt
                        type: relpath
                        under: docs/plans
                        must_exist_target: true
                    publishes:
                      - artifact: plan
                        from: plan_path
                  - name: ExtractOpenPlanFindings
                    id: extract_open_plan_findings
                    command:
                      - bash
                      - -lc
                      - |
                        python - <<'PY'
                        import json
                        from pathlib import Path

                        review_pointer = Path("${inputs.state_root}/plan_review_report_path.txt")
                        review_path = Path(review_pointer.read_text(encoding="utf-8").strip())
                        report = json.loads(review_path.read_text(encoding="utf-8"))

                        carried = []
                        for finding in report.get("findings", []):
                            if finding.get("status") in {"STILL_OPEN", "NEW", "SPLIT"}:
                                carried.append(finding)

                        open_findings_pointer = Path("${inputs.state_root}/open_findings_path.txt")
                        open_findings_path = Path(open_findings_pointer.read_text(encoding="utf-8").strip())
                        open_findings_path.parent.mkdir(parents=True, exist_ok=True)
                        open_findings_path.write_text(
                            json.dumps({"findings": carried}, indent=2) + "\n",
                            encoding="utf-8",
                        )
                        PY
                    expected_outputs:
                      - name: open_findings_path
                        path: ${inputs.state_root}/open_findings_path.txt
                        type: relpath
                        under: state
                        must_exist_target: true
                    publishes:
                      - artifact: open_findings
                        from: open_findings_path
                  - name: WriteRevisedPlanDecision
                    id: write_revised_plan_decision
                    set_scalar:
                      artifact: review_decision
                      value: REVISE
              ESCALATE_REDESIGN:
                id: escalate_redesign_plan_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
                    from:
                      ref: self.steps.WriteEscalateRedesignPlanDecision.artifacts.review_decision
                steps:
                  - name: WriteEscalateRedesignPlanDecision
                    id: write_escalate_redesign_plan_decision
                    set_scalar:
                      artifact: review_decision
                      value: ESCALATE_REDESIGN
              BLOCK:
                id: block_plan_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
                    from:
                      ref: self.steps.WriteBlockedPlanDecision.artifacts.review_decision
                steps:
                  - name: WriteBlockedPlanDecision
                    id: write_blocked_plan_decision
                    set_scalar:
                      artifact: review_decision
                      value: BLOCK
        - name: MarkPlanLoopNotExhausted
          id: mark_plan_loop_not_exhausted
          set_scalar:
            artifact: loop_exhausted
            value: false

  - name: ActivatePlanExhaustionEscalation
    id: activate_plan_exhaustion_escalation
    when:
      artifact_bool:
        ref: root.steps.PlanReviewLoop.artifacts.loop_exhausted
    command:
      - python
      - -c
      - |
        import json
        from pathlib import Path

        state_root = Path("${inputs.state_root}")
        plan_path = state_root.joinpath("plan_path.txt").read_text(encoding="utf-8").strip()
        review_path = state_root.joinpath("plan_review_report_path.txt").read_text(encoding="utf-8").strip()

        def read_int(name):
            path = state_root / name
            if not path.is_file():
                return None
            try:
                return int(path.read_text(encoding="utf-8").strip())
            except ValueError:
                return None

        state_root.joinpath("plan_review_decision.txt").write_text(
            "ESCALATE_REDESIGN\n",
            encoding="utf-8",
        )
        context = {
            "active": True,
            "reason": "repeat_until_iterations_exhausted",
            "source_phase": "plan",
            "phase": "plan_review",
            "decision": "ESCALATE_REDESIGN",
            "target_route": "ESCALATE_REDESIGN",
            "recommended_next_phase": "design_revision",
            "max_iterations": 12,
            "last_review_decision": "REVISE",
            "last_candidate_artifact_path": plan_path,
            "last_review_report_path": review_path,
            "unresolved_high_count": read_int("unresolved_high_count.txt"),
            "unresolved_medium_count": read_int("unresolved_medium_count.txt"),
            "reason_summary": "Plan review exhausted its iteration cap before reaching approval, block, or reviewer-authored redesign escalation.",
            "must_change": [
                "Review whether the approved design is too broad, under-specified, wrongly scoped, or missing a planning-critical architectural decision."
            ],
            "evidence_paths": {
                "plan": plan_path,
                "review_report": review_path,
            },
        }
        state_root.joinpath("plan_escalation_context.json").write_text(
            json.dumps(context, indent=2) + "\n",
            encoding="utf-8",
        )

  - name: FinalizePlanPhaseOutputs
    id: finalize_plan_phase_outputs
    command:
      - bash
      - -lc
      - |
        cat "${inputs.state_root}/plan_path.txt" > "${inputs.state_root}/final_plan_path.txt"
        cat "${inputs.state_root}/plan_review_report_path.txt" > "${inputs.state_root}/final_plan_review_report_path.txt"
        cat "${inputs.state_root}/plan_review_decision.txt" > "${inputs.state_root}/final_plan_review_decision.txt"
        cat "${inputs.state_root}/plan_escalation_context_path.txt" > "${inputs.state_root}/final_plan_escalation_context_path.txt"
    expected_outputs:
      - name: plan_path
        path: ${inputs.state_root}/final_plan_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: plan_review_report_path
        path: ${inputs.state_root}/final_plan_review_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: plan_review_decision
        path: ${inputs.state_root}/final_plan_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE", "ESCALATE_REDESIGN", "BLOCK"]
      - name: plan_escalation_context_path
        path: ${inputs.state_root}/final_plan_escalation_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
