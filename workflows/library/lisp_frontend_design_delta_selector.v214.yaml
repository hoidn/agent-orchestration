version: "2.14"
name: "lisp-frontend-design-delta-selector-v214"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  state_root:
    type: relpath
    under: state
  steering_path:
    type: relpath
    under: docs
    must_exist_target: true
  target_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  baseline_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  manifest_path:
    type: relpath
    under: state
    must_exist_target: true
  selector_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude"]
    default: "claude"
  selector_model:
    kind: scalar
    type: string
    default: "fable"
  selector_effort:
    kind: scalar
    type: string
    default: "high"

outputs:
  selection_status:
    kind: scalar
    type: enum
    allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]
    from:
      ref: root.steps.SelectNextWork.artifacts.selection_status
  selection_bundle_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.PublishSelectionBundle.artifacts.selection_bundle_path

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"
  claude:
    command: ["claude", "-p", "--model", "${model}", "--effort", "${effort}", "--permission-mode", "bypassPermissions"]
    input_mode: "stdin"
    defaults:
      model: "fable"
      effort: "high"

artifacts:
  steering:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/steering_path.txt
    under: docs
    must_exist_target: true
  target_design:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/target_design_path.txt
    under: docs/design
    must_exist_target: true
  baseline_design:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/baseline_design_path.txt
    under: docs/design
    must_exist_target: true
  manifest:
    kind: relpath
    type: relpath
    pointer: ${inputs.state_root}/manifest_path.txt
    under: state
    must_exist_target: true

steps:
  - name: MaterializeSelectorInputs
    id: materialize_selector_inputs
    materialize_artifacts:
      input_values:
        - names:
            - steering_path
            - target_design_path
            - baseline_design_path
            - manifest_path
          contract: inherit
          pointer_template: ${inputs.state_root}/{name}.txt
    publishes:
      - artifact: steering
        from: steering_path
      - artifact: target_design
        from: target_design_path
      - artifact: baseline_design
        from: baseline_design_path
      - artifact: manifest
        from: manifest_path

  - name: ValidateSelectorProviderRouting
    id: validate_selector_provider_routing
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import subprocess
        import sys

        provider = sys.argv[1]
        model = sys.argv[2]
        effort = sys.argv[3]
        output_path = pathlib.Path(sys.argv[4])

        errors = []
        requested_provider = provider
        requested_model = model
        requested_effort = effort
        fallback_reason = ""
        if provider == "claude" and model not in {"opus", "fable", "claude-fable-5"}:
            errors.append(f"selector via Claude must use a supported Claude model alias, got {model!r}")
        if provider == "codex" and not (
            model.startswith("gpt-")
            or "codex" in model
        ):
            errors.append(f"provider=codex requires a Codex/OpenAI model, got {model!r}")
        codex_efforts = {"low", "medium", "high", "xhigh"}
        claude_efforts = {"low", "medium", "high", "xhigh", "max"}
        allowed_efforts = claude_efforts if provider == "claude" else codex_efforts
        if effort not in allowed_efforts:
            errors.append(
                f"unsupported effort {effort!r} for provider={provider}; "
                f"allowed={sorted(allowed_efforts)}"
            )
        if provider == "claude" and not errors:
            probe = subprocess.run(
                [
                    "claude",
                    "-p",
                    "--model",
                    model,
                    "--effort",
                    effort,
                    "--permission-mode",
                    "bypassPermissions",
                ],
                input="Say OK only.\n",
                text=True,
                stdout=subprocess.PIPE,
                stderr=subprocess.STDOUT,
                timeout=45,
                check=False,
            )
            if probe.returncode != 0:
                provider = "codex"
                model = "gpt-5.5"
                effort = "high"
                fallback_reason = (
                    "Claude selector model unavailable; falling back to Codex gpt-5.5. "
                    + (probe.stdout or "").strip()
                )

        output_path.parent.mkdir(parents=True, exist_ok=True)
        payload = {
            "provider": provider,
            "model": model,
            "effort": effort,
            "requested_provider": requested_provider,
            "requested_model": requested_model,
            "requested_effort": requested_effort,
            "fallback_reason": fallback_reason,
            "routing_status": "INVALID" if errors else "VALID",
            "errors": errors,
        }
        output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
        if errors:
            raise SystemExit("; ".join(errors))
      - ${inputs.selector_provider}
      - ${inputs.selector_model}
      - ${inputs.selector_effort}
      - ${inputs.state_root}/selector-provider-routing.json
    output_bundle:
      path: ${inputs.state_root}/selector-provider-routing.json
      fields:
        - name: routing_status
          json_pointer: /routing_status
          type: enum
          allowed: ["VALID", "INVALID"]
        - name: provider
          json_pointer: /provider
          type: string
        - name: model
          json_pointer: /model
          type: string
        - name: effort
          json_pointer: /effort
          type: string

  - name: SelectNextWork
    id: select_next_work
    provider: ${steps.ValidateSelectorProviderRouting.artifacts.provider}
    provider_params:
      model: ${steps.ValidateSelectorProviderRouting.artifacts.model}
      effort: ${steps.ValidateSelectorProviderRouting.artifacts.effort}
    asset_file: prompts/lisp_frontend_selector/select_next_design_delta_work.md
    timeout_sec: 1800
    consumes:
      - artifact: steering
        policy: latest_successful
        freshness: any
      - artifact: target_design
        policy: latest_successful
        freshness: any
      - artifact: baseline_design
        policy: latest_successful
        freshness: any
      - artifact: manifest
        policy: latest_successful
        freshness: any
    prompt_consumes: ["steering", "target_design", "manifest"]
    output_bundle:
      path: ${inputs.state_root}/selection.json
      fields:
        - name: selection_status
          json_pointer: /selection_status
          type: enum
          allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]

  - name: PublishSelectionBundle
    id: publish_selection_bundle
    command:
      - python
      - workflows/library/scripts/publish_lisp_frontend_selection_bundle.py
      - --selection-path
      - ${inputs.state_root}/selection.json
      - --manifest-path
      - ${inputs.manifest_path}
      - --output
      - ${inputs.state_root}/selection-bundle-path.json
    output_bundle:
      path: ${inputs.state_root}/selection-bundle-path.json
      fields:
        - name: selection_bundle_path
          json_pointer: /selection_bundle_path
          type: relpath
          under: state
          must_exist_target: true
