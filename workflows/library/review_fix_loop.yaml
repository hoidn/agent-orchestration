version: "2.5"
name: review-fix-loop
inputs:
  write_root:
    kind: relpath
    type: relpath
artifacts:
  approved:
    kind: scalar
    type: bool
outputs:
  approved:
    kind: scalar
    type: bool
    from:
      ref: root.steps.SetApproved.artifacts.approved
steps:
  - name: WriteHistory
    id: write_history
    command:
      - bash
      - -lc
      - mkdir -p "$(dirname "${inputs.write_root}/history.log")" && printf 'review-loop-started\n'
    output_file: ${inputs.write_root}/history.log
  - name: SetApproved
    id: set_approved
    set_scalar:
      artifact: approved
      value: true
