version: "2.14"
name: "lisp-frontend-design-delta-design-gap-architect-v214"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  state_root:
    type: relpath
    under: state
  steering_path:
    type: relpath
    under: docs
    must_exist_target: true
  target_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  baseline_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  command_adapter_contract_path:
    type: relpath
    under: docs/design
    default: docs/design/workflow_command_adapter_contract.md
    must_exist_target: true
  progress_ledger_path:
    type: relpath
    under: state
    must_exist_target: true
  selection_bundle_path:
    type: relpath
    under: state
    must_exist_target: true
  architecture_index_root:
    type: relpath
    under: docs/plans
    default: docs/plans/LISP-FRONTEND-AUTONOMOUS-DRAIN/design-gaps
  design_gap_draft_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude"]
    default: "codex"
  design_gap_draft_model:
    kind: scalar
    type: string
    default: "gpt-5.5"
  design_gap_draft_effort:
    kind: scalar
    type: string
    default: "high"

outputs:
  architecture_validation_status:
    kind: scalar
    type: enum
    allowed: ["VALID", "BLOCKED", "INVALID"]
    from:
      ref: root.steps.ValidateDesignGapArchitecture.artifacts.architecture_validation_status
  work_item_bundle_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.ValidateDesignGapArchitecture.artifacts.work_item_bundle_path

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"
  claude:
    command: ["claude", "-p", "--model", "${model}", "--effort", "${effort}", "--permission-mode", "bypassPermissions"]
    input_mode: "stdin"
    defaults:
      model: "fable"
      effort: "high"

artifacts:
  review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCKED"]

steps:
  - name: PrepareArchitectureTargets
    id: prepare_architecture_targets
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import re
        import sys

        state_root = pathlib.Path(sys.argv[1])
        selection = json.loads(pathlib.Path(sys.argv[2]).read_text(encoding="utf-8"))
        gap_id = str(selection.get("design_gap_id") or "design-gap").strip()
        gap_id = re.sub(r"[^a-z0-9-]+", "-", gap_id.lower()).strip("-") or "design-gap"
        base = pathlib.Path(sys.argv[3]) / gap_id
        payload = {
            "design_gap_id": gap_id,
            "architecture_path": (base / "implementation_architecture.md").as_posix(),
            "work_item_context_path": (state_root / "work_item_context.md").as_posix(),
            "check_commands_path": (state_root / "check_commands.json").as_posix(),
            "plan_target_path": (base / "execution_plan.md").as_posix(),
        }
        state_root.mkdir(parents=True, exist_ok=True)
        pathlib.Path(payload["architecture_path"]).parent.mkdir(parents=True, exist_ok=True)
        pathlib.Path(payload["work_item_context_path"]).parent.mkdir(parents=True, exist_ok=True)
        pathlib.Path(sys.argv[4]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
      - ${inputs.state_root}
      - ${inputs.selection_bundle_path}
      - ${inputs.architecture_index_root}
      - ${inputs.state_root}/architecture-targets.json
    output_bundle:
      path: ${inputs.state_root}/architecture-targets.json
      fields:
        - name: design_gap_id
          json_pointer: /design_gap_id
          type: string
        - name: architecture_path
          json_pointer: /architecture_path
          type: relpath
          under: docs/plans
        - name: work_item_context_path
          json_pointer: /work_item_context_path
          type: relpath
          under: state
        - name: check_commands_path
          json_pointer: /check_commands_path
          type: relpath
          under: state
        - name: plan_target_path
          json_pointer: /plan_target_path
          type: relpath
          under: docs/plans

  - name: BuildExistingArchitectureIndex
    id: build_existing_architecture_index
    command:
      - python
      - workflows/library/scripts/build_lisp_frontend_architecture_index.py
      - --root
      - ${inputs.architecture_index_root}
      - --exclude
      - ${steps.PrepareArchitectureTargets.artifacts.architecture_path}
      - --output
      - ${inputs.state_root}/existing-architecture-index.md
      - --bundle
      - ${inputs.state_root}/existing-architecture-index.json
    output_bundle:
      path: ${inputs.state_root}/existing-architecture-index.json
      fields:
        - name: architecture_index_path
          json_pointer: /architecture_index_path
          type: relpath
          under: state
          must_exist_target: true
        - name: existing_architecture_count
          json_pointer: /existing_architecture_count
          type: integer

  - name: ValidateDesignGapDraftProviderRouting
    id: validate_design_gap_draft_provider_routing
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import subprocess
        import sys

        provider = sys.argv[1]
        model = sys.argv[2]
        effort = sys.argv[3]
        output_path = pathlib.Path(sys.argv[4])

        errors = []
        requested_provider = provider
        requested_model = model
        requested_effort = effort
        fallback_reason = ""
        if provider == "claude" and model not in {"opus", "fable", "claude-fable-5"}:
            errors.append(f"design-gap drafting via Claude must use a supported Claude model alias, got {model!r}")
        if provider == "codex" and not (
            model.startswith("gpt-")
            or "codex" in model
        ):
            errors.append(f"provider=codex requires a Codex/OpenAI model, got {model!r}")
        codex_efforts = {"low", "medium", "high", "xhigh"}
        claude_efforts = {"low", "medium", "high", "xhigh", "max"}
        allowed_efforts = claude_efforts if provider == "claude" else codex_efforts
        if effort not in allowed_efforts:
            errors.append(
                f"unsupported effort {effort!r} for provider={provider}; "
                f"allowed={sorted(allowed_efforts)}"
            )
        if provider == "claude" and not errors:
            probe = subprocess.run(
                [
                    "claude",
                    "-p",
                    "--model",
                    model,
                    "--effort",
                    effort,
                    "--permission-mode",
                    "bypassPermissions",
                ],
                input="Say OK only.\n",
                text=True,
                stdout=subprocess.PIPE,
                stderr=subprocess.STDOUT,
                timeout=45,
                check=False,
            )
            if probe.returncode != 0:
                provider = "codex"
                model = "gpt-5.5"
                effort = "high"
                fallback_reason = (
                    "Claude drafting model unavailable; falling back to Codex gpt-5.5. "
                    + (probe.stdout or "").strip()
                )

        output_path.parent.mkdir(parents=True, exist_ok=True)
        payload = {
            "provider": provider,
            "model": model,
            "effort": effort,
            "requested_provider": requested_provider,
            "requested_model": requested_model,
            "requested_effort": requested_effort,
            "fallback_reason": fallback_reason,
            "routing_status": "INVALID" if errors else "VALID",
            "errors": errors,
        }
        output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
        if errors:
            raise SystemExit("; ".join(errors))
      - ${inputs.design_gap_draft_provider}
      - ${inputs.design_gap_draft_model}
      - ${inputs.design_gap_draft_effort}
      - ${inputs.state_root}/draft-provider-routing.json
    output_bundle:
      path: ${inputs.state_root}/draft-provider-routing.json
      fields:
        - name: routing_status
          json_pointer: /routing_status
          type: enum
          allowed: ["VALID", "INVALID"]
        - name: provider
          json_pointer: /provider
          type: string
        - name: model
          json_pointer: /model
          type: string
        - name: effort
          json_pointer: /effort
          type: string

  - name: DraftDesignGapArchitecture
    id: draft_design_gap_architecture
    provider: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.provider}
    provider_params:
      model: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.model}
      effort: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.effort}
    asset_file: prompts/lisp_frontend_design_delta_design_gap_architect/draft_implementation_architecture.md
    timeout_sec: 1800
    depends_on:
      required:
        - ${inputs.steering_path}
        - ${inputs.target_design_path}
        - ${inputs.baseline_design_path}
        - ${inputs.command_adapter_contract_path}
        - ${inputs.progress_ledger_path}
        - ${inputs.selection_bundle_path}
        - ${inputs.state_root}/architecture-targets.json
        - ${inputs.state_root}/existing-architecture-index.md
      inject:
        mode: content
        position: prepend
        instruction: "Use these files as authoritative context. Treat the first design file as the target design and the second design file as baseline context."
    output_bundle:
      path: ${inputs.state_root}/draft-bundle.json
      fields:
        - name: draft_status
          json_pointer: /draft_status
          type: enum
          allowed: ["DRAFTED", "BLOCKED"]

  - name: DesignGapArchitectureReviewLoop
    id: design_gap_architecture_review_loop
    repeat_until:
      id: design_gap_architecture_review_iteration
      max_iterations: 3
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE", "BLOCKED"]
          from:
            ref: self.steps.RouteDesignGapArchitectureReview.artifacts.review_decision
      condition:
        any_of:
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: APPROVE
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: BLOCKED
      on_exhausted:
        outputs:
          review_decision: REVISE
      steps:
        - name: ReviewDesignGapArchitecture
          id: review_design_gap_architecture
          provider: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.provider}
          provider_params:
            model: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.model}
            effort: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.effort}
          asset_file: prompts/lisp_frontend_design_delta_design_gap_architect/review_implementation_architecture.md
          timeout_sec: 1800
          depends_on:
            required:
              - ${inputs.steering_path}
              - ${inputs.target_design_path}
              - ${inputs.baseline_design_path}
              - ${inputs.command_adapter_contract_path}
              - ${inputs.progress_ledger_path}
              - ${inputs.selection_bundle_path}
              - ${inputs.state_root}/architecture-targets.json
              - ${inputs.state_root}/existing-architecture-index.md
              - ${parent.steps.PrepareArchitectureTargets.artifacts.architecture_path}
            inject:
              mode: content
              position: prepend
              instruction: "Use these files as authoritative context. Treat the first design file as the target design and the second design file as baseline context."
          output_bundle:
            path: ${inputs.state_root}/architecture-review.json
            fields:
              - name: review_decision
                json_pointer: /review_decision
                type: enum
                allowed: ["APPROVE", "REVISE", "BLOCKED"]
              - name: reason
                json_pointer: /reason
                type: string
                required: false

        - name: RouteDesignGapArchitectureReview
          id: route_design_gap_architecture_review
          match:
            ref: self.steps.ReviewDesignGapArchitecture.artifacts.review_decision
            cases:
              APPROVE:
                id: approve_design_gap_architecture
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteApprovedDesignGapArchitectureReview.artifacts.review_decision
                steps:
                  - name: WriteApprovedDesignGapArchitectureReview
                    id: write_approved_design_gap_architecture_review
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_design_gap_architecture
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteRevisedDesignGapArchitectureReview.artifacts.review_decision
                steps:
                  - name: ReviseDesignGapArchitecture
                    id: revise_design_gap_architecture
                    provider: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.provider}
                    provider_params:
                      model: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.model}
                      effort: ${steps.ValidateDesignGapDraftProviderRouting.artifacts.effort}
                    asset_file: prompts/lisp_frontend_design_delta_design_gap_architect/revise_implementation_architecture.md
                    timeout_sec: 1800
                    depends_on:
                      required:
                        - ${inputs.steering_path}
                        - ${inputs.target_design_path}
                        - ${inputs.baseline_design_path}
                        - ${inputs.command_adapter_contract_path}
                        - ${inputs.progress_ledger_path}
                        - ${inputs.selection_bundle_path}
                        - ${inputs.state_root}/architecture-targets.json
                        - ${inputs.state_root}/existing-architecture-index.md
                        - ${parent.steps.PrepareArchitectureTargets.artifacts.architecture_path}
                        - ${parent.steps.PrepareArchitectureTargets.artifacts.work_item_context_path}
                        - ${parent.steps.PrepareArchitectureTargets.artifacts.check_commands_path}
                        - ${inputs.state_root}/architecture-review.json
                      inject:
                        mode: content
                        position: prepend
                        instruction: "Use these files as authoritative context. Revise only the current implementation architecture and its generated handoff files."
                    output_bundle:
                      path: ${inputs.state_root}/draft-bundle.json
                      fields:
                        - name: draft_status
                          json_pointer: /draft_status
                          type: enum
                          allowed: ["DRAFTED", "BLOCKED"]
                  - name: WriteRevisedDesignGapArchitectureReview
                    id: write_revised_design_gap_architecture_review
                    set_scalar:
                      artifact: review_decision
                      value: REVISE
              BLOCKED:
                id: blocked_design_gap_architecture
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteBlockedDesignGapArchitectureReview.artifacts.review_decision
                steps:
                  - name: WriteBlockedDesignGapArchitectureReview
                    id: write_blocked_design_gap_architecture_review
                    set_scalar:
                      artifact: review_decision
                      value: BLOCKED

  - name: ValidateDesignGapArchitecture
    id: validate_design_gap_architecture
    command:
      - python
      - workflows/library/scripts/validate_lisp_frontend_design_gap_architecture.py
      - --draft-bundle-path
      - ${inputs.state_root}/draft-bundle.json
      - --architecture-targets-path
      - ${inputs.state_root}/architecture-targets.json
      - --review-bundle-path
      - ${inputs.state_root}/architecture-review.json
      - --output
      - ${inputs.state_root}/architecture-validation.json
    output_bundle:
      path: ${inputs.state_root}/architecture-validation.json
      fields:
        - name: architecture_validation_status
          json_pointer: /architecture_validation_status
          type: enum
          allowed: ["VALID", "BLOCKED", "INVALID"]
        - name: work_item_bundle_path
          json_pointer: /work_item_bundle_path
          type: relpath
          under: state
          required: false
          must_exist_target: true
