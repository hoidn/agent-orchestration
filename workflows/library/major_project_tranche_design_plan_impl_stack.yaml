version: "2.12"
name: "major-project-tranche-design-plan-impl-stack"
max_transitions: 120

imports:
  big_design_phase: tracked_big_design_phase.yaml
  plan_phase: major_project_tranche_plan_phase.yaml
  implementation_phase: major_project_tranche_implementation_phase.yaml

inputs:
  item_state_root:
    type: relpath
    under: state
  upstream_escalation_context_path:
    type: relpath
    under: state
  big_design_phase_state_root:
    type: relpath
    under: state
  plan_phase_state_root:
    type: relpath
    under: state
  implementation_phase_state_root:
    type: relpath
    under: state
  project_brief_path:
    type: relpath
    must_exist_target: true
  project_roadmap_path:
    type: relpath
    must_exist_target: true
  tranche_manifest_path:
    type: relpath
    must_exist_target: true
  tranche_brief_path:
    type: relpath
    must_exist_target: true
  design_target_path:
    type: relpath
    under: docs/plans
  design_review_report_target_path:
    type: relpath
    under: artifacts/review
  plan_target_path:
    type: relpath
    under: docs/plans
  plan_review_report_target_path:
    type: relpath
    under: artifacts/review
  execution_report_target_path:
    type: relpath
    under: artifacts/work
  implementation_review_report_target_path:
    type: relpath
    under: artifacts/review
  item_summary_target_path:
    type: relpath
    under: artifacts/work

outputs:
  item_outcome:
    kind: scalar
    type: enum
    allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
    from:
      ref: root.steps.PublishItemOutputs.artifacts.item_outcome
  execution_report_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.PublishItemOutputs.artifacts.execution_report_path
  item_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.PublishItemOutputs.artifacts.item_summary_path
  roadmap_change_request_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.PublishItemOutputs.artifacts.roadmap_change_request_path

steps:
  - name: InitializeItemState
    id: initialize_item_state
    command:
      - bash
      - -lc
      - |
        mkdir -p \
          "${inputs.item_state_root}" \
          "${inputs.big_design_phase_state_root}" \
          "${inputs.plan_phase_state_root}" \
          "${inputs.implementation_phase_state_root}" \
          "$(dirname "${inputs.design_target_path}")" \
          "$(dirname "${inputs.design_review_report_target_path}")" \
          "$(dirname "${inputs.plan_target_path}")" \
          "$(dirname "${inputs.plan_review_report_target_path}")" \
          "$(dirname "${inputs.execution_report_target_path}")" \
          "$(dirname "${inputs.implementation_review_report_target_path}")" \
          "$(dirname "${inputs.item_summary_target_path}")"
        python workflows/library/scripts/major_project_escalation_state.py \
          init-upstream \
          --item-state-root "${inputs.item_state_root}" \
          --output-bundle "${inputs.item_state_root}/upstream_init_output.json"
        printf '%s\n' "${inputs.item_state_root}/roadmap_change_request.json" > "${inputs.item_state_root}/final_roadmap_change_request_path.txt"
        cat > "${inputs.item_state_root}/roadmap_change_request.json" <<'JSON'
        {
          "active": false,
          "source_phase": "design",
          "decision": null,
          "reason_summary": "",
          "requested_program_change": null,
          "requested_changes": [],
          "superseded_tranche_ids": [],
          "proposed_new_tranche_ids": []
        }
        JSON

  - name: RunBigDesignPhase
    id: run_big_design_phase
    call: big_design_phase
    with:
      state_root:
        ref: inputs.big_design_phase_state_root
      brief_path:
        ref: inputs.tranche_brief_path
      project_brief_path:
        ref: inputs.project_brief_path
      project_roadmap_path:
        ref: inputs.project_roadmap_path
      tranche_manifest_path:
        ref: inputs.tranche_manifest_path
      design_target_path:
        ref: inputs.design_target_path
      design_review_report_target_path:
        ref: inputs.design_review_report_target_path
      upstream_escalation_context_path:
        ref: inputs.upstream_escalation_context_path

  - name: AssertBigDesignApproved
    id: assert_big_design_approved
    command:
      - bash
      - -lc
      - test "$(cat "${inputs.big_design_phase_state_root}/final_design_review_decision.txt")" = "APPROVE"
    on:
      failure:
        goto: AssertBigDesignEscalateRoadmapRevision

  - name: ResetLedgerAfterDesignApproval
    id: reset_ledger_after_design_approval
    command:
      - python
      - workflows/library/scripts/major_project_escalation_state.py
      - reset-ledger-on-design-approval
      - --implementation-phase-state-root
      - ${inputs.implementation_phase_state_root}
      - --output-bundle
      - ${inputs.item_state_root}/reset_ledger_output.json

  - name: ClearUpstreamAfterDesignApproval
    id: clear_upstream_after_design_approval
    command:
      - python
      - workflows/library/scripts/major_project_escalation_state.py
      - clear-upstream
      - --item-state-root
      - ${inputs.item_state_root}
      - --resolution
      - consumed_by_redesign
      - --output-bundle
      - ${inputs.item_state_root}/clear_upstream_after_design_output.json
    on:
      success:
        goto: RunPlanPhase

  - name: AssertBigDesignEscalateRoadmapRevision
    id: assert_big_design_escalate_roadmap_revision
    command:
      - bash
      - -lc
      - test "$(cat "${inputs.big_design_phase_state_root}/final_design_review_decision.txt")" = "ESCALATE_ROADMAP_REVISION"
    on:
      success:
        goto: FinalizeEscalateRoadmapRevision
      failure:
        goto: FinalizeSkippedAfterDesign

  - name: RunPlanPhase
    id: run_plan_phase
    call: plan_phase
    with:
      state_root:
        ref: inputs.plan_phase_state_root
      design_path:
        ref: inputs.design_target_path
      plan_target_path:
        ref: inputs.plan_target_path
      plan_review_report_target_path:
        ref: inputs.plan_review_report_target_path
      upstream_escalation_context_path:
        ref: inputs.upstream_escalation_context_path

  - name: AssertPlanApproved
    id: assert_plan_approved
    command:
      - bash
      - -lc
      - test "$(cat "${inputs.plan_phase_state_root}/final_plan_review_decision.txt")" = "APPROVE"
    on:
      success:
        goto: ClearUpstreamAfterPlanApproval
      failure:
        goto: AssertPlanEscalateRedesign

  - name: ClearUpstreamAfterPlanApproval
    id: clear_upstream_after_plan_approval
    command:
      - python
      - workflows/library/scripts/major_project_escalation_state.py
      - clear-upstream
      - --item-state-root
      - ${inputs.item_state_root}
      - --resolution
      - consumed_by_plan
      - --output-bundle
      - ${inputs.item_state_root}/clear_upstream_after_plan_output.json
    on:
      success:
        goto: RunImplementationPhase

  - name: AssertPlanEscalateRedesign
    id: assert_plan_escalate_redesign
    command:
      - bash
      - -lc
      - test "$(cat "${inputs.plan_phase_state_root}/final_plan_review_decision.txt")" = "ESCALATE_REDESIGN"
    on:
      success:
        goto: ActivatePlanEscalationContext
      failure:
        goto: FinalizeSkippedAfterPlan

  - name: ActivatePlanEscalationContext
    id: activate_plan_escalation_context
    command:
      - bash
      - -lc
      - |
        python workflows/library/scripts/major_project_escalation_state.py \
          activate-upstream \
          --item-state-root "${inputs.item_state_root}" \
          --source-context-path "$(cat "${inputs.plan_phase_state_root}/final_plan_escalation_context_path.txt")" \
          --output-bundle "${inputs.item_state_root}/activate_plan_escalation_output.json"
    on:
      success:
        goto: RunBigDesignPhase

  - name: RunImplementationPhase
    id: run_implementation_phase
    call: implementation_phase
    with:
      state_root:
        ref: inputs.implementation_phase_state_root
      design_path:
        ref: inputs.design_target_path
      plan_path:
        ref: inputs.plan_target_path
      execution_report_target_path:
        ref: inputs.execution_report_target_path
      implementation_review_report_target_path:
        ref: inputs.implementation_review_report_target_path

  - name: AssertImplementationApproved
    id: assert_implementation_approved
    command:
      - bash
      - -lc
      - test "$(cat "${inputs.implementation_phase_state_root}/final_implementation_review_decision.txt")" = "APPROVE"
    on:
      success:
        goto: FinalizeApprovedItem
      failure:
        goto: AssertImplementationEscalateReplan

  - name: AssertImplementationEscalateReplan
    id: assert_implementation_escalate_replan
    command:
      - bash
      - -lc
      - test "$(cat "${inputs.implementation_phase_state_root}/final_implementation_review_decision.txt")" = "ESCALATE_REPLAN"
    on:
      success:
        goto: ActivateImplementationEscalationForReplan
      failure:
        goto: FinalizeSkippedAfterImplementation

  - name: ActivateImplementationEscalationForReplan
    id: activate_implementation_escalation_for_replan
    command:
      - bash
      - -lc
      - |
        python workflows/library/scripts/major_project_escalation_state.py \
          activate-upstream \
          --item-state-root "${inputs.item_state_root}" \
          --source-context-path "$(cat "${inputs.implementation_phase_state_root}/final_implementation_escalation_context_path.txt")" \
          --output-bundle "${inputs.item_state_root}/activate_implementation_replan_output.json"
    on:
      success:
        goto: RunPlanPhase

  - name: FinalizeApprovedItem
    id: finalize_approved_item
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        item_state_root = pathlib.Path(sys.argv[1])
        project_brief_path = sys.argv[2]
        project_roadmap_path = sys.argv[3]
        tranche_manifest_path = sys.argv[4]
        tranche_brief_path = sys.argv[5]
        design_target_path = sys.argv[6]
        plan_target_path = sys.argv[7]
        execution_report_target_path = sys.argv[8]
        item_summary_target_path = sys.argv[9]

        summary_path = pathlib.Path(item_summary_target_path)
        summary_path.parent.mkdir(parents=True, exist_ok=True)
        summary_path.write_text(
            json.dumps(
                {
                    "project_brief_path": project_brief_path,
                    "project_roadmap_path": project_roadmap_path,
                    "tranche_manifest_path": tranche_manifest_path,
                    "tranche_brief_path": tranche_brief_path,
                    "item_outcome": "APPROVED",
                    "failed_phase": None,
                    "design_path": design_target_path,
                    "plan_path": plan_target_path,
                    "execution_report_path": execution_report_target_path,
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )

        (item_state_root / "item_outcome.txt").write_text("APPROVED\n", encoding="utf-8")
        (item_state_root / "final_execution_report_path.txt").write_text(
            execution_report_target_path + "\n",
            encoding="utf-8",
        )
        (item_state_root / "final_item_summary_path.txt").write_text(
            item_summary_target_path + "\n",
            encoding="utf-8",
        )
      - ${inputs.item_state_root}
      - ${inputs.project_brief_path}
      - ${inputs.project_roadmap_path}
      - ${inputs.tranche_manifest_path}
      - ${inputs.tranche_brief_path}
      - ${inputs.design_target_path}
      - ${inputs.plan_target_path}
      - ${inputs.execution_report_target_path}
      - ${inputs.item_summary_target_path}
    on:
      success:
        goto: PublishItemOutputs

  - name: FinalizeEscalateRoadmapRevision
    id: finalize_escalate_roadmap_revision
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        item_state_root = pathlib.Path(sys.argv[1])
        project_brief_path = sys.argv[2]
        project_roadmap_path = sys.argv[3]
        tranche_manifest_path = sys.argv[4]
        tranche_brief_path = sys.argv[5]
        design_target_path = sys.argv[6]
        plan_target_path = sys.argv[7]
        execution_report_target_path = sys.argv[8]
        item_summary_target_path = sys.argv[9]
        roadmap_change_request_path = pathlib.Path(sys.argv[10]).read_text(encoding="utf-8").strip()

        execution_report_path = pathlib.Path(execution_report_target_path)
        execution_report_path.parent.mkdir(parents=True, exist_ok=True)
        execution_report_path.write_text(
            "Escalated to roadmap revision from big-design review.\n",
            encoding="utf-8",
        )

        summary_path = pathlib.Path(item_summary_target_path)
        summary_path.parent.mkdir(parents=True, exist_ok=True)
        summary_path.write_text(
            json.dumps(
                {
                    "project_brief_path": project_brief_path,
                    "project_roadmap_path": project_roadmap_path,
                    "tranche_manifest_path": tranche_manifest_path,
                    "tranche_brief_path": tranche_brief_path,
                    "item_outcome": "ESCALATE_ROADMAP_REVISION",
                    "failed_phase": None,
                    "design_path": design_target_path,
                    "plan_path": plan_target_path,
                    "execution_report_path": execution_report_target_path,
                    "roadmap_change_request_path": roadmap_change_request_path,
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )

        (item_state_root / "item_outcome.txt").write_text("ESCALATE_ROADMAP_REVISION\n", encoding="utf-8")
        (item_state_root / "final_execution_report_path.txt").write_text(
            execution_report_target_path + "\n",
            encoding="utf-8",
        )
        (item_state_root / "final_item_summary_path.txt").write_text(
            item_summary_target_path + "\n",
            encoding="utf-8",
        )
        (item_state_root / "final_roadmap_change_request_path.txt").write_text(
            roadmap_change_request_path + "\n",
            encoding="utf-8",
        )
      - ${inputs.item_state_root}
      - ${inputs.project_brief_path}
      - ${inputs.project_roadmap_path}
      - ${inputs.tranche_manifest_path}
      - ${inputs.tranche_brief_path}
      - ${inputs.design_target_path}
      - ${inputs.plan_target_path}
      - ${inputs.execution_report_target_path}
      - ${inputs.item_summary_target_path}
      - ${inputs.big_design_phase_state_root}/final_roadmap_change_request_path.txt
    on:
      success:
        goto: PublishItemOutputs

  - name: FinalizeSkippedAfterDesign
    id: finalize_skipped_after_design
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        item_state_root = pathlib.Path(sys.argv[1])
        project_brief_path = sys.argv[2]
        project_roadmap_path = sys.argv[3]
        tranche_manifest_path = sys.argv[4]
        tranche_brief_path = sys.argv[5]
        design_target_path = sys.argv[6]
        plan_target_path = sys.argv[7]
        execution_report_target_path = sys.argv[8]
        item_summary_target_path = sys.argv[9]

        execution_report_path = pathlib.Path(execution_report_target_path)
        execution_report_path.parent.mkdir(parents=True, exist_ok=True)
        execution_report_path.write_text(
            "Skipped before plan and implementation because big-design phase failed.\n",
            encoding="utf-8",
        )

        summary_path = pathlib.Path(item_summary_target_path)
        summary_path.parent.mkdir(parents=True, exist_ok=True)
        summary_path.write_text(
            json.dumps(
                {
                    "project_brief_path": project_brief_path,
                    "project_roadmap_path": project_roadmap_path,
                    "tranche_manifest_path": tranche_manifest_path,
                    "tranche_brief_path": tranche_brief_path,
                    "item_outcome": "SKIPPED_AFTER_DESIGN",
                    "failed_phase": "design",
                    "design_path": design_target_path,
                    "plan_path": plan_target_path,
                    "execution_report_path": execution_report_target_path,
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )

        (item_state_root / "item_outcome.txt").write_text("SKIPPED_AFTER_DESIGN\n", encoding="utf-8")
        (item_state_root / "final_execution_report_path.txt").write_text(
            execution_report_target_path + "\n",
            encoding="utf-8",
        )
        (item_state_root / "final_item_summary_path.txt").write_text(
            item_summary_target_path + "\n",
            encoding="utf-8",
        )
      - ${inputs.item_state_root}
      - ${inputs.project_brief_path}
      - ${inputs.project_roadmap_path}
      - ${inputs.tranche_manifest_path}
      - ${inputs.tranche_brief_path}
      - ${inputs.design_target_path}
      - ${inputs.plan_target_path}
      - ${inputs.execution_report_target_path}
      - ${inputs.item_summary_target_path}
    on:
      success:
        goto: PublishItemOutputs

  - name: FinalizeSkippedAfterPlan
    id: finalize_skipped_after_plan
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        item_state_root = pathlib.Path(sys.argv[1])
        project_brief_path = sys.argv[2]
        project_roadmap_path = sys.argv[3]
        tranche_manifest_path = sys.argv[4]
        tranche_brief_path = sys.argv[5]
        design_target_path = sys.argv[6]
        plan_target_path = sys.argv[7]
        execution_report_target_path = sys.argv[8]
        item_summary_target_path = sys.argv[9]

        execution_report_path = pathlib.Path(execution_report_target_path)
        execution_report_path.parent.mkdir(parents=True, exist_ok=True)
        execution_report_path.write_text(
            "Skipped before implementation because plan phase failed.\n",
            encoding="utf-8",
        )

        summary_path = pathlib.Path(item_summary_target_path)
        summary_path.parent.mkdir(parents=True, exist_ok=True)
        summary_path.write_text(
            json.dumps(
                {
                    "project_brief_path": project_brief_path,
                    "project_roadmap_path": project_roadmap_path,
                    "tranche_manifest_path": tranche_manifest_path,
                    "tranche_brief_path": tranche_brief_path,
                    "item_outcome": "SKIPPED_AFTER_PLAN",
                    "failed_phase": "plan",
                    "design_path": design_target_path,
                    "plan_path": plan_target_path,
                    "execution_report_path": execution_report_target_path,
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )

        (item_state_root / "item_outcome.txt").write_text("SKIPPED_AFTER_PLAN\n", encoding="utf-8")
        (item_state_root / "final_execution_report_path.txt").write_text(
            execution_report_target_path + "\n",
            encoding="utf-8",
        )
        (item_state_root / "final_item_summary_path.txt").write_text(
            item_summary_target_path + "\n",
            encoding="utf-8",
        )
      - ${inputs.item_state_root}
      - ${inputs.project_brief_path}
      - ${inputs.project_roadmap_path}
      - ${inputs.tranche_manifest_path}
      - ${inputs.tranche_brief_path}
      - ${inputs.design_target_path}
      - ${inputs.plan_target_path}
      - ${inputs.execution_report_target_path}
      - ${inputs.item_summary_target_path}
    on:
      success:
        goto: PublishItemOutputs

  - name: FinalizeSkippedAfterImplementation
    id: finalize_skipped_after_implementation
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        item_state_root = pathlib.Path(sys.argv[1])
        project_brief_path = sys.argv[2]
        project_roadmap_path = sys.argv[3]
        tranche_manifest_path = sys.argv[4]
        tranche_brief_path = sys.argv[5]
        design_target_path = sys.argv[6]
        plan_target_path = sys.argv[7]
        execution_report_target_path = sys.argv[8]
        item_summary_target_path = sys.argv[9]

        execution_report_path = pathlib.Path(execution_report_target_path)
        execution_report_path.parent.mkdir(parents=True, exist_ok=True)
        if not execution_report_path.exists():
            execution_report_path.write_text(
                "Implementation phase failed before producing a report.\n",
                encoding="utf-8",
            )

        summary_path = pathlib.Path(item_summary_target_path)
        summary_path.parent.mkdir(parents=True, exist_ok=True)
        summary_path.write_text(
            json.dumps(
                {
                    "project_brief_path": project_brief_path,
                    "project_roadmap_path": project_roadmap_path,
                    "tranche_manifest_path": tranche_manifest_path,
                    "tranche_brief_path": tranche_brief_path,
                    "item_outcome": "SKIPPED_AFTER_IMPLEMENTATION",
                    "failed_phase": "implementation",
                    "design_path": design_target_path,
                    "plan_path": plan_target_path,
                    "execution_report_path": execution_report_target_path,
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )

        (item_state_root / "item_outcome.txt").write_text("SKIPPED_AFTER_IMPLEMENTATION\n", encoding="utf-8")
        (item_state_root / "final_execution_report_path.txt").write_text(
            execution_report_target_path + "\n",
            encoding="utf-8",
        )
        (item_state_root / "final_item_summary_path.txt").write_text(
            item_summary_target_path + "\n",
            encoding="utf-8",
        )
      - ${inputs.item_state_root}
      - ${inputs.project_brief_path}
      - ${inputs.project_roadmap_path}
      - ${inputs.tranche_manifest_path}
      - ${inputs.tranche_brief_path}
      - ${inputs.design_target_path}
      - ${inputs.plan_target_path}
      - ${inputs.execution_report_target_path}
      - ${inputs.item_summary_target_path}
    on:
      success:
        goto: PublishItemOutputs

  - name: PublishItemOutputs
    id: publish_item_outputs
    command: ["bash", "-lc", "true"]
    expected_outputs:
      - name: item_outcome
        path: ${inputs.item_state_root}/item_outcome.txt
        type: enum
        allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
      - name: execution_report_path
        path: ${inputs.item_state_root}/final_execution_report_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: item_summary_path
        path: ${inputs.item_state_root}/final_item_summary_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: roadmap_change_request_path
        path: ${inputs.item_state_root}/final_roadmap_change_request_path.txt
        type: relpath
        under: state
        must_exist_target: true
