version: "2.12"
name: "major-project-tranche-design-plan-impl-stack"
max_transitions: 120

imports:
  big_design_phase: tracked_big_design_phase.yaml
  plan_phase: major_project_tranche_plan_phase.yaml
  implementation_phase: major_project_tranche_implementation_phase.yaml

inputs:
  item_state_root: {type: relpath, under: state}
  scope_boundary_path: {type: relpath, under: state}
  upstream_escalation_context_path: {type: relpath, under: state}
  initial_phase:
    kind: scalar
    type: enum
    allowed: ["big_design", "plan", "implementation"]
    default: big_design
  big_design_phase_state_root: {type: relpath, under: state}
  plan_phase_state_root: {type: relpath, under: state}
  implementation_phase_state_root: {type: relpath, under: state}
  project_brief_path: {type: relpath, must_exist_target: true}
  project_roadmap_path: {type: relpath, must_exist_target: true}
  tranche_manifest_path: {type: relpath, must_exist_target: true}
  tranche_brief_path: {type: relpath, must_exist_target: true}
  design_target_path: {type: relpath, under: docs/plans}
  design_review_report_target_path: {type: relpath, under: artifacts/review}
  plan_target_path: {type: relpath, under: docs/plans}
  plan_review_report_target_path: {type: relpath, under: artifacts/review}
  execution_report_target_path: {type: relpath, under: artifacts/work}
  implementation_review_report_target_path: {type: relpath, under: artifacts/review}
  item_summary_target_path: {type: relpath, under: artifacts/work}

outputs:
  item_outcome:
    kind: scalar
    type: enum
    allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
    from: {ref: root.steps.PublishItemOutputs.artifacts.item_outcome}
  execution_report_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from: {ref: root.steps.PublishItemOutputs.artifacts.execution_report_path}
  item_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from: {ref: root.steps.PublishItemOutputs.artifacts.item_summary_path}
  roadmap_change_request_path:
    type: relpath
    under: state
    must_exist_target: true
    from: {ref: root.steps.PublishItemOutputs.artifacts.roadmap_change_request_path}

steps:
  - name: InitializeItemState
    id: initialize_item_state
    command:
      - bash
      - -lc
      - |
        mkdir -p \
          "${inputs.item_state_root}" \
          "${inputs.big_design_phase_state_root}" \
          "${inputs.plan_phase_state_root}" \
          "${inputs.implementation_phase_state_root}" \
          "$(dirname "${inputs.design_target_path}")" \
          "$(dirname "${inputs.design_review_report_target_path}")" \
          "$(dirname "${inputs.plan_target_path}")" \
          "$(dirname "${inputs.plan_review_report_target_path}")" \
          "$(dirname "${inputs.execution_report_target_path}")" \
          "$(dirname "${inputs.implementation_review_report_target_path}")" \
          "$(dirname "${inputs.item_summary_target_path}")"
        if [ ! -s "${inputs.item_state_root}/current_phase.txt" ]; then
          printf '%s\n' "${inputs.initial_phase}" > "${inputs.item_state_root}/current_phase.txt"
        fi
        python workflows/library/scripts/major_project_escalation_state.py init-upstream \
          --item-state-root "${inputs.item_state_root}" \
          --output-bundle "${inputs.item_state_root}/upstream_init_output.json"
        python workflows/library/scripts/major_project_phase_visits.py init \
          --item-state-root "${inputs.item_state_root}" \
          --output-bundle "${inputs.item_state_root}/phase_visit_init_output.json"
        python workflows/library/scripts/major_project_scope_boundary.py write-boundary \
          --tranche-manifest-path "${inputs.tranche_manifest_path}" \
          --tranche-brief-path "${inputs.tranche_brief_path}" \
          --scope-boundary-path "${inputs.scope_boundary_path}" \
          --output-bundle "${inputs.item_state_root}/scope_boundary_write_output.json"
        printf '%s\n' "${inputs.item_state_root}/roadmap_change_request.json" > "${inputs.item_state_root}/final_roadmap_change_request_path.txt"
        cat > "${inputs.item_state_root}/roadmap_change_request.json" <<'JSON'
        {
          "active": false,
          "source_phase": "design",
          "decision": null,
          "reason_summary": "",
          "requested_program_change": null,
          "requested_changes": [],
          "superseded_tranche_ids": [],
          "proposed_new_tranche_ids": []
        }
        JSON

  - name: TranchePhaseLoop
    id: tranche_phase_loop
    repeat_until:
      id: tranche_phase_loop_body
      max_iterations: 40
      outputs:
        tranche_status:
          kind: scalar
          type: enum
          allowed: ["CONTINUE", "APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
          from: {ref: self.steps.RouteCurrentPhase.artifacts.tranche_status}
      condition:
        compare:
          left: {ref: self.outputs.tranche_status}
          op: ne
          right: CONTINUE
      steps:
        - name: ReadCurrentPhase
          id: read_current_phase
          command:
            - python
            - workflows/library/scripts/major_project_tranche_phase_routes.py
            - read-current-phase
            - --item-state-root
            - ${inputs.item_state_root}
            - --output-bundle
            - ${inputs.item_state_root}/current_phase_output.json
          output_bundle:
            path: ${inputs.item_state_root}/current_phase_output.json
            fields:
              - name: current_phase
                json_pointer: /current_phase
                type: enum
                allowed: ["big_design", "plan", "implementation"]

        - name: RouteCurrentPhase
          id: route_current_phase
          match:
            ref: self.steps.ReadCurrentPhase.artifacts.current_phase
            cases:
              big_design:
                id: big_design_phase_path
                outputs:
                  tranche_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
                    from: {ref: self.steps.RouteAfterBigDesign.artifacts.tranche_status}
                steps:
                  - name: PrepareBigDesignVisit
                    id: prepare_big_design_visit
                    command:
                      - python
                      - workflows/library/scripts/major_project_phase_visits.py
                      - prepare
                      - --item-state-root
                      - ${inputs.item_state_root}
                      - --phase
                      - big_design
                      - --phase-state-root-base
                      - ${inputs.big_design_phase_state_root}
                      - --reason
                      - big_design_visit
                      - --source-context-path
                      - ${inputs.upstream_escalation_context_path}
                      - --output-bundle
                      - ${inputs.item_state_root}/big_design_visit_output.json
                    output_bundle:
                      path: ${inputs.item_state_root}/big_design_visit_output.json
                      fields: &phase_visit_fields
                        - {name: phase_state_root, json_pointer: /phase_state_root, type: relpath, under: state}
                        - {name: visit_index, json_pointer: /visit_index, type: integer}
                        - {name: current_phase_state_root_path, json_pointer: /current_phase_state_root_path, type: relpath, under: state, must_exist_target: true}
                        - {name: phase_visit_ledger_path, json_pointer: /phase_visit_ledger_path, type: relpath, under: state, must_exist_target: true}
                  - name: RunBigDesignPhase
                    id: run_big_design_phase
                    call: big_design_phase
                    with:
                      state_root: {ref: self.steps.PrepareBigDesignVisit.artifacts.phase_state_root}
                      brief_path: {ref: inputs.tranche_brief_path}
                      project_brief_path: {ref: inputs.project_brief_path}
                      project_roadmap_path: {ref: inputs.project_roadmap_path}
                      tranche_manifest_path: {ref: inputs.tranche_manifest_path}
                      design_target_path: {ref: inputs.design_target_path}
                      design_review_report_target_path: {ref: inputs.design_review_report_target_path}
                      upstream_escalation_context_path: {ref: inputs.upstream_escalation_context_path}
                  - name: RouteAfterBigDesign
                    id: route_after_big_design
                    command:
                      - python
                      - workflows/library/scripts/major_project_tranche_phase_routes.py
                      - route-after-big-design
                      - --item-state-root
                      - ${inputs.item_state_root}
                      - --implementation-phase-state-root
                      - ${inputs.implementation_phase_state_root}
                      - --project-brief-path
                      - ${inputs.project_brief_path}
                      - --project-roadmap-path
                      - ${inputs.project_roadmap_path}
                      - --tranche-manifest-path
                      - ${inputs.tranche_manifest_path}
                      - --tranche-brief-path
                      - ${inputs.tranche_brief_path}
                      - --design-target-path
                      - ${inputs.design_target_path}
                      - --plan-target-path
                      - ${inputs.plan_target_path}
                      - --execution-report-target-path
                      - ${inputs.execution_report_target_path}
                      - --item-summary-target-path
                      - ${inputs.item_summary_target_path}
                      - --output-bundle
                      - ${inputs.item_state_root}/phase_route_output.json
                    output_bundle: &phase_route_output
                      path: ${inputs.item_state_root}/phase_route_output.json
                      fields:
                        - name: tranche_status
                          json_pointer: /tranche_status
                          type: enum
                          allowed: ["CONTINUE", "APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
                        - name: next_phase
                          json_pointer: /next_phase
                          type: enum
                          allowed: ["big_design", "plan", "implementation", "terminal"]

              plan:
                id: plan_phase_path
                outputs:
                  tranche_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
                    from: {ref: self.steps.RouteAfterPlan.artifacts.tranche_status}
                steps:
                  - name: PreparePlanVisit
                    id: prepare_plan_visit
                    command:
                      - python
                      - workflows/library/scripts/major_project_phase_visits.py
                      - prepare
                      - --item-state-root
                      - ${inputs.item_state_root}
                      - --phase
                      - plan
                      - --phase-state-root-base
                      - ${inputs.plan_phase_state_root}
                      - --reason
                      - plan_visit
                      - --source-context-path
                      - ${inputs.upstream_escalation_context_path}
                      - --output-bundle
                      - ${inputs.item_state_root}/plan_visit_output.json
                    output_bundle:
                      path: ${inputs.item_state_root}/plan_visit_output.json
                      fields: *phase_visit_fields
                  - name: RunPlanPhase
                    id: run_plan_phase
                    call: plan_phase
                    with:
                      state_root: {ref: self.steps.PreparePlanVisit.artifacts.phase_state_root}
                      design_path: {ref: inputs.design_target_path}
                      scope_boundary_path: {ref: inputs.scope_boundary_path}
                      project_roadmap_path: {ref: inputs.project_roadmap_path}
                      tranche_manifest_path: {ref: inputs.tranche_manifest_path}
                      plan_target_path: {ref: inputs.plan_target_path}
                      plan_review_report_target_path: {ref: inputs.plan_review_report_target_path}
                      upstream_escalation_context_path: {ref: inputs.upstream_escalation_context_path}
                  - name: RouteAfterPlan
                    id: route_after_plan
                    command:
                      - python
                      - workflows/library/scripts/major_project_tranche_phase_routes.py
                      - route-after-plan
                      - --item-state-root
                      - ${inputs.item_state_root}
                      - --project-brief-path
                      - ${inputs.project_brief_path}
                      - --project-roadmap-path
                      - ${inputs.project_roadmap_path}
                      - --tranche-manifest-path
                      - ${inputs.tranche_manifest_path}
                      - --tranche-brief-path
                      - ${inputs.tranche_brief_path}
                      - --design-path
                      - ${inputs.design_target_path}
                      - --plan-target-path
                      - ${inputs.plan_target_path}
                      - --execution-report-target-path
                      - ${inputs.execution_report_target_path}
                      - --item-summary-target-path
                      - ${inputs.item_summary_target_path}
                      - --output-bundle
                      - ${inputs.item_state_root}/phase_route_output.json
                    output_bundle: *phase_route_output

              implementation:
                id: implementation_phase_path
                outputs:
                  tranche_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
                    from: {ref: self.steps.RouteAfterImplementation.artifacts.tranche_status}
                steps:
                  - name: PrepareImplementationVisit
                    id: prepare_implementation_visit
                    command:
                      - python
                      - workflows/library/scripts/major_project_phase_visits.py
                      - prepare
                      - --item-state-root
                      - ${inputs.item_state_root}
                      - --phase
                      - implementation
                      - --phase-state-root-base
                      - ${inputs.implementation_phase_state_root}
                      - --reason
                      - implementation_visit
                      - --source-context-path
                      - ${inputs.upstream_escalation_context_path}
                      - --output-bundle
                      - ${inputs.item_state_root}/implementation_visit_output.json
                    output_bundle:
                      path: ${inputs.item_state_root}/implementation_visit_output.json
                      fields: *phase_visit_fields
                  - name: RunImplementationPhase
                    id: run_implementation_phase
                    call: implementation_phase
                    with:
                      state_root: {ref: self.steps.PrepareImplementationVisit.artifacts.phase_state_root}
                      design_path: {ref: inputs.design_target_path}
                      plan_path: {ref: inputs.plan_target_path}
                      scope_boundary_path: {ref: inputs.scope_boundary_path}
                      project_roadmap_path: {ref: inputs.project_roadmap_path}
                      tranche_manifest_path: {ref: inputs.tranche_manifest_path}
                      execution_report_target_path: {ref: inputs.execution_report_target_path}
                      implementation_review_report_target_path: {ref: inputs.implementation_review_report_target_path}
                  - name: RouteAfterImplementation
                    id: route_after_implementation
                    command:
                      - python
                      - workflows/library/scripts/major_project_tranche_phase_routes.py
                      - route-after-implementation
                      - --item-state-root
                      - ${inputs.item_state_root}
                      - --project-brief-path
                      - ${inputs.project_brief_path}
                      - --project-roadmap-path
                      - ${inputs.project_roadmap_path}
                      - --tranche-manifest-path
                      - ${inputs.tranche_manifest_path}
                      - --tranche-brief-path
                      - ${inputs.tranche_brief_path}
                      - --design-path
                      - ${inputs.design_target_path}
                      - --plan-target-path
                      - ${inputs.plan_target_path}
                      - --scope-boundary-path
                      - ${inputs.scope_boundary_path}
                      - --execution-report-target-path
                      - ${inputs.execution_report_target_path}
                      - --item-summary-target-path
                      - ${inputs.item_summary_target_path}
                      - --output-bundle
                      - ${inputs.item_state_root}/phase_route_output.json
                    output_bundle: *phase_route_output

  - name: PublishItemOutputs
    id: publish_item_outputs
    command: ["bash", "-lc", "true"]
    expected_outputs:
      - name: item_outcome
        path: ${inputs.item_state_root}/item_outcome.txt
        type: enum
        allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
      - name: execution_report_path
        path: ${inputs.item_state_root}/final_execution_report_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: item_summary_path
        path: ${inputs.item_state_root}/final_item_summary_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: roadmap_change_request_path
        path: ${inputs.item_state_root}/final_roadmap_change_request_path.txt
        type: relpath
        under: state
        must_exist_target: true
