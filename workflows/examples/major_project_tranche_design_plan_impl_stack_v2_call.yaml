version: "2.12"
name: "major-project-tranche-design-plan-impl-stack-v2-call"

imports:
  roadmap_phase: ../library/major_project_roadmap_phase.yaml
  tranche_stack: ../library/major_project_tranche_design_plan_impl_stack.yaml

inputs:
  project_brief_path:
    type: relpath
    must_exist_target: true
    default: workflows/examples/inputs/major_project_brief.md
  project_roadmap_target_path:
    type: relpath
    under: docs/plans
    default: docs/plans/major-project-demo/project-roadmap.md
  tranche_manifest_target_path:
    type: relpath
    under: state
    default: state/major-project-demo/tranche_manifest.json
  roadmap_review_report_target_path:
    type: relpath
    under: artifacts/review
    default: artifacts/review/major-project-demo/project-roadmap-review.json

outputs:
  item_outcome:
    kind: scalar
    type: enum
    allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
    from:
      ref: root.steps.RunSelectedTranche.artifacts.item_outcome
  execution_report_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.RunSelectedTranche.artifacts.execution_report_path
  item_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.RunSelectedTranche.artifacts.item_summary_path

steps:
  - name: RunRoadmapPhase
    id: run_roadmap_phase
    call: roadmap_phase
    with:
      state_root: state/major-project-demo/roadmap-phase
      project_brief_path:
        ref: inputs.project_brief_path
      project_roadmap_target_path:
        ref: inputs.project_roadmap_target_path
      tranche_manifest_target_path:
        ref: inputs.tranche_manifest_target_path
      roadmap_review_report_target_path:
        ref: inputs.roadmap_review_report_target_path

  - name: SelectNextTranche
    id: select_next_tranche
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import re
        import sys

        manifest_path = pathlib.Path(sys.argv[1])
        project_brief_path = sys.argv[2]
        project_roadmap_path = sys.argv[3]
        manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
        if not isinstance(manifest, dict):
            raise SystemExit("Tranche manifest must be a JSON object")

        project_id = manifest.get("project_id")
        tranches = manifest.get("tranches")
        if not isinstance(project_id, str) or not project_id:
            raise SystemExit("Manifest missing non-empty project_id")
        if not isinstance(project_brief_path, str) or not project_brief_path:
            raise SystemExit("Manifest missing non-empty project_brief_path")
        if not isinstance(project_roadmap_path, str) or not project_roadmap_path:
            raise SystemExit("Manifest missing non-empty project_roadmap_path")
        if not isinstance(tranches, list):
            raise SystemExit("Manifest field tranches must be an array")

        completed = {
            tranche.get("tranche_id")
            for tranche in tranches
            if isinstance(tranche, dict) and tranche.get("status") in {"done", "completed", "approved"}
        }

        selected = None
        for tranche in tranches:
            if not isinstance(tranche, dict):
                raise SystemExit("Every tranche must be a JSON object")
            tranche_id = tranche.get("tranche_id")
            prerequisites = tranche.get("prerequisites", [])
            if not isinstance(tranche_id, str) or not tranche_id:
                raise SystemExit("Tranche missing non-empty tranche_id")
            if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*", tranche_id):
                raise SystemExit(f"Tranche id is not a safe slug: {tranche_id}")
            if not isinstance(prerequisites, list):
                raise SystemExit(f"Tranche {tranche_id} prerequisites must be an array")
            if tranche.get("status") != "pending":
                continue
            if all(prereq in completed for prereq in prerequisites):
                selected = tranche
                break

        if selected is None:
            raise SystemExit("No pending tranche has satisfied prerequisites")

        required = [
            "brief_path",
            "design_target_path",
            "design_review_report_target_path",
            "plan_target_path",
            "plan_review_report_target_path",
            "execution_report_target_path",
            "implementation_review_report_target_path",
            "item_summary_target_path",
        ]
        missing = [field for field in required if not isinstance(selected.get(field), str) or not selected[field]]
        if missing:
            raise SystemExit(f"Selected tranche missing required fields: {', '.join(missing)}")

        tranche_id = selected["tranche_id"]
        item_state_root = f"state/major-project-tranche-stack/{project_id}/{tranche_id}"
        payload = {
            "selection_status": "SELECTED",
            "selected_tranche_id": tranche_id,
            "project_brief_path": project_brief_path,
            "project_roadmap_path": project_roadmap_path,
            "tranche_manifest_path": manifest_path.as_posix(),
            "item_state_root": item_state_root,
            "scope_boundary_path": f"{item_state_root}/scope_boundary.json",
            "upstream_escalation_context_path": f"{item_state_root}/upstream_escalation_context.json",
            "big_design_phase_state_root": f"{item_state_root}/big-design-phase",
            "plan_phase_state_root": f"{item_state_root}/plan-phase",
            "implementation_phase_state_root": f"{item_state_root}/implementation-phase",
            "tranche_brief_path": selected["brief_path"],
            "design_target_path": selected["design_target_path"],
            "design_review_report_target_path": selected["design_review_report_target_path"],
            "plan_target_path": selected["plan_target_path"],
            "plan_review_report_target_path": selected["plan_review_report_target_path"],
            "execution_report_target_path": selected["execution_report_target_path"],
            "implementation_review_report_target_path": selected["implementation_review_report_target_path"],
            "item_summary_target_path": selected["item_summary_target_path"],
        }

        output_path = pathlib.Path("state/major-project-tranche-stack/current-tranche-inputs.json")
        output_path.parent.mkdir(parents=True, exist_ok=True)
        output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
      - ${steps.RunRoadmapPhase.artifacts.tranche_manifest_path}
      - ${inputs.project_brief_path}
      - ${steps.RunRoadmapPhase.artifacts.project_roadmap_path}
    output_bundle:
      path: state/major-project-tranche-stack/current-tranche-inputs.json
      fields:
        - name: selection_status
          json_pointer: /selection_status
          type: enum
          allowed: ["SELECTED"]
        - name: project_brief_path
          json_pointer: /project_brief_path
          type: relpath
          must_exist_target: true
        - name: project_roadmap_path
          json_pointer: /project_roadmap_path
          type: relpath
          must_exist_target: true
        - name: tranche_manifest_path
          json_pointer: /tranche_manifest_path
          type: relpath
          must_exist_target: true
        - name: item_state_root
          json_pointer: /item_state_root
          type: relpath
          under: state
        - name: scope_boundary_path
          json_pointer: /scope_boundary_path
          type: relpath
          under: state
        - name: upstream_escalation_context_path
          json_pointer: /upstream_escalation_context_path
          type: relpath
          under: state
        - name: big_design_phase_state_root
          json_pointer: /big_design_phase_state_root
          type: relpath
          under: state
        - name: plan_phase_state_root
          json_pointer: /plan_phase_state_root
          type: relpath
          under: state
        - name: implementation_phase_state_root
          json_pointer: /implementation_phase_state_root
          type: relpath
          under: state
        - name: tranche_brief_path
          json_pointer: /tranche_brief_path
          type: relpath
          must_exist_target: true
        - name: design_target_path
          json_pointer: /design_target_path
          type: relpath
          under: docs/plans
        - name: design_review_report_target_path
          json_pointer: /design_review_report_target_path
          type: relpath
          under: artifacts/review
        - name: plan_target_path
          json_pointer: /plan_target_path
          type: relpath
          under: docs/plans
        - name: plan_review_report_target_path
          json_pointer: /plan_review_report_target_path
          type: relpath
          under: artifacts/review
        - name: execution_report_target_path
          json_pointer: /execution_report_target_path
          type: relpath
          under: artifacts/work
        - name: implementation_review_report_target_path
          json_pointer: /implementation_review_report_target_path
          type: relpath
          under: artifacts/review
        - name: item_summary_target_path
          json_pointer: /item_summary_target_path
          type: relpath
          under: artifacts/work

  - name: RunSelectedTranche
    id: run_selected_tranche
    call: tranche_stack
    with:
      item_state_root:
        ref: root.steps.SelectNextTranche.artifacts.item_state_root
      scope_boundary_path:
        ref: root.steps.SelectNextTranche.artifacts.scope_boundary_path
      upstream_escalation_context_path:
        ref: root.steps.SelectNextTranche.artifacts.upstream_escalation_context_path
      big_design_phase_state_root:
        ref: root.steps.SelectNextTranche.artifacts.big_design_phase_state_root
      plan_phase_state_root:
        ref: root.steps.SelectNextTranche.artifacts.plan_phase_state_root
      implementation_phase_state_root:
        ref: root.steps.SelectNextTranche.artifacts.implementation_phase_state_root
      project_brief_path:
        ref: root.steps.SelectNextTranche.artifacts.project_brief_path
      project_roadmap_path:
        ref: root.steps.SelectNextTranche.artifacts.project_roadmap_path
      tranche_manifest_path:
        ref: root.steps.SelectNextTranche.artifacts.tranche_manifest_path
      tranche_brief_path:
        ref: root.steps.SelectNextTranche.artifacts.tranche_brief_path
      design_target_path:
        ref: root.steps.SelectNextTranche.artifacts.design_target_path
      design_review_report_target_path:
        ref: root.steps.SelectNextTranche.artifacts.design_review_report_target_path
      plan_target_path:
        ref: root.steps.SelectNextTranche.artifacts.plan_target_path
      plan_review_report_target_path:
        ref: root.steps.SelectNextTranche.artifacts.plan_review_report_target_path
      execution_report_target_path:
        ref: root.steps.SelectNextTranche.artifacts.execution_report_target_path
      implementation_review_report_target_path:
        ref: root.steps.SelectNextTranche.artifacts.implementation_review_report_target_path
      item_summary_target_path:
        ref: root.steps.SelectNextTranche.artifacts.item_summary_target_path
