version: "2.7"
name: "dsl-follow-on-plan-impl-review-loop-v2"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  upstream_state_path:
    type: relpath
    must_exist_target: true
  design_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
    default: docs/plans/2026-03-06-dsl-evolution-control-flow-and-reuse.md

outputs:
  plan_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
    from:
      ref: root.steps.PublishFinalOutputs.artifacts.plan_path
  execution_report_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.PublishFinalOutputs.artifacts.execution_report_path
  implementation_review_report_path:
    type: relpath
    under: artifacts/review
    must_exist_target: true
    from:
      ref: root.steps.PublishFinalOutputs.artifacts.implementation_review_report_path
  implementation_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
    from:
      ref: root.steps.PublishFinalOutputs.artifacts.implementation_review_decision

providers:
  codex:
    command: ["codex", "exec", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"

artifacts:
  design:
    pointer: state/design_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  plan:
    pointer: state/plan_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  plan_review_report:
    pointer: state/plan_review_report_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
  plan_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
  execution_report:
    pointer: state/execution_report_path.txt
    type: relpath
    under: artifacts/work
    must_exist_target: true
  implementation_review_report:
    pointer: state/implementation_review_report_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
  implementation_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
  review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]

steps:
  - name: WaitForUpstreamStateFile
    id: wait_for_upstream_state_file
    command:
      - bash
      - -lc
      - |
        python - <<'PY'
        import pathlib
        import sys
        import time

        state_path = pathlib.Path("${inputs.upstream_state_path}")
        deadline = time.time() + 86400

        while time.time() < deadline:
            if state_path.exists():
                raise SystemExit(0)
            time.sleep(1)

        print(f"Timed out waiting for upstream state file: {state_path}", file=sys.stderr)
        raise SystemExit(124)
        PY
    timeout_sec: 86400

  - name: WaitForUpstreamCompletion
    id: wait_for_upstream_completion
    command:
      - bash
      - -lc
      - |
        python - <<'PY'
        import json
        import pathlib
        import sys
        import time

        state_path = pathlib.Path("${inputs.upstream_state_path}")
        if not state_path.exists():
            print(f"Missing upstream state file: {state_path}", file=sys.stderr)
            raise SystemExit(1)

        while True:
            payload = json.loads(state_path.read_text(encoding="utf-8"))
            status = payload.get("status")
            if status != "running":
                break
            time.sleep(5)

        pathlib.Path("state").mkdir(parents=True, exist_ok=True)
        pathlib.Path("state/upstream_run_status.txt").write_text(f"{status}\n", encoding="utf-8")

        if status != "completed":
            print(
                f"Upstream run state at {state_path} finished with status {status!r}; expected 'completed'.",
                file=sys.stderr,
            )
            raise SystemExit(1)
        PY
    timeout_sec: 86400
    expected_outputs:
      - name: upstream_run_status
        path: state/upstream_run_status.txt
        type: enum
        allowed: ["completed"]

  - name: InitializeArtifactPaths
    id: initialize_artifact_paths
    command:
      - bash
      - -lc
      - |
        mkdir -p \
          state \
          docs/plans \
          artifacts/review \
          artifacts/work

        printf '%s\n' 'docs/plans/2026-03-06-dsl-evolution-execution-plan-v2.md' > state/plan_path.txt
        printf '%s\n' 'artifacts/review/dsl-evolution-plan-review-v2.md' > state/plan_review_report_path.txt
        printf '%s\n' 'artifacts/work/dsl-evolution-implementation-report-v2.md' > state/execution_report_path.txt
        printf '%s\n' 'artifacts/review/dsl-evolution-implementation-review.md' > state/implementation_review_report_path.txt
    expected_outputs:
      - name: plan_path
        path: state/plan_path.txt
        type: relpath
        under: docs/plans
      - name: plan_review_report_path
        path: state/plan_review_report_path.txt
        type: relpath
        under: artifacts/review
      - name: execution_report_path
        path: state/execution_report_path.txt
        type: relpath
        under: artifacts/work
      - name: implementation_review_report_path
        path: state/implementation_review_report_path.txt
        type: relpath
        under: artifacts/review

  - name: PublishDesignInput
    id: publish_design_input
    command:
      - bash
      - -lc
      - |
        design="${inputs.design_path}"
        if [ ! -f "$design" ]; then
          echo "Missing design file: $design" >&2
          exit 1
        fi
        mkdir -p state
        printf '%s\n' "$design" > state/design_path.txt
    expected_outputs:
      - name: design_path
        path: state/design_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
    publishes:
      - artifact: design
        from: design_path

  - name: DraftPlan
    id: draft_plan
    provider: codex
    input_file: prompts/workflows/dsl_follow_on_plan_impl_loop_v2/draft_plan.md
    timeout_sec: 3600
    consumes:
      - artifact: design
        policy: latest_successful
        freshness: any
    prompt_consumes: ["design"]
    expected_outputs:
      - name: plan_path
        path: state/plan_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
    publishes:
      - artifact: plan
        from: plan_path

  - name: PlanReviewLoop
    id: plan_review_loop
    repeat_until:
      id: plan_review_iteration
      max_iterations: 20
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE"]
          from:
            ref: self.steps.RoutePlanDecision.artifacts.review_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      steps:
        - name: ReviewPlan
          id: review_plan
          provider: codex
          input_file: prompts/workflows/dsl_follow_on_plan_impl_loop_v2/review_plan.md
          timeout_sec: 1800
          consumes:
            - artifact: design
              policy: latest_successful
              freshness: any
            - artifact: plan
              policy: latest_successful
              freshness: any
          prompt_consumes: ["design", "plan"]
          expected_outputs:
            - name: plan_review_report_path
              path: state/plan_review_report_path.txt
              type: relpath
              under: artifacts/review
              must_exist_target: true
            - name: plan_review_decision
              path: state/plan_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE"]
          publishes:
            - artifact: plan_review_report
              from: plan_review_report_path
            - artifact: plan_review_decision
              from: plan_review_decision

        - name: RoutePlanDecision
          id: route_plan_decision
          match:
            ref: self.steps.ReviewPlan.artifacts.plan_review_decision
            cases:
              APPROVE:
                id: approve_plan_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteApprovedPlanDecision.artifacts.review_decision
                steps:
                  - name: WriteApprovedPlanDecision
                    id: write_approved_plan_decision
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_plan_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteRevisedPlanDecision.artifacts.review_decision
                steps:
                  - name: RevisePlan
                    id: revise_plan
                    provider: codex
                    input_file: prompts/workflows/dsl_follow_on_plan_impl_loop_v2/revise_plan.md
                    timeout_sec: 3600
                    consumes:
                      - artifact: design
                        policy: latest_successful
                        freshness: any
                      - artifact: plan
                        policy: latest_successful
                        freshness: any
                      - artifact: plan_review_report
                        policy: latest_successful
                        freshness: since_last_consume
                    prompt_consumes: ["design", "plan", "plan_review_report"]
                    expected_outputs:
                      - name: plan_path
                        path: state/plan_path.txt
                        type: relpath
                        under: docs/plans
                        must_exist_target: true
                    publishes:
                      - artifact: plan
                        from: plan_path
                  - name: WriteRevisedPlanDecision
                    id: write_revised_plan_decision
                    set_scalar:
                      artifact: review_decision
                      value: REVISE

  - name: ExecuteImplementation
    id: execute_implementation
    provider: codex
    input_file: prompts/workflows/dsl_follow_on_plan_impl_loop_v2/implement_plan.md
    timeout_sec: 43200
    consumes:
      - artifact: design
        policy: latest_successful
        freshness: any
      - artifact: plan
        policy: latest_successful
        freshness: any
    prompt_consumes: ["design", "plan"]
    expected_outputs:
      - name: execution_report_path
        path: state/execution_report_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
    publishes:
      - artifact: execution_report
        from: execution_report_path

  - name: ImplementationReviewLoop
    id: implementation_review_loop
    repeat_until:
      id: implementation_review_iteration
      max_iterations: 30
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE"]
          from:
            ref: self.steps.RouteImplementationDecision.artifacts.review_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      steps:
        - name: ReviewImplementation
          id: review_implementation
          provider: codex
          input_file: prompts/workflows/dsl_follow_on_plan_impl_loop_v2/review_implementation.md
          timeout_sec: 1800
          consumes:
            - artifact: design
              policy: latest_successful
              freshness: any
            - artifact: plan
              policy: latest_successful
              freshness: any
            - artifact: execution_report
              policy: latest_successful
              freshness: any
          prompt_consumes: ["design", "plan", "execution_report"]
          expected_outputs:
            - name: implementation_review_report_path
              path: state/implementation_review_report_path.txt
              type: relpath
              under: artifacts/review
              must_exist_target: true
            - name: implementation_review_decision
              path: state/implementation_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE"]
          publishes:
            - artifact: implementation_review_report
              from: implementation_review_report_path
            - artifact: implementation_review_decision
              from: implementation_review_decision

        - name: RouteImplementationDecision
          id: route_implementation_decision
          match:
            ref: self.steps.ReviewImplementation.artifacts.implementation_review_decision
            cases:
              APPROVE:
                id: approve_implementation_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteApprovedImplementationDecision.artifacts.review_decision
                steps:
                  - name: WriteApprovedImplementationDecision
                    id: write_approved_implementation_decision
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_implementation_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteRevisedImplementationDecision.artifacts.review_decision
                steps:
                  - name: FixImplementation
                    id: fix_implementation
                    provider: codex
                    input_file: prompts/workflows/dsl_follow_on_plan_impl_loop_v2/fix_implementation.md
                    timeout_sec: 43200
                    consumes:
                      - artifact: design
                        policy: latest_successful
                        freshness: any
                      - artifact: plan
                        policy: latest_successful
                        freshness: any
                      - artifact: execution_report
                        policy: latest_successful
                        freshness: any
                      - artifact: implementation_review_report
                        policy: latest_successful
                        freshness: since_last_consume
                    prompt_consumes: ["design", "plan", "execution_report", "implementation_review_report"]
                    expected_outputs:
                      - name: execution_report_path
                        path: state/execution_report_path.txt
                        type: relpath
                        under: artifacts/work
                        must_exist_target: true
                    publishes:
                      - artifact: execution_report
                        from: execution_report_path
                  - name: WriteRevisedImplementationDecision
                    id: write_revised_implementation_decision
                    set_scalar:
                      artifact: review_decision
                      value: REVISE

  - name: PublishFinalOutputs
    id: publish_final_outputs
    command:
      - bash
      - -lc
      - |
        mkdir -p state
        cat state/plan_path.txt > state/final_plan_path.txt
        cat state/execution_report_path.txt > state/final_execution_report_path.txt
        cat state/implementation_review_report_path.txt > state/final_implementation_review_report_path.txt
        cat state/implementation_review_decision.txt > state/final_implementation_review_decision.txt
    expected_outputs:
      - name: plan_path
        path: state/final_plan_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: execution_report_path
        path: state/final_execution_report_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: implementation_review_report_path
        path: state/final_implementation_review_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: implementation_review_decision
        path: state/final_implementation_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE"]
