version: "2.7"
name: "backlog-priority-design-plan-impl-stack-v2-call"

imports:
  item_stack: ../library/backlog_item_design_plan_impl_stack.yaml

inputs:
  backlog_manifest_path:
    type: relpath
    under: workflows/examples/inputs
    must_exist_target: true
    default: workflows/examples/inputs/backlog_priority_items.json

steps:
  - name: ReadBacklogManifest
    id: read_backlog_manifest
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        path = pathlib.Path(sys.argv[1])
        payload = json.loads(path.read_text(encoding="utf-8"))
        if not isinstance(payload, list):
            raise SystemExit("Backlog manifest must be a JSON array")
        print(json.dumps(payload))
      - ${inputs.backlog_manifest_path}
    output_capture: json

  - name: ProcessBacklogItems
    id: process_backlog_items
    for_each:
      items_from: steps.ReadBacklogManifest.json
      as: backlog_item
      steps:
        - name: PrepareItemInputs
          id: prepare_item_inputs
          command:
            - python
            - -c
            - |
              import json
              import pathlib
              import sys

              item = json.loads(sys.argv[1])
              if not isinstance(item, dict):
                  raise SystemExit("Backlog item must be a JSON object")

              item_id = item.get("item_id")
              brief_path = item.get("brief_path")
              if not isinstance(item_id, str) or not item_id:
                  raise SystemExit("Backlog item missing non-empty item_id")
              if not isinstance(brief_path, str) or not brief_path:
                  raise SystemExit("Backlog item missing non-empty brief_path")

              payload = {
                  "item_state_root": f"state/backlog-priority-stack/{item_id}",
                  "design_phase_state_root": f"state/backlog-priority-stack/{item_id}/design-phase",
                  "plan_phase_state_root": f"state/backlog-priority-stack/{item_id}/plan-phase",
                  "implementation_phase_state_root": f"state/backlog-priority-stack/{item_id}/implementation-phase",
                  "brief_path": brief_path,
                  "design_target_path": f"docs/plans/{item_id}-design.md",
                  "design_review_report_target_path": f"artifacts/review/{item_id}-design-review.json",
                  "plan_target_path": f"docs/plans/{item_id}-execution-plan.md",
                  "plan_review_report_target_path": f"artifacts/review/{item_id}-plan-review.json",
                  "execution_report_target_path": f"artifacts/work/{item_id}-execution-report.md",
                  "implementation_review_report_target_path": f"artifacts/review/{item_id}-implementation-review.md",
                  "item_summary_target_path": f"artifacts/work/{item_id}-summary.json",
              }

              output_path = pathlib.Path("state/backlog-priority-stack/current-item-inputs.json")
              output_path.parent.mkdir(parents=True, exist_ok=True)
              output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
            - ${backlog_item}
            - ${loop.index}
          output_bundle:
            path: state/backlog-priority-stack/current-item-inputs.json
            fields:
              - name: item_state_root
                json_pointer: /item_state_root
                type: relpath
                under: state
              - name: design_phase_state_root
                json_pointer: /design_phase_state_root
                type: relpath
                under: state
              - name: plan_phase_state_root
                json_pointer: /plan_phase_state_root
                type: relpath
                under: state
              - name: implementation_phase_state_root
                json_pointer: /implementation_phase_state_root
                type: relpath
                under: state
              - name: brief_path
                json_pointer: /brief_path
                type: relpath
                under: docs
                must_exist_target: true
              - name: design_target_path
                json_pointer: /design_target_path
                type: relpath
                under: docs/plans
              - name: design_review_report_target_path
                json_pointer: /design_review_report_target_path
                type: relpath
                under: artifacts/review
              - name: plan_target_path
                json_pointer: /plan_target_path
                type: relpath
                under: docs/plans
              - name: plan_review_report_target_path
                json_pointer: /plan_review_report_target_path
                type: relpath
                under: artifacts/review
              - name: execution_report_target_path
                json_pointer: /execution_report_target_path
                type: relpath
                under: artifacts/work
              - name: implementation_review_report_target_path
                json_pointer: /implementation_review_report_target_path
                type: relpath
                under: artifacts/review
              - name: item_summary_target_path
                json_pointer: /item_summary_target_path
                type: relpath
                under: artifacts/work

        - name: RunItemWorkflow
          id: run_item_workflow
          call: item_stack
          with:
            item_state_root:
              ref: self.steps.PrepareItemInputs.artifacts.item_state_root
            design_phase_state_root:
              ref: self.steps.PrepareItemInputs.artifacts.design_phase_state_root
            plan_phase_state_root:
              ref: self.steps.PrepareItemInputs.artifacts.plan_phase_state_root
            implementation_phase_state_root:
              ref: self.steps.PrepareItemInputs.artifacts.implementation_phase_state_root
            brief_path:
              ref: self.steps.PrepareItemInputs.artifacts.brief_path
            design_target_path:
              ref: self.steps.PrepareItemInputs.artifacts.design_target_path
            design_review_report_target_path:
              ref: self.steps.PrepareItemInputs.artifacts.design_review_report_target_path
            plan_target_path:
              ref: self.steps.PrepareItemInputs.artifacts.plan_target_path
            plan_review_report_target_path:
              ref: self.steps.PrepareItemInputs.artifacts.plan_review_report_target_path
            execution_report_target_path:
              ref: self.steps.PrepareItemInputs.artifacts.execution_report_target_path
            implementation_review_report_target_path:
              ref: self.steps.PrepareItemInputs.artifacts.implementation_review_report_target_path
            item_summary_target_path:
              ref: self.steps.PrepareItemInputs.artifacts.item_summary_target_path
