version: "1.4"
name: "dsl-tracked-plan-review-loop"
context:
  max_plan_iterations: "20"
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

providers:
  codex:
    command: ["codex", "exec", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"

steps:
  - name: InitializeTrackedPlanState
    command:
      - bash
      - -lc
      - |
        mkdir -p state docs/plans artifacts/review

        printf '%s\n' 'docs/plans/2026-03-06-dsl-evolution-control-flow-and-reuse.md' > state/design_path.txt
        printf '%s\n' 'docs/plans/2026-03-06-dsl-evolution-execution-plan.md' > state/plan_path.txt
        printf '%s\n' 'artifacts/review/open-findings-seed.json' > state/open_findings_path.txt
        printf '0\n' > state/plan_cycle.txt

        cat > artifacts/review/open-findings-seed.json <<'JSON'
        {
          "findings": []
        }
        JSON
    expected_outputs:
      - name: design_path
        path: state/design_path.txt
        type: relpath
        under: docs/plans
      - name: plan_path
        path: state/plan_path.txt
        type: relpath
        under: docs/plans
      - name: open_findings_path
        path: state/open_findings_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: plan_cycle
        path: state/plan_cycle.txt
        type: integer
    publishes:
      - artifact: open_findings
        from: open_findings_path

  - name: PublishDesign
    command:
      - bash
      - -lc
      - |
        design="$(cat state/design_path.txt)"
        if [ ! -f "$design" ]; then
          echo "Missing design file: $design" >&2
          exit 1
        fi
    expected_outputs:
      - name: design_path
        path: state/design_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
    publishes:
      - artifact: design
        from: design_path

  - name: DraftPlan
    provider: codex
    input_file: prompts/workflows/dsl_tracked_plan_review_loop/draft_plan.md
    timeout_sec: 3600
    consumes:
      - artifact: design
        producers: ["PublishDesign"]
        policy: latest_successful
        freshness: any
    prompt_consumes: ["design"]
    expected_outputs:
      - name: plan_path
        path: state/plan_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
    publishes:
      - artifact: plan
        from: plan_path

  - name: PreparePlanReviewSlot
    command:
      - bash
      - -lc
      - |
        cycle="$(cat state/plan_cycle.txt)"
        printf 'artifacts/review/plan-review-cycle-%s.json\n' "$cycle" > state/plan_review_report_path.txt
        printf 'artifacts/review/plan-resolution-cycle-%s.json\n' "$cycle" > state/plan_resolution_report_path.txt
    expected_outputs:
      - name: plan_review_report_path
        path: state/plan_review_report_path.txt
        type: relpath
        under: artifacts/review
      - name: plan_resolution_report_path
        path: state/plan_resolution_report_path.txt
        type: relpath
        under: artifacts/review

  - name: ReviewPlanTracked
    provider: codex
    input_file: prompts/workflows/dsl_tracked_plan_review_loop/review_plan.md
    timeout_sec: 1800
    consumes:
      - artifact: design
        producers: ["PublishDesign"]
        policy: latest_successful
        freshness: any
      - artifact: plan
        producers: ["DraftPlan", "RevisePlanTracked"]
        policy: latest_successful
        freshness: any
      - artifact: open_findings
        producers: ["InitializeTrackedPlanState", "ExtractOpenFindings"]
        policy: latest_successful
        freshness: any
    prompt_consumes: ["design", "plan", "open_findings"]
    expected_outputs:
      - name: plan_review_report_path
        path: state/plan_review_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
      - name: plan_review_decision
        path: state/plan_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE"]
      - name: unresolved_high_count
        path: state/unresolved_high_count.txt
        type: integer
      - name: unresolved_medium_count
        path: state/unresolved_medium_count.txt
        type: integer
    publishes:
      - artifact: plan_review_report
        from: plan_review_report_path
      - artifact: plan_review_decision
        from: plan_review_decision
      - artifact: unresolved_high_count
        from: unresolved_high_count

  - name: PlanFindingsGate
    command:
      - bash
      - -lc
      - |
        python - <<'PY'
        from pathlib import Path

        decision = Path("state/plan_review_decision.txt").read_text(encoding="utf-8").strip()
        unresolved_high_count = int(Path("state/unresolved_high_count.txt").read_text(encoding="utf-8").strip())
        raise SystemExit(0 if decision == "APPROVE" and unresolved_high_count == 0 else 1)
        PY
    on:
      success:
        goto: _end
      failure:
        goto: PlanCycleGate

  - name: PlanCycleGate
    command:
      - bash
      - -lc
      - 'test "$(cat state/plan_cycle.txt)" -lt "${context.max_plan_iterations}"'
    on:
      success:
        goto: RevisePlanTracked
      failure:
        goto: MaxPlanCyclesExceeded

  - name: RevisePlanTracked
    provider: codex
    input_file: prompts/workflows/dsl_tracked_plan_review_loop/revise_plan.md
    timeout_sec: 3600
    consumes:
      - artifact: design
        producers: ["PublishDesign"]
        policy: latest_successful
        freshness: any
      - artifact: plan
        producers: ["DraftPlan", "RevisePlanTracked"]
        policy: latest_successful
        freshness: any
      - artifact: plan_review_report
        producers: ["ReviewPlanTracked"]
        policy: latest_successful
        freshness: since_last_consume
    prompt_consumes: ["design", "plan", "plan_review_report"]
    expected_outputs:
      - name: plan_path
        path: state/plan_path.txt
        type: relpath
        under: docs/plans
        must_exist_target: true
      - name: plan_resolution_report_path
        path: state/plan_resolution_report_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
    publishes:
      - artifact: plan
        from: plan_path
      - artifact: plan_resolution_report
        from: plan_resolution_report_path
    on:
      success:
        goto: IncrementPlanCycle

  - name: IncrementPlanCycle
    command:
      - bash
      - -lc
      - 'c=$(cat state/plan_cycle.txt); printf "%s\n" "$((c+1))" > state/plan_cycle.txt'
    expected_outputs:
      - name: plan_cycle
        path: state/plan_cycle.txt
        type: integer
    on:
      success:
        goto: ExtractOpenFindings

  - name: ExtractOpenFindings
    command:
      - bash
      - -lc
      - |
        python - <<'PY'
        import json
        from pathlib import Path

        cycle = Path("state/plan_cycle.txt").read_text(encoding="utf-8").strip()
        review_relpath = Path("state/plan_review_report_path.txt").read_text(encoding="utf-8").strip()
        review_payload = json.loads(Path(review_relpath).read_text(encoding="utf-8"))

        carried = []
        for finding in review_payload.get("findings", []):
            if finding.get("status") in {"STILL_OPEN", "NEW", "SPLIT"}:
                carried.append(finding)

        next_relpath = f"artifacts/review/open-findings-cycle-{cycle}.json"
        Path(next_relpath).write_text(json.dumps({"findings": carried}, indent=2) + "\n", encoding="utf-8")
        Path("state/open_findings_path.txt").write_text(f"{next_relpath}\n", encoding="utf-8")
        PY
    expected_outputs:
      - name: open_findings_path
        path: state/open_findings_path.txt
        type: relpath
        under: artifacts/review
        must_exist_target: true
    publishes:
      - artifact: open_findings
        from: open_findings_path
    on:
      success:
        goto: PreparePlanReviewSlot

  - name: MaxPlanCyclesExceeded
    command:
      - bash
      - -lc
      - |
        echo "Exceeded ${context.max_plan_iterations} tracked plan review/revise iterations without approval." >&2
        exit 1

artifacts:
  design:
    pointer: state/design_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  plan:
    pointer: state/plan_path.txt
    type: relpath
    under: docs/plans
    must_exist_target: true
  open_findings:
    pointer: state/open_findings_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
  plan_review_report:
    pointer: state/plan_review_report_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
  plan_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
  unresolved_high_count:
    kind: scalar
    type: integer
  plan_resolution_report:
    pointer: state/plan_resolution_report_path.txt
    type: relpath
    under: artifacts/review
    must_exist_target: true
