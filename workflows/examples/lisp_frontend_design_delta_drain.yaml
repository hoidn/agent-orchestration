version: "2.14"
name: "lisp-frontend-design-delta-drain-v214"

imports:
  selector: ../library/lisp_frontend_design_delta_selector.v214.yaml
  design_gap_architect: ../library/lisp_frontend_design_delta_design_gap_architect.v214.yaml
  work_item: ../library/lisp_frontend_design_delta_work_item.v214.yaml
  done_review: ../library/lisp_frontend_design_delta_done_review.v214.yaml

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  steering_path:
    type: relpath
    under: docs
    must_exist_target: true
  target_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  baseline_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  post_wcc_inventory_path:
    type: relpath
    under: docs/plans
    default: docs/plans/LISP-FRONTEND-AUTONOMOUS-DRAIN/post_wcc_current_state_inventory.json
    must_exist_target: true
  command_adapter_contract_path:
    type: relpath
    under: docs/design
    default: docs/design/workflow_command_adapter_contract.md
    must_exist_target: true
  backlog_root:
    type: relpath
    under: docs/backlog
    default: docs/backlog/active
  progress_ledger_path:
    type: relpath
    under: state
    default: state/LISP-FRONTEND-AUTONOMOUS-DRAIN/progress_ledger.json
    must_exist_target: true
  drain_state_root:
    type: relpath
    under: state
    default: state/LISP-FRONTEND-AUTONOMOUS-DRAIN/drain
  run_state_target_path:
    type: relpath
    under: state
    default: state/LISP-FRONTEND-AUTONOMOUS-DRAIN/drain/run_state.json
  drain_summary_target_path:
    type: relpath
    under: artifacts/work
    default: artifacts/work/LISP-FRONTEND-AUTONOMOUS-DRAIN/drain-summary.json
  artifact_work_root:
    type: relpath
    under: artifacts/work
    default: artifacts/work/LISP-FRONTEND-AUTONOMOUS-DRAIN
  artifact_checks_root:
    type: relpath
    under: artifacts/checks
    default: artifacts/checks/LISP-FRONTEND-AUTONOMOUS-DRAIN
  artifact_review_root:
    type: relpath
    under: artifacts/review
    default: artifacts/review/LISP-FRONTEND-AUTONOMOUS-DRAIN
  architecture_index_root:
    type: relpath
    under: docs/plans
    default: docs/plans/LISP-FRONTEND-AUTONOMOUS-DRAIN/design-gaps
  design_gap_draft_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude"]
    default: "claude"
  design_gap_draft_model:
    kind: scalar
    type: string
    default: "fable"
  design_gap_draft_effort:
    kind: scalar
    type: string
    default: "high"
  blocked_design_revision_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude"]
    default: "claude"
  blocked_design_revision_model:
    kind: scalar
    type: string
    default: "fable"
  blocked_design_revision_effort:
    kind: scalar
    type: string
    default: "high"
  selector_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude"]
    default: "claude"
  selector_model:
    kind: scalar
    type: string
    default: "fable"
  selector_effort:
    kind: scalar
    type: string
    default: "high"
  implementation_execute_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"
  implementation_review_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"
  done_review_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"
  claude_opus:
    command: ["claude", "-p", "--model", "${model}", "--effort", "${effort}", "--permission-mode", "bypassPermissions"]
    input_mode: "stdin"
    defaults:
      model: "opus"
      effort: "high"
  claude:
    command: ["claude", "-p", "--model", "${model}", "--effort", "${effort}", "--permission-mode", "bypassPermissions"]
    input_mode: "stdin"
    defaults:
      model: "fable"
      effort: "high"

outputs:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE", "BLOCKED"]
    from:
      ref: root.steps.DrainLispFrontendWork.artifacts.drain_status
  run_state_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.run_state_path
  drain_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.drain_summary_path

artifacts:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE", "BLOCKED"]
  selection_status:
    kind: scalar
    type: enum
    allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]

steps:
  - name: InitializeDrainState
    id: initialize_drain_state
    command:
      - python
      - workflows/library/scripts/update_lisp_frontend_run_state.py
      - --state-path
      - ${inputs.run_state_target_path}
      - init
      - --run-id
      - ${run.id}

  - name: DrainLispFrontendWork
    id: drain_lisp_frontend_work
    repeat_until:
      id: lisp_frontend_drain_iteration
      max_iterations: 60
      outputs:
        drain_status:
          kind: scalar
          type: enum
          allowed: ["CONTINUE", "DONE", "BLOCKED"]
          from:
            ref: self.steps.ResolveIterationDrainStatus.artifacts.drain_status
      condition:
        any_of:
          - compare:
              left:
                ref: self.outputs.drain_status
              op: eq
              right: DONE
          - compare:
              left:
                ref: self.outputs.drain_status
              op: eq
              right: BLOCKED
      steps:
        - name: BuildBacklogManifest
          id: build_backlog_manifest
          command:
            - python
            - workflows/library/scripts/build_lisp_frontend_backlog_manifest.py
            - --backlog-root
            - ${inputs.backlog_root}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/manifest.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/manifest.json
            fields:
              - name: manifest_path
                json_pointer: /manifest_path
                type: relpath
                under: state
                must_exist_target: true
              - name: active_count
                json_pointer: /active_count
                type: integer

        - name: ProjectSelectorManifest
          id: project_selector_manifest
          command:
            - python
            - workflows/library/scripts/project_lisp_frontend_selector_manifest.py
            - --manifest-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/manifest.json
            - --architecture-index-root
            - ${inputs.architecture_index_root}
            - --run-state-path
            - ${inputs.run_state_target_path}
            - --control-output
            - ${inputs.drain_state_root}/iterations/${loop.index}/selector-control-manifest.json
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/selector-manifest.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/selector-manifest.json
            fields:
              - name: manifest_path
                json_pointer: /manifest_path
                type: relpath
                under: state
                must_exist_target: true

        - name: PrepareIterationPaths
          id: prepare_iteration_paths
          command:
            - python
            - workflows/library/scripts/prepare_lisp_frontend_iteration_paths.py
            - --drain-state-root
            - ${inputs.drain_state_root}
            - --iteration
            - ${loop.index}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/iteration-paths.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/iteration-paths.json
            fields:
              - name: selector_state_root
                json_pointer: /selector_state_root
                type: relpath
                under: state
              - name: prerequisite_selector_state_root
                json_pointer: /prerequisite_selector_state_root
                type: relpath
                under: state
              - name: design_gap_architect_state_root
                json_pointer: /design_gap_architect_state_root
                type: relpath
                under: state
              - name: backlog_work_item_state_root
                json_pointer: /backlog_work_item_state_root
                type: relpath
                under: state
              - name: design_gap_work_item_state_root
                json_pointer: /design_gap_work_item_state_root
                type: relpath
                under: state
              - name: done_review_state_root
                json_pointer: /done_review_state_root
                type: relpath
                under: state
              - name: done_review_design_gap_architect_state_root
                json_pointer: /done_review_design_gap_architect_state_root
                type: relpath
                under: state
              - name: done_review_design_gap_work_item_state_root
                json_pointer: /done_review_design_gap_work_item_state_root
                type: relpath
                under: state

        - name: ProjectProgressSignals
          id: project_progress_signals
          command:
            - python
            - workflows/library/scripts/project_lisp_frontend_progress_signals.py
            - --run-id
            - ${run.id}
            - --run-state-path
            - ${inputs.run_state_target_path}
            - --current-iteration
            - ${loop.index}
            - --artifact-work-root
            - ${inputs.artifact_work_root}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/progress-signals.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/progress-signals.json
            fields:
              - name: progress_signals_schema
                json_pointer: /schema
                type: string
              - name: event_count
                json_pointer: /event_count
                type: integer

        - name: EvaluateNonProgress
          id: evaluate_non_progress
          command:
            - python
            - workflows/library/scripts/evaluate_workflow_non_progress.py
            - --signals
            - ${inputs.drain_state_root}/iterations/${loop.index}/progress-signals.json
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/non-progress-decision.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/non-progress-decision.json
            fields:
              - name: non_progress_route
                json_pointer: /route
                type: enum
                allowed: ["NORMAL_CONTINUE", "STEP_BACK_REQUIRED", "TERMINAL_HUMAN_DECISION"]
              - name: failure_fingerprint
                json_pointer: /failure_fingerprint
                type: string

        - name: DetectBlockedDesignGapRecovery
          id: detect_blocked_design_gap_recovery
          command:
            - python
            - workflows/library/scripts/detect_lisp_frontend_blocked_design_gap_recovery.py
            - --run-state-path
            - ${inputs.run_state_target_path}
            - --artifact-work-root
            - ${inputs.artifact_work_root}
            - --architecture-index-root
            - ${inputs.architecture_index_root}
            - --non-progress-decision-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/non-progress-decision.json
            - --selector-manifest-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/selector-control-manifest.json
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
            fields:
              - name: pre_selection_route
                json_pointer: /pre_selection_route
                type: enum
                allowed: ["SELECT_NORMAL_WORK", "SELECT_DONE_REVIEW", "SELECT_PREREQUISITE_WORK", "RECOVER_BLOCKED_DESIGN_GAP", "BLOCKED"]
              - name: design_gap_id
                json_pointer: /design_gap_id
                type: string
              - name: recovery_route
                json_pointer: /recovery_route
                type: enum
                allowed: ["NOT_APPLICABLE", "GAP_DESIGN_REVISION_REQUIRED", "TARGET_DESIGN_REVISION_REQUIRED", "PREREQUISITE_GAP_REQUIRED", "TERMINAL_BLOCKED"]
              - name: recovery_reason
                json_pointer: /recovery_reason
                type: string
              - name: recovery_status
                json_pointer: /recovery_status
                type: string
              - name: progress_report_path
                json_pointer: /progress_report_path
                type: string
              - name: architecture_path
                json_pointer: /architecture_path
                type: string
              - name: plan_path
                json_pointer: /plan_path
                type: string
              - name: architecture_copy_path
                json_pointer: /architecture_copy_path
                type: string
              - name: plan_copy_path
                json_pointer: /plan_copy_path
                type: string
              - name: blocker_class
                json_pointer: /blocker_class
                type: string
              - name: block_reason
                json_pointer: /block_reason
                type: string
              - name: implementation_state_path
                json_pointer: /implementation_state_path
                type: string
              - name: recovery_event_id
                json_pointer: /recovery_event_id
                type: string
              - name: blocked_work_id
                json_pointer: /blocked_work_id
                type: string
              - name: blocked_work_source
                json_pointer: /blocked_work_source
                type: string
              - name: waiting_on_work_id
                json_pointer: /waiting_on_work_id
                type: string
              - name: waiting_on_work_source
                json_pointer: /waiting_on_work_source
                type: string
              - name: retry_target_id
                json_pointer: /retry_target_id
                type: string
              - name: retry_target_source
                json_pointer: /retry_target_source
                type: string
              - name: recovery_pointer_status
                json_pointer: /recovery_pointer_status
                type: enum
                allowed: ["", "WAITING", "READY_TO_RETRY", "INVALID"]

        - name: DiagnoseNonProgress
          id: diagnose_non_progress
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: BLOCKED
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: eq
                  right: STEP_BACK_REQUIRED
          provider: ${inputs.implementation_review_provider}
          input_file: workflows/library/prompts/workflow_step_back/diagnose_non_progress.md
          timeout_sec: 1800
          depends_on:
            required:
              - ${inputs.drain_state_root}/iterations/${loop.index}/progress-signals.json
              - ${inputs.drain_state_root}/iterations/${loop.index}/non-progress-decision.json
            inject:
              mode: content
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/step-back-diagnosis.json
            fields:
              - name: step_back_action
                json_pointer: /action
                type: enum
                allowed:
                  - REDRAFT_PLAN
                  - REVISE_REQUIREMENTS
                  - SPLIT_WORK_ITEM
                  - DROP_OR_DEMOTE_WORK_ITEM
                  - FIX_WORKFLOW_MECHANICS
                  - CONTINUE_WITH_CURRENT_PLAN
                  - NEEDS_HUMAN_DECISION
              - name: rationale
                json_pointer: /rationale
                type: string

        - name: RecordStepBackOutcome
          id: record_step_back_outcome
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: BLOCKED
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: eq
                  right: STEP_BACK_REQUIRED
          command:
            - python
            - workflows/library/scripts/record_workflow_step_back_outcome.py
            - --state-path
            - ${inputs.run_state_target_path}
            - --decision-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/non-progress-decision.json
            - --diagnosis-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/step-back-diagnosis.json
            - --summary-path
            - ${inputs.artifact_work_root}/iterations/${loop.index}/step-back-summary.json
            - --drain-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/step-back-drain-status.txt
            - --iteration
            - ${loop.index}
          output_bundle:
            path: ${inputs.artifact_work_root}/iterations/${loop.index}/step-back-summary.json
            fields:
              - name: step_back_record_status
                json_pointer: /record_status
                type: enum
                allowed: ["STEP_BACK_RECORDED"]
              - name: step_back_drain_status
                json_pointer: /drain_status
                type: enum
                allowed: ["CONTINUE", "BLOCKED"]

        - name: SelectNextWork
          id: select_next_work
          match:
            ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
            cases:
              SELECT_NORMAL_WORK:
                id: run_normal_selector_path
                outputs:
                  selection_status:
                    kind: scalar
                    type: enum
                    allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.RunNormalSelector.artifacts.selection_status
                  selection_bundle_path:
                    type: relpath
                    under: state
                    must_exist_target: true
                    from:
                      ref: self.steps.RunNormalSelector.artifacts.selection_bundle_path
                steps:
                  - name: ClearSelectorControlManifest
                    id: clear_selector_control_manifest
                    command:
                      - python
                      - workflows/library/scripts/remove_lisp_frontend_private_artifact.py
                      - --path
                      - ${inputs.drain_state_root}/iterations/${loop.index}/selector-control-manifest.json
                      - --under
                      - state
                  - name: RunNormalSelector
                    id: run_normal_selector
                    call: selector
                    with:
                      state_root:
                        ref: parent.steps.PrepareIterationPaths.artifacts.selector_state_root
                      steering_path:
                        ref: inputs.steering_path
                      target_design_path:
                        ref: inputs.target_design_path
                      baseline_design_path:
                        ref: inputs.baseline_design_path
                      manifest_path:
                        ref: parent.steps.ProjectSelectorManifest.artifacts.manifest_path
                      selector_provider:
                        ref: inputs.selector_provider
                      selector_model:
                        ref: inputs.selector_model
                      selector_effort:
                        ref: inputs.selector_effort
              SELECT_DONE_REVIEW:
                id: deterministic_done_review_path
                outputs:
                  selection_status:
                    kind: scalar
                    type: enum
                    allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteDoneReviewSelection.artifacts.selection_status
                  selection_bundle_path:
                    type: relpath
                    under: state
                    must_exist_target: true
                    from:
                      ref: self.steps.PublishDoneReviewSelectionBundle.artifacts.selection_bundle_path
                steps:
                  - name: WriteDoneReviewSelection
                    id: write_done_review_selection
                    command:
                      - python
                      - workflows/library/scripts/write_lisp_frontend_done_selection.py
                      - --output
                      - ${inputs.drain_state_root}/iterations/${loop.index}/done-review-selection.json
                    output_bundle:
                      path: ${inputs.drain_state_root}/iterations/${loop.index}/done-review-selection.json
                      fields:
                        - name: selection_status
                          json_pointer: /selection_status
                          type: enum
                          allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]
                  - name: PublishDoneReviewSelectionBundle
                    id: publish_done_review_selection_bundle
                    command:
                      - python
                      - workflows/library/scripts/publish_lisp_frontend_selection_bundle.py
                      - --selection-path
                      - ${inputs.drain_state_root}/iterations/${loop.index}/done-review-selection.json
                      - --manifest-path
                      - ${inputs.drain_state_root}/iterations/${loop.index}/selector-control-manifest.json
                      - --output
                      - ${inputs.drain_state_root}/iterations/${loop.index}/done-review-selection-bundle-path.json
                    output_bundle:
                      path: ${inputs.drain_state_root}/iterations/${loop.index}/done-review-selection-bundle-path.json
                      fields:
                        - name: selection_bundle_path
                          json_pointer: /selection_bundle_path
                          type: relpath
                          under: state
                          must_exist_target: true
              SELECT_PREREQUISITE_WORK:
                id: run_prerequisite_recovery_selector_path
                outputs:
                  selection_status:
                    kind: scalar
                    type: enum
                    allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.WritePrerequisiteRecoverySelection.artifacts.selection_status
                  selection_bundle_path:
                    type: relpath
                    under: state
                    must_exist_target: true
                    from:
                      ref: self.steps.PublishPrerequisiteRecoverySelectionBundle.artifacts.selection_bundle_path
                steps:
                  - name: WritePrerequisiteRecoverySelection
                    id: write_prerequisite_recovery_selection
                    command:
                      - python
                      - workflows/library/scripts/write_lisp_frontend_prerequisite_selection.py
                      - --pre-selection-path
                      - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
                      - --manifest-path
                      - ${inputs.drain_state_root}/iterations/${loop.index}/selector-control-manifest.json
                      - --target-design-path
                      - ${inputs.target_design_path}
                      - --output
                      - ${inputs.drain_state_root}/iterations/${loop.index}/prerequisite-selection.json
                    output_bundle:
                      path: ${inputs.drain_state_root}/iterations/${loop.index}/prerequisite-selection.json
                      fields:
                        - name: selection_status
                          json_pointer: /selection_status
                          type: enum
                          allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]
                  - name: PublishPrerequisiteRecoverySelectionBundle
                    id: publish_prerequisite_recovery_selection_bundle
                    command:
                      - python
                      - workflows/library/scripts/publish_lisp_frontend_selection_bundle.py
                      - --selection-path
                      - ${inputs.drain_state_root}/iterations/${loop.index}/prerequisite-selection.json
                      - --output
                      - ${inputs.drain_state_root}/iterations/${loop.index}/prerequisite-selection-bundle-path.json
                    output_bundle:
                      path: ${inputs.drain_state_root}/iterations/${loop.index}/prerequisite-selection-bundle-path.json
                      fields:
                        - name: selection_bundle_path
                          json_pointer: /selection_bundle_path
                          type: relpath
                          under: state
                          must_exist_target: true
              RECOVER_BLOCKED_DESIGN_GAP:
                id: selector_placeholder_recovery_path
                outputs: &blocked_selector_placeholder_outputs
                  selection_status:
                    kind: scalar
                    type: enum
                    allowed: ["SELECT_BACKLOG_ITEM", "DRAFT_DESIGN_GAP", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteSelectorBlockedPlaceholder.artifacts.selection_status
                  selection_bundle_path:
                    type: relpath
                    under: state
                    must_exist_target: true
                    from:
                      ref: self.steps.WriteSelectorBlockedBundlePlaceholder.artifacts.selection_bundle_path
                steps:
                  - name: WriteSelectorBlockedPlaceholder
                    id: write_selector_blocked_placeholder
                    set_scalar:
                      artifact: selection_status
                      value: BLOCKED
                  - name: WriteSelectorBlockedBundlePlaceholder
                    id: write_selector_blocked_bundle_placeholder
                    command:
                      - python
                      - workflows/library/scripts/write_lisp_frontend_relpath_value.py
                      - --value
                      - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
                      - --under
                      - state
                      - --output
                      - ${inputs.drain_state_root}/iterations/${loop.index}/selector-blocked-placeholder-path.txt
                    expected_outputs:
                      - name: selection_bundle_path
                        path: ${inputs.drain_state_root}/iterations/${loop.index}/selector-blocked-placeholder-path.txt
                        type: relpath
                        under: state
                        must_exist_target: true
              BLOCKED:
                id: selector_placeholder_blocked_path
                outputs: *blocked_selector_placeholder_outputs
                steps:
