              - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-progress-report.md
              - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-report.json
              - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-review-target-path.txt
            inject:
              mode: content
          expected_outputs:
            - name: design_revision_review_decision
              path: ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-review-decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE"]

        - name: ValidateBlockedDesignRevisionReviewReportPath
          id: validate_blocked_design_revision_review_report_path
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: ne
                  right: RETRY_READY
              - any_of:
                  - compare:
