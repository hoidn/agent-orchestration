            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-review-target-path.txt
          expected_outputs:
            - name: design_revision_review_report_path
              path: ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-review-target-path.txt
              type: relpath
              under: artifacts/review
              must_exist_target: false

        - name: ReviewBlockedTargetDesignRevision
          id: review_blocked_target_design_revision
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
