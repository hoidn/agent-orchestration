                        ref: inputs.design_gap_draft_effort
              BLOCKED:
                id: blocked_path
                outputs:
                  drain_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteBlocked.artifacts.drain_status
                steps:
                  - name: WriteBlocked
                    id: write_blocked
