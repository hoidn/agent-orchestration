              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: ne
                  right: RETRY_READY
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.ClassifyBlockedImplementationRecovery.artifacts.blocked_recovery_route
                      op: eq
                      right: TARGET_DESIGN_REVISION_REQUIRED
          command:
            - python
            - workflows/library/scripts/write_lisp_frontend_design_revision_iteration_decision.py
            - --revision-report
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-report.json
            - --review-decision-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-review-decision.txt
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-loop-decision.txt
          expected_outputs:
            - name: design_revision_review_decision
              path: ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-loop-decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE", "BLOCKED"]

        - name: RecordBlockedRecoveryOutcome
          id: record_blocked_recovery_outcome
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: ne
                  right: RETRY_READY
          command:
            - python
            - workflows/library/scripts/record_lisp_frontend_blocked_recovery_outcome.py
            - --recovery-bundle-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-decision.json
            - --revision-report
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-report.json
            - --target-design-review-decision
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-loop-decision.txt
            - --terminal-action
            - continue
            - --state-path
            - ${inputs.run_state_target_path}
            - --item-id
            - ${steps.DetectBlockedDesignGapRecovery.artifacts.design_gap_id}
            - --source
            - DESIGN_GAP
            - --progress-report-path
            - ${steps.DetectBlockedDesignGapRecovery.artifacts.progress_report_path}
            - --implementation-state-path
            - ${steps.DetectBlockedDesignGapRecovery.artifacts.implementation_state_path}
            - --architecture-path
            - ${steps.DetectBlockedDesignGapRecovery.artifacts.architecture_path}
            - --plan-path
            - ${steps.DetectBlockedDesignGapRecovery.artifacts.plan_path}
            - --recovery-event-id
            - ${steps.DetectBlockedDesignGapRecovery.artifacts.recovery_event_id}
            - --summary-path
            - ${inputs.artifact_work_root}/iterations/${loop.index}/blocked-recovery-summary.json
            - --summary-pointer-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-summary-path.txt
            - --drain-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-drain-status.txt
          expected_outputs:
            - name: recovery_drain_status
              path: ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-drain-status.txt
              type: enum
              allowed: ["CONTINUE", "BLOCKED", "RUN_RECOVERED_GAP"]

        - name: RecordPrerequisiteRetryReadyOutcome
          id: record_prerequisite_retry_ready_outcome
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: eq
                  right: RETRY_READY
          command:
            - python
            - workflows/library/scripts/write_lisp_frontend_recovery_status.py
            - --status
            - RUN_RECOVERED_GAP
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-drain-status.txt
          expected_outputs:
            - name: retry_ready_recovery_drain_status
              path: ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-drain-status.txt
              type: enum
              allowed: ["RUN_RECOVERED_GAP"]

        - name: MaterializeRecoveredBlockedGapDraft
          id: materialize_recovered_blocked_gap_draft
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                      op: eq
                      right: RETRY_READY
                  - compare:
                      left:
                        ref: self.steps.RecordBlockedRecoveryOutcome.artifacts.recovery_drain_status
                      op: eq
                      right: RUN_RECOVERED_GAP
          command:
            - python
            - workflows/library/scripts/materialize_lisp_frontend_recovered_design_gap_draft.py
            - --recovery-bundle-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
            - --drain-state-root
            - ${inputs.drain_state_root}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/draft-architecture.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/draft-architecture.json
            fields:
              - name: draft_status
                json_pointer: /draft_status
                type: enum
                allowed: ["DRAFTED"]

        - name: ValidateRecoveredBlockedGapArchitecture
          id: validate_recovered_blocked_gap_architecture
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                      op: eq
                      right: RETRY_READY
                  - compare:
                      left:
                        ref: self.steps.RecordBlockedRecoveryOutcome.artifacts.recovery_drain_status
                      op: eq
                      right: RUN_RECOVERED_GAP
          command:
            - python
            - workflows/library/scripts/validate_lisp_frontend_design_gap_architecture.py
            - --draft-bundle-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/draft-architecture.json
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/architecture-validation.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/architecture-validation.json
            fields:
              - name: architecture_validation_status
                json_pointer: /architecture_validation_status
                type: enum
                allowed: ["VALID", "INVALID", "BLOCKED"]

        - name: PrepareRecoveredBlockedGapWorkItem
          id: prepare_recovered_blocked_gap_work_item
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                      op: eq
                      right: RETRY_READY
                  - compare:
                      left:
                        ref: self.steps.RecordBlockedRecoveryOutcome.artifacts.recovery_drain_status
                      op: eq
                      right: RUN_RECOVERED_GAP
              - compare:
                  left:
                    ref: self.steps.ValidateRecoveredBlockedGapArchitecture.artifacts.architecture_validation_status
                  op: eq
                  right: VALID
          command:
            - python
            - workflows/library/scripts/prepare_lisp_frontend_recovered_design_gap_work_item.py
            - --recovery-bundle-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
            - --drain-state-root
            - ${inputs.drain_state_root}
            - --architecture-bundle-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/architecture-validation.json
            - --state-root
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/work-item-route.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/work-item-route.json
            fields:
              - name: selection_bundle_path
                json_pointer: /selection_bundle_path
                type: relpath
                under: state
                must_exist_target: true
              - name: manifest_path
                json_pointer: /manifest_path
                type: relpath
                under: state
                must_exist_target: true
              - name: architecture_bundle_path
                json_pointer: /architecture_bundle_path
                type: relpath
                under: state
                must_exist_target: true
              - name: recovered_work_item_state_root
                json_pointer: /recovered_work_item_state_root
                type: relpath
                under: state

        - name: RunRecoveredBlockedGapWorkItem
          id: run_recovered_blocked_gap_work_item
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                      op: eq
                      right: RETRY_READY
                  - compare:
                      left:
                        ref: self.steps.RecordBlockedRecoveryOutcome.artifacts.recovery_drain_status
                      op: eq
                      right: RUN_RECOVERED_GAP
              - compare:
                  left:
                    ref: self.steps.ValidateRecoveredBlockedGapArchitecture.artifacts.architecture_validation_status
                  op: eq
                  right: VALID
          call: work_item
          with:
            state_root:
              ref: self.steps.PrepareRecoveredBlockedGapWorkItem.artifacts.recovered_work_item_state_root
            selection_bundle_path:
              ref: self.steps.PrepareRecoveredBlockedGapWorkItem.artifacts.selection_bundle_path
            manifest_path:
              ref: self.steps.PrepareRecoveredBlockedGapWorkItem.artifacts.manifest_path
            architecture_bundle_path:
              ref: self.steps.PrepareRecoveredBlockedGapWorkItem.artifacts.architecture_bundle_path
            steering_path:
              ref: inputs.steering_path
            target_design_path:
              ref: inputs.target_design_path
            baseline_design_path:
              ref: inputs.baseline_design_path
            progress_ledger_path:
              ref: inputs.progress_ledger_path
            run_state_path:
              ref: inputs.run_state_target_path
            artifact_work_root:
              ref: inputs.artifact_work_root
            artifact_checks_root:
              ref: inputs.artifact_checks_root
            artifact_review_root:
              ref: inputs.artifact_review_root
            implementation_execute_provider:
              ref: inputs.implementation_execute_provider
            implementation_review_provider:
              ref: inputs.implementation_review_provider

        - name: MaterializeRecoveredWorkItemStatus
          id: materialize_recovered_work_item_status
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                      op: eq
                      right: RETRY_READY
                  - compare:
                      left:
                        ref: self.steps.RecordBlockedRecoveryOutcome.artifacts.recovery_drain_status
                      op: eq
                      right: RUN_RECOVERED_GAP
              - compare:
                  left:
                    ref: self.steps.ValidateRecoveredBlockedGapArchitecture.artifacts.architecture_validation_status
                  op: eq
                  right: VALID
          command:
            - python
            - workflows/library/scripts/write_lisp_frontend_drain_status.py
            - --status
            - ${self.steps.RunRecoveredBlockedGapWorkItem.artifacts.drain_status}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/work-item/drain_status.txt
          expected_outputs:
            - name: drain_status
              path: ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/work-item/drain_status.txt
              type: enum
              allowed: ["CONTINUE", "DONE", "BLOCKED"]

        - name: RecordRecoveredRetryUnavailable
          id: record_recovered_retry_unavailable
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                      op: eq
                      right: RETRY_READY
                  - compare:
                      left:
                        ref: self.steps.RecordBlockedRecoveryOutcome.artifacts.recovery_drain_status
                      op: eq
                      right: RUN_RECOVERED_GAP
          command:
            - python
            - workflows/library/scripts/record_lisp_frontend_recovered_retry_unavailable.py
            - --pre-selection-bundle-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
            - --recovery-record-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-drain-status.txt
            - --recovered-work-item-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/work-item/drain_status.txt
            - --run-state-path
            - ${inputs.run_state_target_path}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-retry-availability.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/recovered-retry-availability.json
            fields:
              - name: record_status
                json_pointer: /record_status
                type: enum
                allowed: ["NOT_APPLICABLE", "RETRY_STATUS_AVAILABLE", "BLOCKED_RECORDED"]
              - name: retry_block_reason
                json_pointer: /retry_block_reason
                type: string

        - name: ResolveIterationDrainStatus
          id: resolve_iteration_drain_status
          command:
            - python
            - workflows/library/scripts/resolve_lisp_frontend_drain_iteration_status.py
            - --pre-selection-bundle-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
            - --normal-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/normal-drain-status.txt
            - --prerequisite-recovery-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/prerequisite-recovery-drain-status.txt
            - --recovery-record-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-drain-status.txt
            - --recovered-work-item-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/recovered-gap/work-item/drain_status.txt
            - --step-back-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/step-back-drain-status.txt
            - --run-state-path
            - ${inputs.run_state_target_path}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/drain-status.txt
          expected_outputs:
            - name: drain_status
              path: ${inputs.drain_state_root}/iterations/${loop.index}/drain-status.txt
              type: enum
              allowed: ["CONTINUE", "DONE", "BLOCKED"]

  - name: PublishDrainSummary
    id: publish_drain_summary
    command:
      - python
      - workflows/library/scripts/finalize_lisp_frontend_drain_summary.py
      - --run-state-path
      - ${inputs.run_state_target_path}
      - --drain-status
      - ${steps.DrainLispFrontendWork.artifacts.drain_status}
      - --summary-path
      - ${inputs.drain_summary_target_path}
      - --state-root
      - ${inputs.drain_state_root}
    expected_outputs:
      - name: drain_summary_path
        path: ${inputs.drain_state_root}/drain_summary_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: run_state_path
        path: ${inputs.drain_state_root}/final_run_state_path.txt
        type: relpath
        under: state
        must_exist_target: true
