version: "2.14"
name: "lisp-frontend-design-delta-drain-v214"

imports:
  selector: ../library/lisp_frontend_design_delta_selector.v214.yaml
  design_gap_architect: ../library/lisp_frontend_design_delta_design_gap_architect.v214.yaml
  work_item: ../library/lisp_frontend_design_delta_work_item.v214.yaml

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  steering_path:
    type: relpath
    under: docs
    must_exist_target: true
  target_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  baseline_design_path:
    type: relpath
    under: docs/design
    must_exist_target: true
  command_adapter_contract_path:
    type: relpath
    under: docs/design
    default: docs/design/workflow_command_adapter_contract.md
    must_exist_target: true
  backlog_root:
    type: relpath
    under: docs/backlog
    default: docs/backlog/active
  progress_ledger_path:
    type: relpath
    under: state
    default: state/LISP-FRONTEND-AUTONOMOUS-DRAIN/progress_ledger.json
    must_exist_target: true
  drain_state_root:
    type: relpath
    under: state
    default: state/LISP-FRONTEND-AUTONOMOUS-DRAIN/drain
  run_state_target_path:
    type: relpath
    under: state
    default: state/LISP-FRONTEND-AUTONOMOUS-DRAIN/drain/run_state.json
  drain_summary_target_path:
    type: relpath
    under: artifacts/work
    default: artifacts/work/LISP-FRONTEND-AUTONOMOUS-DRAIN/drain-summary.json
  artifact_work_root:
    type: relpath
    under: artifacts/work
    default: artifacts/work/LISP-FRONTEND-AUTONOMOUS-DRAIN
  artifact_checks_root:
    type: relpath
    under: artifacts/checks
    default: artifacts/checks/LISP-FRONTEND-AUTONOMOUS-DRAIN
  artifact_review_root:
    type: relpath
    under: artifacts/review
    default: artifacts/review/LISP-FRONTEND-AUTONOMOUS-DRAIN
  architecture_index_root:
    type: relpath
    under: docs/plans
    default: docs/plans/LISP-FRONTEND-AUTONOMOUS-DRAIN/design-gaps
  implementation_execute_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"
  implementation_review_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"

outputs:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE", "BLOCKED"]
    from:
      ref: root.steps.DrainLispFrontendWork.artifacts.drain_status
  run_state_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.run_state_path
  drain_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.drain_summary_path

artifacts:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE", "BLOCKED"]
  prior_recovery_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "BLOCKED"]

steps:
  - name: InitializeDrainState
    id: initialize_drain_state
    command:
      - python
      - workflows/library/scripts/update_lisp_frontend_run_state.py
      - --state-path
      - ${inputs.run_state_target_path}
      - init
      - --run-id
      - ${run.id}

  - name: DetectPriorBlockedDesignGap
    id: detect_prior_blocked_design_gap
    command:
      - python
      - workflows/library/scripts/detect_lisp_frontend_prior_blocked_design_gap.py
      - --run-state-path
      - ${inputs.run_state_target_path}
      - --artifact-work-root
      - ${inputs.artifact_work_root}
      - --output
      - ${inputs.drain_state_root}/prior-blocked-recovery.json
    output_bundle:
      path: ${inputs.drain_state_root}/prior-blocked-recovery.json
      fields:
        - name: recovery_status
          json_pointer: /recovery_status
          type: enum
          allowed: ["NONE", "RECOVER_BLOCKED_DESIGN_GAP"]
        - name: design_gap_id
          json_pointer: /design_gap_id
          type: string
        - name: progress_report_path
          json_pointer: /progress_report_path
          type: string
        - name: blocker_class
          json_pointer: /blocker_class
          type: string
        - name: block_reason
          json_pointer: /block_reason
          type: string

  - name: RoutePriorBlockedDesignGapRecovery
    id: route_prior_blocked_design_gap_recovery
    match:
      ref: root.steps.DetectPriorBlockedDesignGap.artifacts.recovery_status
      cases:
        NONE:
          id: no_prior_blocked_design_gap_path
          outputs:
            prior_recovery_status:
              kind: scalar
              type: enum
              allowed: ["CONTINUE", "BLOCKED"]
              from:
                ref: self.steps.WriteNoPriorBlockedDesignGap.artifacts.prior_recovery_status
          steps:
            - name: WriteNoPriorBlockedDesignGap
              id: write_no_prior_blocked_design_gap
              set_scalar:
                artifact: prior_recovery_status
                value: CONTINUE
        RECOVER_BLOCKED_DESIGN_GAP:
          id: recover_prior_blocked_design_gap_path
          outputs:
            prior_recovery_status:
              kind: scalar
              type: enum
              allowed: ["CONTINUE", "BLOCKED"]
              from:
                ref: self.steps.RecordPriorBlockedRecoveryOutcome.artifacts.prior_recovery_status
          steps:
            - name: ClassifyPriorBlockedImplementationRecovery
              id: classify_prior_blocked_implementation_recovery
              provider: ${inputs.implementation_review_provider}
              input_file: workflows/library/prompts/lisp_frontend_design_delta_work_item/classify_blocked_implementation_recovery.md
              timeout_sec: 1800
              depends_on:
                required:
                  - ${inputs.target_design_path}
                  - ${inputs.baseline_design_path}
                  - ${inputs.drain_state_root}/prior-blocked-recovery.json
                  - ${inputs.drain_state_root}/prior-blocked-progress-report.md
                inject:
                  mode: content
              output_bundle:
                path: ${inputs.drain_state_root}/prior-blocked-recovery-decision.json
                fields:
                  - name: blocked_recovery_route
                    json_pointer: /blocked_recovery_route
                    type: enum
                    allowed: ["GAP_DESIGN_REVISION_REQUIRED", "TARGET_DESIGN_REVISION_REQUIRED", "TERMINAL_BLOCKED"]
                  - name: reason
                    json_pointer: /reason
                    type: enum
                    allowed:
                      - implementation_architecture_under_scoped
                      - target_design_contract_gap
                      - true_external_dependency
                      - user_decision_required
                      - unsupported_blocker

            - name: RevisePriorBlockedDesignGap
              id: revise_prior_blocked_design_gap
              when:
                compare:
                  left:
                    ref: self.steps.ClassifyPriorBlockedImplementationRecovery.artifacts.blocked_recovery_route
                  op: eq
                  right: TARGET_DESIGN_REVISION_REQUIRED
              provider: ${inputs.implementation_execute_provider}
              input_file: workflows/library/prompts/lisp_frontend_design_delta_work_item/revise_prior_blocked_design_gap.md
              timeout_sec: 3600
              depends_on:
                required:
                  - ${inputs.target_design_path}
                  - ${inputs.baseline_design_path}
                  - ${inputs.drain_state_root}/prior-blocked-progress-report.md
                inject:
                  mode: content
              output_bundle:
                path: ${inputs.drain_state_root}/prior-blocked-design-revision-report.json
                fields:
                  - name: design_revision_decision
                    json_pointer: /design_revision_decision
                    type: enum
                    allowed: ["REVISED", "BLOCKED"]

            - name: ReviewPriorBlockedDesignRevision
              id: review_prior_blocked_design_revision
              when:
                all_of:
                  - compare:
                      left:
                        ref: self.steps.ClassifyPriorBlockedImplementationRecovery.artifacts.blocked_recovery_route
                      op: eq
                      right: TARGET_DESIGN_REVISION_REQUIRED
                  - compare:
                      left:
                        ref: self.steps.RevisePriorBlockedDesignGap.artifacts.design_revision_decision
                      op: eq
                      right: REVISED
              provider: ${inputs.implementation_review_provider}
              input_file: workflows/library/prompts/lisp_frontend_design_delta_work_item/review_prior_blocked_design_revision.md
              timeout_sec: 1800
              depends_on:
                required:
                  - ${inputs.target_design_path}
                  - ${inputs.baseline_design_path}
                  - ${inputs.drain_state_root}/prior-blocked-progress-report.md
                  - ${inputs.drain_state_root}/prior-blocked-design-revision-report.json
                inject:
                  mode: content
              expected_outputs:
                - name: design_revision_review_report_path
                  path: ${inputs.drain_state_root}/prior-blocked-design-revision-review-report-path.txt
                  type: relpath
                  under: artifacts/review
                  must_exist_target: true
                - name: design_revision_review_decision
                  path: ${inputs.drain_state_root}/prior-blocked-design-revision-review-decision.txt
                  type: enum
                  allowed: ["APPROVE", "REVISE"]

            - name: WritePriorBlockedDesignRevisionDecision
              id: write_prior_blocked_design_revision_decision
              when:
                compare:
                  left:
                    ref: self.steps.ClassifyPriorBlockedImplementationRecovery.artifacts.blocked_recovery_route
                  op: eq
                  right: TARGET_DESIGN_REVISION_REQUIRED
              command:
                - python
                - workflows/library/scripts/write_lisp_frontend_design_revision_iteration_decision.py
                - --revision-report
                - ${inputs.drain_state_root}/prior-blocked-design-revision-report.json
                - --review-decision-path
                - ${inputs.drain_state_root}/prior-blocked-design-revision-review-decision.txt
                - --output
                - ${inputs.drain_state_root}/prior-blocked-design-revision-loop-decision.txt
              expected_outputs:
                - name: design_revision_review_decision
                  path: ${inputs.drain_state_root}/prior-blocked-design-revision-loop-decision.txt
                  type: enum
                  allowed: ["APPROVE", "REVISE", "BLOCKED"]

            - name: RecordPriorBlockedRecoveryOutcome
              id: record_prior_blocked_recovery_outcome
              command:
                - python
                - workflows/library/scripts/record_lisp_frontend_blocked_recovery_outcome.py
                - --recovery-bundle-path
                - ${inputs.drain_state_root}/prior-blocked-recovery-decision.json
                - --target-design-review-decision
                - ${inputs.drain_state_root}/prior-blocked-design-revision-loop-decision.txt
                - --terminal-action
                - continue
                - --state-path
                - ${inputs.run_state_target_path}
                - --item-id
                - ${steps.DetectPriorBlockedDesignGap.artifacts.design_gap_id}
                - --source
                - DESIGN_GAP
                - --summary-path
                - ${inputs.artifact_work_root}/prior-blocked-recovery-summary.json
                - --summary-pointer-path
                - ${inputs.drain_state_root}/prior-blocked-recovery-summary-path.txt
                - --drain-status-path
                - ${inputs.drain_state_root}/prior-blocked-recovery-drain-status.txt
              expected_outputs:
                - name: prior_recovery_status
                  path: ${inputs.drain_state_root}/prior-blocked-recovery-drain-status.txt
                  type: enum
                  allowed: ["CONTINUE", "BLOCKED"]

  - name: DrainLispFrontendWork
    id: drain_lisp_frontend_work
    repeat_until:
      id: lisp_frontend_drain_iteration
      max_iterations: 60
      outputs:
        drain_status:
          kind: scalar
          type: enum
          allowed: ["CONTINUE", "DONE", "BLOCKED"]
          from:
            ref: self.steps.RouteSelection.artifacts.drain_status
      condition:
        any_of:
          - compare:
              left:
                ref: self.outputs.drain_status
              op: eq
              right: DONE
          - compare:
              left:
                ref: self.outputs.drain_status
              op: eq
              right: BLOCKED
      steps:
        - name: BuildBacklogManifest
          id: build_backlog_manifest
          command:
            - python
            - workflows/library/scripts/build_lisp_frontend_backlog_manifest.py
            - --backlog-root
            - ${inputs.backlog_root}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/manifest.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/manifest.json
            fields:
              - name: manifest_path
                json_pointer: /manifest_path
                type: relpath
                under: state
                must_exist_target: true
              - name: active_count
                json_pointer: /active_count
                type: integer

        - name: PrepareIterationPaths
          id: prepare_iteration_paths
          command:
            - python
            - workflows/library/scripts/prepare_lisp_frontend_iteration_paths.py
            - --drain-state-root
            - ${inputs.drain_state_root}
            - --iteration
            - ${loop.index}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/iteration-paths.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/iteration-paths.json
            fields:
              - name: selector_state_root
                json_pointer: /selector_state_root
                type: relpath
                under: state
              - name: design_gap_architect_state_root
                json_pointer: /design_gap_architect_state_root
                type: relpath
                under: state
              - name: backlog_work_item_state_root
                json_pointer: /backlog_work_item_state_root
                type: relpath
                under: state
              - name: design_gap_work_item_state_root
                json_pointer: /design_gap_work_item_state_root
                type: relpath
                under: state

        - name: SelectNextWork
          id: select_next_work
          call: selector
          with:
            state_root:
              ref: self.steps.PrepareIterationPaths.artifacts.selector_state_root
            steering_path:
              ref: inputs.steering_path
            target_design_path:
              ref: inputs.target_design_path
            baseline_design_path:
              ref: inputs.baseline_design_path
            manifest_path:
              ref: self.steps.BuildBacklogManifest.artifacts.manifest_path
            progress_ledger_path:
              ref: inputs.progress_ledger_path
            run_state_path:
              ref: inputs.run_state_target_path

        - name: RouteSelection
          id: route_selection
          match:
            ref: self.steps.SelectNextWork.artifacts.selection_status
            cases:
              SELECT_BACKLOG_ITEM:
                id: backlog_item_path
                outputs:
                  drain_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.RunSelectedBacklogItem.artifacts.drain_status
                steps:
                  - name: RunSelectedBacklogItem
                    id: run_selected_backlog_item
                    call: work_item
                    with:
                      state_root:
                        ref: parent.steps.PrepareIterationPaths.artifacts.backlog_work_item_state_root
                      selection_bundle_path:
                        ref: parent.steps.SelectNextWork.artifacts.selection_bundle_path
                      manifest_path:
                        ref: parent.steps.BuildBacklogManifest.artifacts.manifest_path
                      steering_path:
                        ref: inputs.steering_path
                      target_design_path:
                        ref: inputs.target_design_path
                      baseline_design_path:
                        ref: inputs.baseline_design_path
                      progress_ledger_path:
                        ref: inputs.progress_ledger_path
                      run_state_path:
                        ref: inputs.run_state_target_path
                      artifact_work_root:
                        ref: inputs.artifact_work_root
                      artifact_checks_root:
                        ref: inputs.artifact_checks_root
                      artifact_review_root:
                        ref: inputs.artifact_review_root
                      implementation_execute_provider:
                        ref: inputs.implementation_execute_provider
                      implementation_review_provider:
                        ref: inputs.implementation_review_provider

              DRAFT_DESIGN_GAP:
                id: design_gap_path
                outputs:
                  drain_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.RunDesignGapWorkItem.artifacts.drain_status
                steps:
                  - name: DraftDesignGapArchitecture
                    id: draft_design_gap_architecture
                    call: design_gap_architect
                    with:
                      state_root:
                        ref: parent.steps.PrepareIterationPaths.artifacts.design_gap_architect_state_root
                      steering_path:
                        ref: inputs.steering_path
                      target_design_path:
                        ref: inputs.target_design_path
                      baseline_design_path:
                        ref: inputs.baseline_design_path
                      command_adapter_contract_path:
                        ref: inputs.command_adapter_contract_path
                      progress_ledger_path:
                        ref: inputs.progress_ledger_path
                      selection_bundle_path:
                        ref: parent.steps.SelectNextWork.artifacts.selection_bundle_path
                      architecture_index_root:
                        ref: inputs.architecture_index_root
                  - name: RunDesignGapWorkItem
                    id: run_design_gap_work_item
                    call: work_item
                    with:
                      state_root:
                        ref: parent.steps.PrepareIterationPaths.artifacts.design_gap_work_item_state_root
                      selection_bundle_path:
                        ref: parent.steps.SelectNextWork.artifacts.selection_bundle_path
                      manifest_path:
                        ref: parent.steps.BuildBacklogManifest.artifacts.manifest_path
                      architecture_bundle_path:
                        ref: self.steps.DraftDesignGapArchitecture.artifacts.work_item_bundle_path
                      steering_path:
                        ref: inputs.steering_path
                      target_design_path:
                        ref: inputs.target_design_path
                      baseline_design_path:
                        ref: inputs.baseline_design_path
                      progress_ledger_path:
                        ref: inputs.progress_ledger_path
                      run_state_path:
                        ref: inputs.run_state_target_path
                      artifact_work_root:
                        ref: inputs.artifact_work_root
                      artifact_checks_root:
                        ref: inputs.artifact_checks_root
                      artifact_review_root:
                        ref: inputs.artifact_review_root
                      implementation_execute_provider:
                        ref: inputs.implementation_execute_provider
                      implementation_review_provider:
                        ref: inputs.implementation_review_provider

              DONE:
                id: done_path
                outputs:
                  drain_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteDone.artifacts.drain_status
                steps:
                  - name: WriteDone
                    id: write_done
                    set_scalar:
                      artifact: drain_status
                      value: DONE

              BLOCKED:
                id: blocked_path
                outputs:
                  drain_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteBlocked.artifacts.drain_status
                steps:
                  - name: WriteBlocked
                    id: write_blocked
                    set_scalar:
                      artifact: drain_status
                      value: BLOCKED

  - name: PublishDrainSummary
    id: publish_drain_summary
    command:
      - python
      - workflows/library/scripts/finalize_lisp_frontend_drain_summary.py
      - --run-state-path
      - ${inputs.run_state_target_path}
      - --drain-status
      - ${steps.DrainLispFrontendWork.artifacts.drain_status}
      - --summary-path
      - ${inputs.drain_summary_target_path}
      - --state-root
      - ${inputs.drain_state_root}
    expected_outputs:
      - name: drain_summary_path
        path: ${inputs.drain_state_root}/drain_summary_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: run_state_path
        path: ${inputs.drain_state_root}/final_run_state_path.txt
        type: relpath
        under: state
        must_exist_target: true
