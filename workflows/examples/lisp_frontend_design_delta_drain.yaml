                      target_design_path:
                        ref: inputs.target_design_path
                      baseline_design_path:
                        ref: inputs.baseline_design_path
                      post_wcc_inventory_path:
                        ref: inputs.post_wcc_inventory_path
                      command_adapter_contract_path:
                        ref: inputs.command_adapter_contract_path
                      manifest_path:
                        ref: parent.steps.ProjectSelectorManifest.artifacts.manifest_path
