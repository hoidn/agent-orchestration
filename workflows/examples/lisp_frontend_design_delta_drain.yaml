                    expected_outputs:
                      - name: drain_status
                        path: ${inputs.drain_state_root}/iterations/${loop.index}/selector-blocked-drain-status.txt
                        type: enum
                        allowed: ["CONTINUE", "DONE", "BLOCKED"]

        - name: WriteNormalIterationStatus
          id: write_normal_iteration_status
          when:
            any_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: SELECT_NORMAL_WORK
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: SELECT_DONE_REVIEW
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: SELECT_PREREQUISITE_WORK
          command:
            - python
            - workflows/library/scripts/write_lisp_frontend_drain_status.py
            - --status
            - ${steps.RouteSelection.artifacts.drain_status}
            - --output
            - ${inputs.drain_state_root}/iterations/${loop.index}/normal-drain-status.txt
          expected_outputs:
            - name: normal_drain_status
              path: ${inputs.drain_state_root}/iterations/${loop.index}/normal-drain-status.txt
              type: enum
              allowed: ["CONTINUE", "DONE", "BLOCKED"]

        - name: RecordPrerequisiteRecoveryOutcome
          id: record_prerequisite_recovery_outcome
          when:
            compare:
              left:
                ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
              op: eq
              right: SELECT_PREREQUISITE_WORK
          command:
            - python
            - workflows/library/scripts/record_lisp_frontend_prerequisite_recovery_outcome.py
            - --pre-selection-bundle-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
            - --selection-bundle-path
            - ${steps.SelectNextWork.artifacts.selection_bundle_path}
            - --selected-work-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/normal-drain-status.txt
            - --run-state-path
            - ${inputs.run_state_target_path}
            - --summary-path
            - ${inputs.artifact_work_root}/iterations/${loop.index}/prerequisite-recovery-summary.json
            - --drain-status-path
            - ${inputs.drain_state_root}/iterations/${loop.index}/prerequisite-recovery-drain-status.txt
          output_bundle:
            path: ${inputs.artifact_work_root}/iterations/${loop.index}/prerequisite-recovery-summary.json
            fields:
              - name: prerequisite_recovery_record_status
                json_pointer: /record_status
                type: enum
                allowed: ["RETRY_READY", "WAITING_ON_RECOVERABLE_PREREQUISITE", "RECOVERY_CONTINUES"]
              - name: prerequisite_recovery_drain_status
                json_pointer: /drain_status
                type: enum
                allowed: ["CONTINUE"]
              - name: prerequisite_recovery_reason
                json_pointer: /reason
                type: string

        - name: ClassifyBlockedImplementationRecovery
          id: classify_blocked_implementation_recovery
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: ne
                  right: RETRY_READY
          provider: ${inputs.implementation_review_provider}
          provider_params:
            model: gpt-5.5
            effort: ${context.workflow_effort}
          input_file: workflows/library/prompts/lisp_frontend_design_delta_work_item/classify_blocked_implementation_recovery.md
          timeout_sec: 1800
          depends_on:
            required:
              - ${inputs.target_design_path}
              - ${inputs.baseline_design_path}
              - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery.json
              - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-progress-report.md
            inject:
              mode: content
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/blocked-recovery-decision.json
            fields:
              - name: blocked_recovery_route
                json_pointer: /blocked_recovery_route
                type: enum
                allowed: ["GAP_DESIGN_REVISION_REQUIRED", "TARGET_DESIGN_REVISION_REQUIRED", "PREREQUISITE_GAP_REQUIRED", "TERMINAL_BLOCKED"]
              - name: reason
                json_pointer: /reason
                type: enum
                allowed:
                  - implementation_architecture_under_scoped
                  - target_design_contract_gap
                  - prerequisite_gap_required
                  - true_external_dependency
                  - user_decision_required
                  - unsupported_blocker
              - name: blocked_work_id
                json_pointer: /blocked_work_id
                type: string
                required: false
              - name: blocked_work_source
                json_pointer: /blocked_work_source
                type: string
                required: false
              - name: waiting_on_work_id
                json_pointer: /waiting_on_work_id
                type: string
                required: false
              - name: waiting_on_work_source
                json_pointer: /waiting_on_work_source
                type: string
                required: false
              - name: retry_target_id
                json_pointer: /retry_target_id
                type: string
                required: false
              - name: retry_target_source
                json_pointer: /retry_target_source
                type: string
                required: false

        - name: ValidateBlockedDesignRevisionProviderRouting
          id: validate_blocked_design_revision_provider_routing
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: ne
                  right: RETRY_READY
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.ClassifyBlockedImplementationRecovery.artifacts.blocked_recovery_route
                      op: eq
                      right: TARGET_DESIGN_REVISION_REQUIRED
                  - compare:
                      left:
                        ref: self.steps.ClassifyBlockedImplementationRecovery.artifacts.blocked_recovery_route
                      op: eq
                      right: GAP_DESIGN_REVISION_REQUIRED
          command:
            - python
            - -c
            - |
              import json
              import pathlib
              import subprocess
              import sys

              provider = sys.argv[1]
              model = sys.argv[2]
              effort = sys.argv[3]
              output_path = pathlib.Path(sys.argv[4])

              errors = []
              requested_provider = provider
              requested_model = model
              requested_effort = effort
              fallback_reason = ""
              if provider == "claude" and model not in {"opus", "fable", "claude-fable-5"}:
                  errors.append(
                      f"blocked design-gap revision via Claude must use a supported Claude model alias, got {model!r}"
                  )
              if provider == "codex" and not (
                  model.startswith("gpt-")
                  or "codex" in model
              ):
                  errors.append(f"provider=codex requires a Codex/OpenAI model, got {model!r}")
              codex_efforts = {"low", "medium", "high", "xhigh"}
              claude_efforts = {"low", "medium", "high", "xhigh", "max"}
              allowed_efforts = claude_efforts if provider == "claude" else codex_efforts
              if effort not in allowed_efforts:
                  errors.append(
                      f"unsupported effort {effort!r} for provider={provider}; "
                      f"allowed={sorted(allowed_efforts)}"
                  )
              if provider == "claude" and not errors:
                  probe = subprocess.run(
                      [
                          "claude",
                          "-p",
                          "--model",
                          model,
                          "--effort",
                          effort,
                          "--permission-mode",
                          "bypassPermissions",
                      ],
                      input="Say OK only.\n",
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      timeout=45,
                      check=False,
                  )
                  if probe.returncode != 0:
                      provider = "codex"
                      model = "gpt-5.5"
                      effort = "high"
                      fallback_reason = (
                          "Claude blocked design-gap revision model unavailable; falling back to Codex gpt-5.5. "
                          + (probe.stdout or "").strip()
                      )

              output_path.parent.mkdir(parents=True, exist_ok=True)
              payload = {
                  "provider": provider,
                  "model": model,
                  "effort": effort,
                  "requested_provider": requested_provider,
                  "requested_model": requested_model,
                  "requested_effort": requested_effort,
                  "fallback_reason": fallback_reason,
                  "routing_status": "INVALID" if errors else "VALID",
                  "errors": errors,
              }
              output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
              if errors:
                  raise SystemExit("; ".join(errors))
            - ${inputs.blocked_design_revision_provider}
            - ${inputs.blocked_design_revision_model}
            - ${inputs.blocked_design_revision_effort}
            - ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-provider-routing.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/blocked-design-revision-provider-routing.json
            fields:
              - name: routing_status
                json_pointer: /routing_status
                type: enum
                allowed: ["VALID", "INVALID"]
              - name: provider
                json_pointer: /provider
                type: string
              - name: model
                json_pointer: /model
                type: string
              - name: effort
                json_pointer: /effort
                type: string

        - name: ReviseBlockedDesignGap
          id: revise_blocked_design_gap
          when:
            all_of:
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.pre_selection_route
                  op: eq
                  right: RECOVER_BLOCKED_DESIGN_GAP
              - compare:
                  left:
                    ref: self.steps.DetectBlockedDesignGapRecovery.artifacts.recovery_status
                  op: ne
                  right: RETRY_READY
              - any_of:
                  - compare:
                      left:
                        ref: self.steps.ClassifyBlockedImplementationRecovery.artifacts.blocked_recovery_route
                      op: eq
