version: "2.7"
name: "major-project-tranche-drain-stack-v2-call"

imports:
  roadmap_phase: ../library/major_project_roadmap_phase.yaml
  tranche_stack: ../library/major_project_tranche_design_plan_impl_stack.yaml

inputs:
  project_brief_path:
    type: relpath
    must_exist_target: true
    default: workflows/examples/inputs/major_project_brief.md
  project_roadmap_target_path:
    type: relpath
    under: docs/plans
    default: docs/plans/major-project-demo/project-roadmap.md
  tranche_manifest_target_path:
    type: relpath
    under: state
    default: state/major-project-demo/tranche_manifest.json
  roadmap_review_report_target_path:
    type: relpath
    under: artifacts/review
    default: artifacts/review/major-project-demo/project-roadmap-review.json
  drain_state_root:
    type: relpath
    under: state
    default: state/major-project-demo/tranche-drain
  drain_summary_target_path:
    type: relpath
    under: artifacts/work
    default: artifacts/work/major-project-demo/tranche-drain-summary.json

outputs:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE", "BLOCKED"]
    from:
      ref: root.steps.DrainManifest.artifacts.drain_status
  tranche_manifest_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.RunRoadmapPhase.artifacts.tranche_manifest_path
  drain_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.drain_summary_path

artifacts:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE", "BLOCKED"]

steps:
  - name: RunRoadmapPhase
    id: run_roadmap_phase
    call: roadmap_phase
    with:
      state_root: state/major-project-demo/roadmap-phase
      project_brief_path:
        ref: inputs.project_brief_path
      project_roadmap_target_path:
        ref: inputs.project_roadmap_target_path
      tranche_manifest_target_path:
        ref: inputs.tranche_manifest_target_path
      roadmap_review_report_target_path:
        ref: inputs.roadmap_review_report_target_path

  - name: DrainManifest
    id: drain_manifest
    repeat_until:
      id: drain_manifest_iteration
      max_iterations: 50
      outputs:
        drain_status:
          kind: scalar
          type: enum
          allowed: ["CONTINUE", "DONE", "BLOCKED"]
          from:
            ref: self.steps.RouteTrancheSelection.artifacts.drain_status
      condition:
        any_of:
          - compare:
              left:
                ref: self.outputs.drain_status
              op: eq
              right: DONE
          - compare:
              left:
                ref: self.outputs.drain_status
              op: eq
              right: BLOCKED
      steps:
        - name: SelectNextTranche
          id: select_next_tranche
          command:
            - python
            - workflows/library/scripts/select_major_project_tranche.py
            - --project-brief-path
            - ${inputs.project_brief_path}
            - --project-roadmap-path
            - ${inputs.project_roadmap_target_path}
            - --tranche-manifest-path
            - ${inputs.tranche_manifest_target_path}
            - --state-root
            - ${inputs.drain_state_root}
            - --output-bundle
            - ${inputs.drain_state_root}/iterations/${loop.index}/selected-tranche.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/selected-tranche.json
            fields:
              - name: selection_status
                json_pointer: /selection_status
                type: enum
                allowed: ["SELECTED", "DONE", "BLOCKED"]
              - name: project_brief_path
                json_pointer: /project_brief_path
                type: relpath
                must_exist_target: true
              - name: project_roadmap_path
                json_pointer: /project_roadmap_path
                type: relpath
                must_exist_target: true
              - name: tranche_manifest_path
                json_pointer: /tranche_manifest_path
                type: relpath
                must_exist_target: true
              - name: item_state_root
                json_pointer: /item_state_root
                type: relpath
                under: state
                required: false
              - name: big_design_phase_state_root
                json_pointer: /big_design_phase_state_root
                type: relpath
                under: state
                required: false
              - name: plan_phase_state_root
                json_pointer: /plan_phase_state_root
                type: relpath
                under: state
                required: false
              - name: implementation_phase_state_root
                json_pointer: /implementation_phase_state_root
                type: relpath
                under: state
                required: false
              - name: tranche_brief_path
                json_pointer: /tranche_brief_path
                type: relpath
                must_exist_target: true
                required: false
              - name: design_target_path
                json_pointer: /design_target_path
                type: relpath
                under: docs/plans
                required: false
              - name: design_review_report_target_path
                json_pointer: /design_review_report_target_path
                type: relpath
                under: artifacts/review
                required: false
              - name: plan_target_path
                json_pointer: /plan_target_path
                type: relpath
                under: docs/plans
                required: false
              - name: plan_review_report_target_path
                json_pointer: /plan_review_report_target_path
                type: relpath
                under: artifacts/review
                required: false
              - name: execution_report_target_path
                json_pointer: /execution_report_target_path
                type: relpath
                under: artifacts/work
                required: false
              - name: implementation_review_report_target_path
                json_pointer: /implementation_review_report_target_path
                type: relpath
                under: artifacts/review
                required: false
              - name: item_summary_target_path
                json_pointer: /item_summary_target_path
                type: relpath
                under: artifacts/work
                required: false
              - name: ready_count
                json_pointer: /ready_count
                type: integer
              - name: pending_count
                json_pointer: /pending_count
                type: integer
              - name: completed_count
                json_pointer: /completed_count
                type: integer
              - name: blocked_count
                json_pointer: /blocked_count
                type: integer

        - name: RouteTrancheSelection
          id: route_tranche_selection
          match:
            ref: self.steps.SelectNextTranche.artifacts.selection_status
            cases:
              SELECTED:
                id: selected_tranche_path
                outputs:
                  drain_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.UpdateTrancheManifest.artifacts.drain_status
                steps:
                  - name: RunSelectedTranche
                    id: run_selected_tranche
                    call: tranche_stack
                    with:
                      item_state_root:
                        ref: parent.steps.SelectNextTranche.artifacts.item_state_root
                      big_design_phase_state_root:
                        ref: parent.steps.SelectNextTranche.artifacts.big_design_phase_state_root
                      plan_phase_state_root:
                        ref: parent.steps.SelectNextTranche.artifacts.plan_phase_state_root
                      implementation_phase_state_root:
                        ref: parent.steps.SelectNextTranche.artifacts.implementation_phase_state_root
                      project_brief_path:
                        ref: parent.steps.SelectNextTranche.artifacts.project_brief_path
                      project_roadmap_path:
                        ref: parent.steps.SelectNextTranche.artifacts.project_roadmap_path
                      tranche_manifest_path:
                        ref: parent.steps.SelectNextTranche.artifacts.tranche_manifest_path
                      tranche_brief_path:
                        ref: parent.steps.SelectNextTranche.artifacts.tranche_brief_path
                      design_target_path:
                        ref: parent.steps.SelectNextTranche.artifacts.design_target_path
                      design_review_report_target_path:
                        ref: parent.steps.SelectNextTranche.artifacts.design_review_report_target_path
                      plan_target_path:
                        ref: parent.steps.SelectNextTranche.artifacts.plan_target_path
                      plan_review_report_target_path:
                        ref: parent.steps.SelectNextTranche.artifacts.plan_review_report_target_path
                      execution_report_target_path:
                        ref: parent.steps.SelectNextTranche.artifacts.execution_report_target_path
                      implementation_review_report_target_path:
                        ref: parent.steps.SelectNextTranche.artifacts.implementation_review_report_target_path
                      item_summary_target_path:
                        ref: parent.steps.SelectNextTranche.artifacts.item_summary_target_path
                  - name: UpdateTrancheManifest
                    id: update_tranche_manifest
                    command:
                      - python
                      - workflows/library/scripts/update_major_project_tranche_manifest.py
                      - --selection-bundle
                      - ${inputs.drain_state_root}/iterations/${loop.index}/selected-tranche.json
                      - --tranche-manifest-path
                      - ${inputs.tranche_manifest_target_path}
                      - --output-bundle
                      - ${inputs.drain_state_root}/iterations/${loop.index}/manifest-update.json
                    output_bundle:
                      path: ${inputs.drain_state_root}/iterations/${loop.index}/manifest-update.json
                      fields:
                        - name: drain_status
                          json_pointer: /drain_status
                          type: enum
                          allowed: ["CONTINUE", "BLOCKED"]
                        - name: item_outcome
                          json_pointer: /item_outcome
                          type: enum
                          allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION"]
                        - name: tranche_manifest_path
                          json_pointer: /tranche_manifest_path
                          type: relpath
                          under: state
                          must_exist_target: true
                        - name: execution_report_path
                          json_pointer: /execution_report_path
                          type: relpath
                          under: artifacts/work
                          must_exist_target: true
                        - name: item_summary_path
                          json_pointer: /item_summary_path
                          type: relpath
                          under: artifacts/work
                          must_exist_target: true
                        - name: ready_count
                          json_pointer: /ready_count
                          type: integer
                        - name: pending_count
                          json_pointer: /pending_count
                          type: integer
                        - name: completed_count
                          json_pointer: /completed_count
                          type: integer
                        - name: blocked_count
                          json_pointer: /blocked_count
                          type: integer
              DONE:
                id: completed_manifest_path
                outputs:
                  drain_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteDrainDone.artifacts.drain_status
                steps:
                  - name: WriteDrainDone
                    id: write_drain_done
                    set_scalar:
                      artifact: drain_status
                      value: DONE
              BLOCKED:
                id: blocked_manifest_path
                outputs:
                  drain_status:
                    kind: scalar
                    type: enum
                    allowed: ["CONTINUE", "DONE", "BLOCKED"]
                    from:
                      ref: self.steps.WriteDrainBlocked.artifacts.drain_status
                steps:
                  - name: WriteDrainBlocked
                    id: write_drain_blocked
                    set_scalar:
                      artifact: drain_status
                      value: BLOCKED

  - name: PublishDrainSummary
    id: publish_drain_summary
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        manifest_path = pathlib.Path(sys.argv[1])
        drain_status = sys.argv[2]
        summary_target = pathlib.Path(sys.argv[3])
        pointer_path = pathlib.Path(sys.argv[4])

        manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
        tranches = manifest.get("tranches", [])
        status_counts = {}
        for tranche in tranches:
            status = tranche.get("status", "unknown") if isinstance(tranche, dict) else "invalid"
            status_counts[status] = status_counts.get(status, 0) + 1

        summary_target.parent.mkdir(parents=True, exist_ok=True)
        summary_target.write_text(
            json.dumps(
                {
                    "drain_status": drain_status,
                    "tranche_manifest_path": manifest_path.as_posix(),
                    "tranche_count": len(tranches),
                    "status_counts": status_counts,
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )
        pointer_path.parent.mkdir(parents=True, exist_ok=True)
        pointer_path.write_text(summary_target.as_posix() + "\n", encoding="utf-8")
      - ${inputs.tranche_manifest_target_path}
      - ${steps.DrainManifest.artifacts.drain_status}
      - ${inputs.drain_summary_target_path}
      - ${inputs.drain_state_root}/drain_summary_path.txt
    expected_outputs:
      - name: drain_summary_path
        path: ${inputs.drain_state_root}/drain_summary_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
