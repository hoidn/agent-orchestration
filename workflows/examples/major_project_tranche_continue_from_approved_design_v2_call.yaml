version: "2.12"
name: "major-project-tranche-continue-from-approved-design-v2-call"

imports:
  approved_design_tranche_stack: ../library/major_project_tranche_plan_impl_from_approved_design_stack.yaml

inputs:
  project_brief_path:
    type: relpath
    must_exist_target: true
  project_roadmap_path:
    type: relpath
    must_exist_target: true
  tranche_manifest_target_path:
    type: relpath
    under: state
    must_exist_target: true
  approved_design_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  drain_state_root:
    type: relpath
    under: state
    default: state/major-project-demo/tranche-drain

outputs:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "BLOCKED"]
    from:
      ref: root.steps.RouteSelectedTrancheOutcome.artifacts.drain_status
  tranche_manifest_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.RouteSelectedTrancheOutcome.artifacts.tranche_manifest_path
  execution_report_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.RouteSelectedTrancheOutcome.artifacts.execution_report_path
  item_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.RouteSelectedTrancheOutcome.artifacts.item_summary_path

steps:
  - name: SelectNextTranche
    id: select_next_tranche
    command:
      - python
      - workflows/library/scripts/select_major_project_tranche.py
      - --project-brief-path
      - ${inputs.project_brief_path}
      - --project-roadmap-path
      - ${inputs.project_roadmap_path}
      - --tranche-manifest-path
      - ${inputs.tranche_manifest_target_path}
      - --state-root
      - ${inputs.drain_state_root}
      - --output-bundle
      - ${inputs.drain_state_root}/selected-tranche.json
    output_bundle:
      path: ${inputs.drain_state_root}/selected-tranche.json
      fields:
        - name: selection_status
          json_pointer: /selection_status
          type: enum
          allowed: ["SELECTED"]
        - name: project_brief_path
          json_pointer: /project_brief_path
          type: relpath
          must_exist_target: true
        - name: project_roadmap_path
          json_pointer: /project_roadmap_path
          type: relpath
          must_exist_target: true
        - name: tranche_manifest_path
          json_pointer: /tranche_manifest_path
          type: relpath
          must_exist_target: true
        - name: item_state_root
          json_pointer: /item_state_root
          type: relpath
          under: state
        - name: scope_boundary_path
          json_pointer: /scope_boundary_path
          type: relpath
          under: state
        - name: upstream_escalation_context_path
          json_pointer: /upstream_escalation_context_path
          type: relpath
          under: state
        - name: big_design_phase_state_root
          json_pointer: /big_design_phase_state_root
          type: relpath
          under: state
        - name: plan_phase_state_root
          json_pointer: /plan_phase_state_root
          type: relpath
          under: state
        - name: implementation_phase_state_root
          json_pointer: /implementation_phase_state_root
          type: relpath
          under: state
        - name: tranche_brief_path
          json_pointer: /tranche_brief_path
          type: relpath
          must_exist_target: true
        - name: design_target_path
          json_pointer: /design_target_path
          type: relpath
          under: docs/plans
        - name: design_review_report_target_path
          json_pointer: /design_review_report_target_path
          type: relpath
          under: artifacts/review
        - name: plan_target_path
          json_pointer: /plan_target_path
          type: relpath
          under: docs/plans
        - name: plan_review_report_target_path
          json_pointer: /plan_review_report_target_path
          type: relpath
          under: artifacts/review
        - name: execution_report_target_path
          json_pointer: /execution_report_target_path
          type: relpath
          under: artifacts/work
        - name: implementation_review_report_target_path
          json_pointer: /implementation_review_report_target_path
          type: relpath
          under: artifacts/review
        - name: item_summary_target_path
          json_pointer: /item_summary_target_path
          type: relpath
          under: artifacts/work

  - name: AssertApprovedDesignMatchesSelectedTranche
    id: assert_approved_design_matches_selected_tranche
    assert:
      compare:
        left:
          ref: root.steps.SelectNextTranche.artifacts.design_target_path
        op: eq
        right:
          ref: inputs.approved_design_path

  - name: RunSelectedTrancheFromApprovedDesign
    id: run_selected_tranche_from_approved_design
    call: approved_design_tranche_stack
    with:
      item_state_root:
        ref: root.steps.SelectNextTranche.artifacts.item_state_root
      scope_boundary_path:
        ref: root.steps.SelectNextTranche.artifacts.scope_boundary_path
      upstream_escalation_context_path:
        ref: root.steps.SelectNextTranche.artifacts.upstream_escalation_context_path
      big_design_phase_state_root:
        ref: root.steps.SelectNextTranche.artifacts.big_design_phase_state_root
      plan_phase_state_root:
        ref: root.steps.SelectNextTranche.artifacts.plan_phase_state_root
      implementation_phase_state_root:
        ref: root.steps.SelectNextTranche.artifacts.implementation_phase_state_root
      project_brief_path:
        ref: root.steps.SelectNextTranche.artifacts.project_brief_path
      project_roadmap_path:
        ref: root.steps.SelectNextTranche.artifacts.project_roadmap_path
      tranche_manifest_path:
        ref: root.steps.SelectNextTranche.artifacts.tranche_manifest_path
      tranche_brief_path:
        ref: root.steps.SelectNextTranche.artifacts.tranche_brief_path
      design_path:
        ref: inputs.approved_design_path
      design_review_report_target_path:
        ref: root.steps.SelectNextTranche.artifacts.design_review_report_target_path
      plan_target_path:
        ref: root.steps.SelectNextTranche.artifacts.plan_target_path
      plan_review_report_target_path:
        ref: root.steps.SelectNextTranche.artifacts.plan_review_report_target_path
      execution_report_target_path:
        ref: root.steps.SelectNextTranche.artifacts.execution_report_target_path
      implementation_review_report_target_path:
        ref: root.steps.SelectNextTranche.artifacts.implementation_review_report_target_path
      item_summary_target_path:
        ref: root.steps.SelectNextTranche.artifacts.item_summary_target_path

  - name: RouteSelectedTrancheOutcome
    id: route_selected_tranche_outcome
    match:
      ref: root.steps.RunSelectedTrancheFromApprovedDesign.artifacts.item_outcome
      cases:
        APPROVED:
          id: approved_item_path
          outputs: &selected_tranche_outcome_outputs
            drain_status:
              kind: scalar
              type: enum
              allowed: ["CONTINUE", "BLOCKED"]
              from:
                ref: self.steps.UpdateTrancheManifest.artifacts.drain_status
            item_outcome:
              kind: scalar
              type: enum
              allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
              from:
                ref: self.steps.UpdateTrancheManifest.artifacts.item_outcome
            tranche_manifest_path:
              type: relpath
              under: state
              must_exist_target: true
              from:
                ref: self.steps.UpdateTrancheManifest.artifacts.tranche_manifest_path
            execution_report_path:
              type: relpath
              under: artifacts/work
              must_exist_target: true
              from:
                ref: self.steps.UpdateTrancheManifest.artifacts.execution_report_path
            item_summary_path:
              type: relpath
              under: artifacts/work
              must_exist_target: true
              from:
                ref: self.steps.UpdateTrancheManifest.artifacts.item_summary_path
          steps:
            - name: UpdateTrancheManifest
              id: update_tranche_manifest
              command: &update_tranche_manifest_command
                - python
                - workflows/library/scripts/update_major_project_tranche_manifest.py
                - --selection-bundle
                - ${inputs.drain_state_root}/selected-tranche.json
                - --tranche-manifest-path
                - ${inputs.tranche_manifest_target_path}
                - --output-bundle
                - ${inputs.drain_state_root}/manifest-update.json
              output_bundle:
                path: ${inputs.drain_state_root}/manifest-update.json
                fields: &manifest_update_fields
                  - name: drain_status
                    json_pointer: /drain_status
                    type: enum
                    allowed: ["CONTINUE", "BLOCKED"]
                  - name: item_outcome
                    json_pointer: /item_outcome
                    type: enum
                    allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION"]
                  - name: tranche_manifest_path
                    json_pointer: /tranche_manifest_path
                    type: relpath
                    under: state
                    must_exist_target: true
                  - name: execution_report_path
                    json_pointer: /execution_report_path
                    type: relpath
                    under: artifacts/work
                    must_exist_target: true
                  - name: item_summary_path
                    json_pointer: /item_summary_path
                    type: relpath
                    under: artifacts/work
                    must_exist_target: true
        SKIPPED_AFTER_DESIGN:
          id: skipped_after_design_path
          outputs: *selected_tranche_outcome_outputs
          steps:
            - name: UpdateTrancheManifest
              id: update_tranche_manifest
              command: *update_tranche_manifest_command
              output_bundle:
                path: ${inputs.drain_state_root}/manifest-update.json
                fields: *manifest_update_fields
        SKIPPED_AFTER_PLAN:
          id: skipped_after_plan_path
          outputs: *selected_tranche_outcome_outputs
          steps:
            - name: UpdateTrancheManifest
              id: update_tranche_manifest
              command: *update_tranche_manifest_command
              output_bundle:
                path: ${inputs.drain_state_root}/manifest-update.json
                fields: *manifest_update_fields
        SKIPPED_AFTER_IMPLEMENTATION:
          id: skipped_after_implementation_path
          outputs: *selected_tranche_outcome_outputs
          steps:
            - name: UpdateTrancheManifest
              id: update_tranche_manifest
              command: *update_tranche_manifest_command
              output_bundle:
                path: ${inputs.drain_state_root}/manifest-update.json
                fields: *manifest_update_fields
        ESCALATE_ROADMAP_REVISION:
          id: roadmap_revision_required_path
          outputs:
            drain_status:
              kind: scalar
              type: enum
              allowed: ["CONTINUE", "BLOCKED"]
              from:
                ref: self.steps.PublishRoadmapRevisionBlockedOutcome.artifacts.drain_status
            item_outcome:
              kind: scalar
              type: enum
              allowed: ["APPROVED", "SKIPPED_AFTER_DESIGN", "SKIPPED_AFTER_PLAN", "SKIPPED_AFTER_IMPLEMENTATION", "ESCALATE_ROADMAP_REVISION"]
              from:
                ref: self.steps.PublishRoadmapRevisionBlockedOutcome.artifacts.item_outcome
            tranche_manifest_path:
              type: relpath
              under: state
              must_exist_target: true
              from:
                ref: self.steps.PublishRoadmapRevisionBlockedOutcome.artifacts.tranche_manifest_path
            execution_report_path:
              type: relpath
              under: artifacts/work
              must_exist_target: true
              from:
                ref: self.steps.PublishRoadmapRevisionBlockedOutcome.artifacts.execution_report_path
            item_summary_path:
              type: relpath
              under: artifacts/work
              must_exist_target: true
              from:
                ref: self.steps.PublishRoadmapRevisionBlockedOutcome.artifacts.item_summary_path
          steps:
            - name: PublishRoadmapRevisionBlockedOutcome
              id: publish_roadmap_revision_blocked_outcome
              command:
                - python
                - workflows/library/scripts/publish_major_project_continue_outcome.py
                - --selection-bundle
                - ${inputs.drain_state_root}/selected-tranche.json
                - --item-outcome
                - ESCALATE_ROADMAP_REVISION
                - --output-bundle
                - ${inputs.drain_state_root}/manifest-update.json
              output_bundle:
                path: ${inputs.drain_state_root}/manifest-update.json
                fields:
                  - name: drain_status
                    json_pointer: /drain_status
                    type: enum
                    allowed: ["BLOCKED"]
                  - name: item_outcome
                    json_pointer: /item_outcome
                    type: enum
                    allowed: ["ESCALATE_ROADMAP_REVISION"]
                  - name: tranche_manifest_path
                    json_pointer: /tranche_manifest_path
                    type: relpath
                    under: state
                    must_exist_target: true
                  - name: execution_report_path
                    json_pointer: /execution_report_path
                    type: relpath
                    under: artifacts/work
                    must_exist_target: true
                  - name: item_summary_path
                    json_pointer: /item_summary_path
                    type: relpath
                    under: artifacts/work
                    must_exist_target: true
