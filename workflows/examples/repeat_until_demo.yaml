version: "2.7"
name: repeat-until-demo

imports:
  review_loop: library/repeat_until_review_loop.yaml

artifacts:
  review_decision:
    kind: scalar
    type: enum
    allowed: [APPROVE, REVISE]

steps:
  - name: ReviewLoop
    id: review_loop
    repeat_until:
      id: iteration_body
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: [APPROVE, REVISE]
          from:
            ref: self.steps.RouteDecision.artifacts.review_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      max_iterations: 4
      steps:
        - name: RunReviewLoop
          id: run_review_loop
          call: review_loop
          with:
            write_root: state/review-loop
        - name: RouteDecision
          id: route_decision
          match:
            ref: self.steps.RunReviewLoop.artifacts.review_decision
            cases:
              APPROVE:
                id: approve_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: [APPROVE, REVISE]
                    from:
                      ref: self.steps.WriteApproved.artifacts.review_decision
                steps:
                  - name: WriteApproved
                    id: write_approved
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: [APPROVE, REVISE]
                    from:
                      ref: self.steps.WriteRevision.artifacts.review_decision
                steps:
                  - name: WriteRevision
                    id: write_revision
                    set_scalar:
                      artifact: review_decision
                      value: REVISE

  - name: AssertApproved
    id: assert_approved
    assert:
      compare:
        left:
          ref: root.steps.ReviewLoop.artifacts.review_decision
        op: eq
        right: APPROVE
