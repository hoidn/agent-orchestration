version: "2.7"
name: "major-project-tranche-drain-from-manifest-v2-call"

imports:
  drain_iteration: ../library/major_project_tranche_drain_iteration.yaml

inputs:
  project_brief_path:
    type: relpath
    must_exist_target: true
    default: workflows/examples/inputs/major_project_brief.md
  project_roadmap_path:
    type: relpath
    under: docs/plans
    default: docs/plans/major-project-demo/project-roadmap.md
  tranche_manifest_target_path:
    type: relpath
    under: state
    default: state/major-project-demo/tranche_manifest.json
  drain_state_root:
    type: relpath
    under: state
    default: state/major-project-demo/tranche-drain
  drain_summary_target_path:
    type: relpath
    under: artifacts/work
    default: artifacts/work/major-project-demo/tranche-drain-summary.json

outputs:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE", "BLOCKED"]
    from:
      ref: root.steps.DrainManifest.artifacts.drain_status
  tranche_manifest_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.tranche_manifest_path
  drain_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.drain_summary_path

artifacts:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE", "BLOCKED"]

steps:
  - name: DrainManifest
    id: drain_manifest
    repeat_until:
      id: drain_manifest_iteration
      max_iterations: 50
      outputs:
        drain_status:
          kind: scalar
          type: enum
          allowed: ["CONTINUE", "DONE", "BLOCKED"]
          from:
            ref: self.steps.RunDrainIteration.artifacts.drain_status
      condition:
        any_of:
          - compare:
              left:
                ref: self.outputs.drain_status
              op: eq
              right: DONE
          - compare:
              left:
                ref: self.outputs.drain_status
              op: eq
              right: BLOCKED
      steps:
        - name: PrepareDrainIterationPaths
          id: prepare_drain_iteration_paths
          command:
            - python
            - -c
            - |
              import json
              import pathlib
              import sys

              drain_root = sys.argv[1].rstrip("/")
              loop_index = sys.argv[2]
              run_id = sys.argv[3]
              output_path = pathlib.Path(sys.argv[4])
              iteration_root = f"{drain_root}/iterations/{loop_index}"
              payload = {
                  "iteration_state_root": iteration_root,
                  "roadmap_change_request_path": f"{iteration_root}/roadmap_change_request.json",
                  "roadmap_revision_state_root": f"{iteration_root}/roadmap-revision-phase",
                  "updated_project_roadmap_candidate_path": (
                      f"docs/plans/major-project-roadmap-revision-candidates/"
                      f"{run_id}-{loop_index}-project-roadmap.md"
                  ),
                  "updated_tranche_manifest_candidate_path": (
                      f"{iteration_root}/roadmap-revision/tranche-manifest.candidate.json"
                  ),
                  "roadmap_revision_report_target_path": (
                      f"artifacts/review/major-project-roadmap-revision/{run_id}-{loop_index}.json"
                  ),
              }
              output_path.parent.mkdir(parents=True, exist_ok=True)
              output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
            - ${inputs.drain_state_root}
            - ${loop.index}
            - ${run.id}
            - ${inputs.drain_state_root}/iterations/${loop.index}/iteration-paths.json
          output_bundle:
            path: ${inputs.drain_state_root}/iterations/${loop.index}/iteration-paths.json
            fields:
              - name: iteration_state_root
                json_pointer: /iteration_state_root
                type: relpath
                under: state
              - name: roadmap_change_request_path
                json_pointer: /roadmap_change_request_path
                type: relpath
                under: state
              - name: roadmap_revision_state_root
                json_pointer: /roadmap_revision_state_root
                type: relpath
                under: state
              - name: updated_project_roadmap_candidate_path
                json_pointer: /updated_project_roadmap_candidate_path
                type: relpath
                under: docs/plans
              - name: updated_tranche_manifest_candidate_path
                json_pointer: /updated_tranche_manifest_candidate_path
                type: relpath
                under: state
              - name: roadmap_revision_report_target_path
                json_pointer: /roadmap_revision_report_target_path
                type: relpath
                under: artifacts/review
        - name: RunDrainIteration
          id: run_drain_iteration
          call: drain_iteration
          with:
            project_brief_path:
              ref: inputs.project_brief_path
            project_roadmap_path:
              ref: inputs.project_roadmap_path
            tranche_manifest_path:
              ref: inputs.tranche_manifest_target_path
            drain_state_root:
              ref: inputs.drain_state_root
            iteration_state_root:
              ref: self.steps.PrepareDrainIterationPaths.artifacts.iteration_state_root
            roadmap_change_request_path:
              ref: self.steps.PrepareDrainIterationPaths.artifacts.roadmap_change_request_path
            roadmap_revision_state_root:
              ref: self.steps.PrepareDrainIterationPaths.artifacts.roadmap_revision_state_root
            updated_project_roadmap_candidate_path:
              ref: self.steps.PrepareDrainIterationPaths.artifacts.updated_project_roadmap_candidate_path
            updated_tranche_manifest_candidate_path:
              ref: self.steps.PrepareDrainIterationPaths.artifacts.updated_tranche_manifest_candidate_path
            roadmap_revision_report_target_path:
              ref: self.steps.PrepareDrainIterationPaths.artifacts.roadmap_revision_report_target_path

  - name: PublishDrainSummary
    id: publish_drain_summary
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        manifest_path = pathlib.Path(sys.argv[1])
        drain_status = sys.argv[2]
        summary_target = pathlib.Path(sys.argv[3])
        pointer_path = pathlib.Path(sys.argv[4])
        manifest_pointer_path = pathlib.Path(sys.argv[5])

        manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
        tranches = manifest.get("tranches", [])
        status_counts = {}
        for tranche in tranches:
            status = tranche.get("status", "unknown") if isinstance(tranche, dict) else "invalid"
            status_counts[status] = status_counts.get(status, 0) + 1

        summary_target.parent.mkdir(parents=True, exist_ok=True)
        summary_target.write_text(
            json.dumps(
                {
                    "drain_status": drain_status,
                    "tranche_manifest_path": manifest_path.as_posix(),
                    "tranche_count": len(tranches),
                    "status_counts": status_counts,
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )
        pointer_path.parent.mkdir(parents=True, exist_ok=True)
        pointer_path.write_text(summary_target.as_posix() + "\n", encoding="utf-8")
        manifest_pointer_path.parent.mkdir(parents=True, exist_ok=True)
        manifest_pointer_path.write_text(manifest_path.as_posix() + "\n", encoding="utf-8")
      - ${inputs.tranche_manifest_target_path}
      - ${steps.DrainManifest.artifacts.drain_status}
      - ${inputs.drain_summary_target_path}
      - ${inputs.drain_state_root}/drain_summary_path.txt
      - ${inputs.drain_state_root}/tranche_manifest_path.txt
    expected_outputs:
      - name: drain_summary_path
        path: ${inputs.drain_state_root}/drain_summary_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: tranche_manifest_path
        path: ${inputs.drain_state_root}/tranche_manifest_path.txt
        type: relpath
        under: state
        must_exist_target: true
