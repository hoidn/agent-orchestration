version: "2.12"
name: "repeat-until-exhaustion-escalation-demo"

outputs:
  final_decision:
    kind: scalar
    type: enum
    allowed: ["ESCALATE_REPLAN"]
    from:
      ref: root.steps.ActivateExhaustionEscalation.artifacts.final_decision
  escalation_context_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.ActivateExhaustionEscalation.artifacts.escalation_context_path

artifacts:
  review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "ESCALATE_REPLAN"]
  loop_exhausted:
    kind: scalar
    type: bool

steps:
  - name: ReviewLoop
    id: review_loop
    repeat_until:
      id: review_iteration
      max_iterations: 2
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE", "ESCALATE_REPLAN"]
          from:
            ref: self.steps.WriteReviseDecision.artifacts.review_decision
        loop_exhausted:
          kind: scalar
          type: bool
          from:
            ref: self.steps.MarkLoopNotExhausted.artifacts.loop_exhausted
      on_exhausted:
        outputs:
          review_decision: ESCALATE_REPLAN
          loop_exhausted: true
      condition:
        any_of:
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: APPROVE
          - compare:
              left:
                ref: self.outputs.review_decision
              op: eq
              right: ESCALATE_REPLAN
      steps:
        - name: WriteReviseDecision
          id: write_revise_decision
          set_scalar:
            artifact: review_decision
            value: REVISE
        - name: MarkLoopNotExhausted
          id: mark_loop_not_exhausted
          set_scalar:
            artifact: loop_exhausted
            value: false

  - name: ActivateExhaustionEscalation
    id: activate_exhaustion_escalation
    when:
      artifact_bool:
        ref: root.steps.ReviewLoop.artifacts.loop_exhausted
    command:
      - python
      - -c
      - |
        import json
        from pathlib import Path

        state = Path("state")
        state.mkdir(exist_ok=True)
        context_path = state / "escalation_context.json"
        context_path.write_text(
            json.dumps(
                {
                    "active": True,
                    "reason": "repeat_until_iterations_exhausted",
                    "phase": "implementation_review",
                    "target_route": "ESCALATE_REPLAN",
                    "last_review_decision": "REVISE",
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )
        (state / "final_decision.txt").write_text("ESCALATE_REPLAN\n", encoding="utf-8")
        (state / "escalation_context_path.txt").write_text(
            context_path.as_posix() + "\n",
            encoding="utf-8",
        )
    expected_outputs:
      - name: final_decision
        path: state/final_decision.txt
        type: enum
        allowed: ["ESCALATE_REPLAN"]
      - name: escalation_context_path
        path: state/escalation_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
