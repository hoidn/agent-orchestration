version: "2.14"
name: "neurips-selected-backlog-drain-wrapper-v214"

imports:
  selected_item: ../library/neurips_selected_backlog_item.v214.yaml

inputs:
  state_root:
    type: relpath
    under: state
  drain_state_root:
    type: relpath
    under: state
  current_roadmap_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  current_roadmap_pointer_path:
    type: relpath
    under: state
    must_exist_target: true
  selector_state_root:
    type: relpath
    under: state
  manifest_path:
    type: relpath
    under: state
    must_exist_target: true
  steering_path:
    type: relpath
    under: docs
    must_exist_target: true
  design_path:
    type: relpath
    under: docs/plans
    must_exist_target: true
  progress_ledger_path:
    type: relpath
    under: state
    must_exist_target: true
  run_state_path:
    type: relpath
    under: state
    must_exist_target: true
  drain_summary_target_path:
    type: relpath
    under: artifacts/work
  implementation_execute_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"
  implementation_review_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"
  implementation_fix_provider:
    kind: scalar
    type: enum
    allowed: ["codex", "claude_opus"]
    default: "codex"

outputs:
  drain_status:
    kind: scalar
    type: enum
    allowed: ["CONTINUE", "DONE"]
    from:
      ref: root.steps.PublishDrainSummary.artifacts.drain_status
  run_state_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.run_state_path
  drain_summary_path:
    type: relpath
    under: artifacts/work
    must_exist_target: true
    from:
      ref: root.steps.PublishDrainSummary.artifacts.drain_summary_path

steps:
  - name: RunSelectedItem
    id: run_selected_item
    call: selected_item
    with:
      state_root:
        ref: inputs.state_root
      current_roadmap_path:
        ref: inputs.current_roadmap_path
      current_roadmap_pointer_path:
        ref: inputs.current_roadmap_pointer_path
      selector_state_root:
        ref: inputs.selector_state_root
      manifest_path:
        ref: inputs.manifest_path
      steering_path:
        ref: inputs.steering_path
      design_path:
        ref: inputs.design_path
      progress_ledger_path:
        ref: inputs.progress_ledger_path
      run_state_path:
        ref: inputs.run_state_path
      implementation_execute_provider:
        ref: inputs.implementation_execute_provider
      implementation_review_provider:
        ref: inputs.implementation_review_provider
      implementation_fix_provider:
        ref: inputs.implementation_fix_provider

  - name: DeriveLegacyDrainStatus
    id: derive_legacy_drain_status
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        selection = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
        summary_path = pathlib.Path(sys.argv[2])
        summary = json.loads(summary_path.read_text(encoding="utf-8"))
        selected_item_status = sys.argv[3].strip()
        output_path = pathlib.Path(sys.argv[4])

        selection_mode = str(selection.get("selection_mode") or "ACTIVE_SELECTION")
        item_outcome = str(summary.get("item_outcome") or "")

        if item_outcome == "SELECTION_REJECTED":
            summary_path.unlink(missing_ok=True)
            raise SystemExit(
                "Legacy drain treats selected-item rejection as a failed iteration without a final status."
            )

        if selection_mode == "RECOVERED_IN_PROGRESS" and selected_item_status == "CONTINUE":
            drain_status = "DONE"
        else:
            drain_status = "CONTINUE"

        output_path.parent.mkdir(parents=True, exist_ok=True)
        output_path.write_text(drain_status + "\n", encoding="utf-8")
      - ${inputs.selector_state_root}/selection.json
      - ${steps.RunSelectedItem.artifacts.item_summary_path}
      - ${steps.RunSelectedItem.artifacts.drain_status}
      - ${inputs.state_root}/legacy_drain_status.txt
    expected_outputs:
      - name: drain_status
        path: ${inputs.state_root}/legacy_drain_status.txt
        type: enum
        allowed: ["CONTINUE", "DONE"]

  - name: PublishDrainSummary
    id: publish_drain_summary
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        run_state_path = pathlib.Path(sys.argv[1])
        drain_status = sys.argv[2]
        summary_path = pathlib.Path(sys.argv[3])
        state_root = pathlib.Path(sys.argv[4])
        current_roadmap_pointer_path = pathlib.Path(sys.argv[5])

        run_state = json.loads(run_state_path.read_text(encoding="utf-8"))
        current_roadmap_path = current_roadmap_pointer_path.read_text(encoding="utf-8").strip()
        summary = {
          "drain_status": drain_status,
          "run_state_path": run_state_path.as_posix(),
          "current_roadmap_path": current_roadmap_path,
          "completed_item_count": len(run_state.get("completed_items", [])),
          "completed_items": run_state.get("completed_items", []),
          "blocked_item_ids": sorted(run_state.get("blocked_items", {}).keys()),
          "blocked_items": run_state.get("blocked_items", {}),
          "current_item": run_state.get("current_item"),
          "history_count": len(run_state.get("history", [])),
        }
        summary_path.parent.mkdir(parents=True, exist_ok=True)
        summary_path.write_text(json.dumps(summary, indent=2) + "\n", encoding="utf-8")
        (state_root / "drain_status.txt").write_text(drain_status + "\n", encoding="utf-8")
        (state_root / "drain_summary_path.txt").write_text(summary_path.as_posix() + "\n", encoding="utf-8")
        (state_root / "final_run_state_path.txt").write_text(run_state_path.as_posix() + "\n", encoding="utf-8")
      - ${inputs.run_state_path}
      - ${steps.DeriveLegacyDrainStatus.artifacts.drain_status}
      - ${inputs.drain_summary_target_path}
      - ${inputs.drain_state_root}
      - ${inputs.current_roadmap_pointer_path}
    expected_outputs:
      - name: drain_status
        path: ${inputs.drain_state_root}/drain_status.txt
        type: enum
        allowed: ["CONTINUE", "DONE"]
      - name: drain_summary_path
        path: ${inputs.drain_state_root}/drain_summary_path.txt
        type: relpath
        under: artifacts/work
        must_exist_target: true
      - name: run_state_path
        path: ${inputs.drain_state_root}/final_run_state_path.txt
        type: relpath
        under: state
        must_exist_target: true
