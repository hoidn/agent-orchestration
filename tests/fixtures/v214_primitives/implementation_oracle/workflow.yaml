version: "2.7"
name: "v214-implementation-oracle"

providers:
  fake:
    command: ["python", "tests/fixtures/bin/fake_provider.py"]
    input_mode: "stdin"

outputs:
  implementation_state:
    kind: scalar
    type: enum
    allowed: ["COMPLETED", "BLOCKED"]
    from:
      ref: root.steps.MaterializeImplementationState.artifacts.implementation_state

steps:
  - name: InitializeTargets
    command:
      - bash
      - -lc
      - |
        mkdir -p state/oracle artifacts/work
        printf '1\n' > state/oracle/phase_started_at_ns.txt
    expected_outputs:
      - name: phase_started_at_ns
        path: state/oracle/phase_started_at_ns.txt
        type: integer

  - name: ExecuteImplementation
    provider: fake
    input_file: prompt.md

  - name: MaterializeImplementationState
    command:
      - python
      - -c
      - |
        import json
        import pathlib
        import sys

        bundle_path = pathlib.Path(sys.argv[1])
        execution_report_target = pathlib.Path(sys.argv[2])
        progress_report_target = pathlib.Path(sys.argv[3])
        phase_started_at_ns = int(pathlib.Path(sys.argv[4]).read_text(encoding="utf-8").strip())

        allowed_blockers = {
            "missing_resource",
            "unavailable_hardware",
            "roadmap_conflict",
            "external_dependency_outside_authority",
            "user_decision_required",
            "unrecoverable_after_fix_attempt",
        }

        def is_fresh_report(path: pathlib.Path) -> bool:
            return path.is_file() and path.stat().st_mtime_ns >= phase_started_at_ns

        def parse_blocker_class(path: pathlib.Path) -> str:
            for raw_line in path.read_text(encoding="utf-8").splitlines():
                line = raw_line.strip()
                if line.lower().startswith("blocker class:"):
                    value = line.split(":", 1)[1].strip().strip("`")
                    if value in allowed_blockers:
                        return value
            raise SystemExit("Blocked progress report is missing Blocker Class")

        has_execution_report = is_fresh_report(execution_report_target)
        has_progress_report = is_fresh_report(progress_report_target)
        if has_execution_report and has_progress_report:
            raise SystemExit("Current pass produced both execution and blocker reports")
        if has_execution_report:
            payload = {
                "implementation_state": "COMPLETED",
                "execution_report_path": execution_report_target.as_posix(),
            }
        elif has_progress_report:
            payload = {
                "implementation_state": "BLOCKED",
                "progress_report_path": progress_report_target.as_posix(),
                "blocker_class": parse_blocker_class(progress_report_target),
            }
        else:
            raise SystemExit(
                "Current implementation pass produced neither execution report nor blocker report"
            )

        bundle_path.parent.mkdir(parents=True, exist_ok=True)
        bundle_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
      - state/oracle/implementation_state.json
      - artifacts/work/execution_report.md
      - artifacts/work/progress_report.md
      - state/oracle/phase_started_at_ns.txt
    output_bundle:
      path: state/oracle/implementation_state.json
      fields:
        - name: implementation_state
          json_pointer: /implementation_state
          type: enum
          allowed: ["COMPLETED", "BLOCKED"]
        - name: execution_report_path
          json_pointer: /execution_report_path
          type: relpath
          under: artifacts/work
          must_exist_target: true
          required: false
        - name: progress_report_path
          json_pointer: /progress_report_path
          type: relpath
          under: artifacts/work
          must_exist_target: true
          required: false
        - name: blocker_class
          json_pointer: /blocker_class
          type: enum
          allowed:
            - missing_resource
            - unavailable_hardware
            - roadmap_conflict
            - external_dependency_outside_authority
            - user_decision_required
            - unrecoverable_after_fix_attempt
          required: false
